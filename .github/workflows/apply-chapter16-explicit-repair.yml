name: Apply explicit Chapter 16 repair

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/chapter-16-pov-firewall-repair'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/chapter-16-pov-firewall-repair
          fetch-depth: 0
      - name: Apply and verify
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib

          def change(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              assert old in text, (path, old[:80])
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          chapter = 'books/book-01/manuscript/chapters/chapter-16.md'
          change(chapter,
              'She stood at the communications console while Qureshi opened the authenticated allied-routing envelope. The request did not name Julie O’Donnell, Metropolitan Police, or seven packages in Washington. Those details ended at the cleared boundary. What crossed it were the identifiers attached to the two allied products, the earlier source-review state, the omitted K-17-related references, and the record categories the American requesting authority wanted held.',
              'She stood at the communications console while Qureshi opened the authenticated allied-routing envelope. It named no American subject, no police incident, and no package count. Whatever triggered the request remained beyond the cleared boundary. What crossed it were the identifiers attached to the two allied products, the earlier source-review state, the omitted K-17-related references, and the record categories the American requesting authority wanted held.')
          change(chapter,
              'The request did not ask who had carried an office device through Hartwell. It did not mention Payload 88. It offered no explanation for why an American general had placed his name behind preservation less than fifteen minutes after the superseding product arrived.',
              'The request did not identify the incident behind the hold. It characterized neither product as correct or corrupt. It offered no explanation for why an American general had placed his name behind preservation less than fifteen minutes after the superseding product had arrived.')
          change(chapter,
              'For the no-fire records, the outward acknowledgment exposed only category, custody, and retention status. The operational result remained behind the allied disclosure boundary. A later cleared examiner could request it through the proper channel. Metropolitan Police could not receive it merely because their incident number had helped trigger the hold.',
              'For the no-fire records, the outward acknowledgment exposed only category, custody, and retention status. The operational result remained behind the allied disclosure boundary. A later cleared examiner could request it through the proper channel. The requesting channel could not receive it merely because unfamiliar incident references helped trigger the hold.')

          canon = 'books/book-01/control/04-source-of-truth-canon-locks.md'
          change(canon,
              'Chapter 16 — **The Hold Order** — is accepted unchanged at 6,024 words. The controlling prose now lives only at `../manuscript/chapters/chapter-16.md`; reviewed blob: `ff6fbaa66170a03502589309b3d1c2d74b50a289`.',
              'Chapter 16 — **The Hold Order** — is accepted after one surgical POV-firewall revision at 6,024 words. The controlling prose now lives only at `../manuscript/chapters/chapter-16.md`; reviewed blob: `dd5249f4b510a9da9ad19ab2902a95ce1e62a1d8`.')
          change(canon,
              "Canon advances to 08:15:52 EDT / 17:45:52 IST. General William Hackett is the named federal preservation sponsor for MPD incident `187463`, but MPD retains physical custody. `MPD-901441` through `MPD-901447` remain separate, sealed, offline, unopened, unconnected, and uncombined. Marcus's six-years-ago correction is attributable and medically bounded. Sharma's restricted acknowledgment preserves record categories, custody, product-status caveats, and clock references without a merits finding.",
              "Canon advances to 08:15:52 EDT / 17:45:52 IST. General William Hackett is the named federal preservation sponsor for MPD incident `187463`, but MPD retains physical custody. `MPD-901441` through `MPD-901447` remain separate, sealed, offline, unopened, unconnected, and uncombined. Marcus's six-years-ago correction is attributable and medically bounded. Sharma's restricted acknowledgment preserves record categories, custody, product-status caveats, and clock references without a merits finding. Her cutaway now names only information that crossed the allied boundary; Washington, Hartwell, Payload 88, and MPD-specific details remain outside her viewpoint.")

          lock = 'books/book-01/control/32-chapter-16-mission-lock.md'
          change(lock,
              '''**Status:** Approved pre-draft production lock.
**Scope:** Chapter 16 only.
**Authority:** Accepted manuscript through Chapter 15, current Book 1 controls, the Book 1 ending contract, and Narrative House Style v2.0/v2.1/v2.2.
**Canon effect:** None. This document plans Chapter 16. It does not create accepted story events, alter the accepted manuscript, or authorize any later-chapter fact.

The accepted opening remains the final line and physical state of Chapter 15 at **07:56:40 EDT / 17:26:40 IST**. Chapter 16 prose must not be placed in the accepted manuscript until it is drafted under `books/book-01/drafts/`, reviewed, and promoted through the formal acceptance gate.''',
              '''**Status:** Fulfilled planning provenance; Chapter 16 is accepted after one surgical POV-firewall revision.
**Scope:** Chapter 16 only.
**Authority:** The pre-draft sections preserve the constraints used to produce and review Chapter 16. Current acceptance status is controlled by the disposition at the end of this file and `33-chapter-16-acceptance-review.md`.
**Canon effect:** The planning sections did not create canon when written. Accepted Chapter 16 prose and its synchronized controls now govern the events dramatized within the locked boundaries.

The controlling pre-draft opening was the final line and physical state of Chapter 15 at **07:56:40 EDT / 17:26:40 IST**. Chapter 16 prose must not be placed in the accepted manuscript until it is drafted under `books/book-01/drafts/`, reviewed, and promoted through the formal acceptance gate.''')
          change(lock,
              'Approval of this lock authorizes a future drafting session to create one unaccepted Chapter 16 draft under `books/book-01/drafts/chapter-16.md`. The accepted manuscript remains Prologue and Chapters 1–15 at **81,586 words**, ending at **07:56:40 EDT / 17:26:40 IST**, until Chapter 16 is separately drafted, reviewed, and promoted through the acceptance gate.',
              'At the time this lock was approved, it authorized one unaccepted Chapter 16 draft under `books/book-01/drafts/chapter-16.md`; the accepted manuscript then remained Prologue and Chapters 1–15 at **81,586 words**, ending at **07:56:40 EDT / 17:26:40 IST**. That pre-acceptance state is superseded by the acceptance disposition below.')
          change(lock,
              '''The locked mission was fulfilled by the complete draft without prose revision. Formal review `33-chapter-16-acceptance-review.md` issued **ACCEPT** at 6,024 words.

- Reviewed and accepted blob: `ff6fbaa66170a03502589309b3d1c2d74b50a289`.
- Accepted path: `../manuscript/chapters/chapter-16.md`.
- Opening: 07:56:40 EDT / 17:26:40 IST.
- Endpoint: 08:15:52 EDT / 17:45:52 IST.
- POV: Julie → Marcus → Sharma → Julie.
- Prose changed during review: no.
- All mission requirements passed; every prohibited resolution remains unresolved.
- Next gate: Chapter 17 mission planning and mission locking only. Do not draft Chapter 17.''',
              '''The locked mission was fulfilled after one surgical POV-firewall revision. Formal review `33-chapter-16-acceptance-review.md` issued **ACCEPT** at 6,024 words after correcting three Sharma-cutaway passages that named details not transmitted across the allied boundary.

- Reviewed and accepted blob: `dd5249f4b510a9da9ad19ab2902a95ce1e62a1d8`.
- Accepted path: `../manuscript/chapters/chapter-16.md`.
- Opening: 07:56:40 EDT / 17:26:40 IST.
- Endpoint: 08:15:52 EDT / 17:45:52 IST.
- POV: Julie → Marcus → Sharma → Julie.
- Prose changed during review: yes — one significant knowledge-firewall finding corrected with three equal-count passage repairs.
- All mission requirements passed; every prohibited resolution remains unresolved.
- Next gate: Chapter 17 mission planning and mission locking only. Do not draft Chapter 17.''')

          expected = {
              canon: 'a4d03171dd4bcd2f689dba41de255d823a7f8356',
              lock: 'fcd8d7e9166e224593bed06434f01410975eb3c2',
              chapter: 'dd5249f4b510a9da9ad19ab2902a95ce1e62a1d8',
          }
          for name, wanted in expected.items():
              data = Path(name).read_bytes()
              actual = hashlib.sha1(f'blob {len(data)}\0'.encode('ascii') + data).hexdigest()
              assert actual == wanted, (name, actual, wanted)
          assert len(Path(chapter).read_text(encoding='utf-8').split()) == 6024
          PY
          python tools/count_book1_words.py --expect 87610
          git diff --check
      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add books/book-01/control/04-source-of-truth-canon-locks.md
          git add books/book-01/control/32-chapter-16-mission-lock.md
          git add books/book-01/manuscript/chapters/chapter-16.md
          git commit -m "Apply Chapter 16 POV firewall repair"
          git push origin HEAD:agent/chapter-16-pov-firewall-repair
