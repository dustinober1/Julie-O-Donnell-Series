name: Build Drive Migration Export

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install export dependencies
        run: python -m pip install --disable-pip-version-check pyyaml python-docx

      - name: Build verified Drive migration package
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import shutil
          from pathlib import Path

          import yaml
          from docx import Document

          root = Path.cwd()
          export_root = root / "export"
          package_root = export_root / "Julie-O-Donnell-Series"
          accepted_root = package_root / "02 BOOKS" / "Book 01 - Veridrift" / "01 ACCEPTED MANUSCRIPT"
          control_root = package_root / "02 BOOKS" / "Book 01 - Veridrift" / "02 CANON & CONTROL"
          series_root = package_root / "01 SERIES BIBLE & CONTINUITY"
          archive_root = package_root / "90 ARCHIVE - GITHUB MIGRATION"

          for folder in (accepted_root, control_root, series_root, archive_root):
              folder.mkdir(parents=True, exist_ok=True)

          manifest_path = root / "books/book-01/ACCEPTED_MANUSCRIPT.yaml"
          manifest = yaml.safe_load(manifest_path.read_text(encoding="utf-8"))
          accepted_files = manifest["accepted_files"]

          manuscript_parts: list[str] = []
          source_files: list[Path] = []
          for entry in accepted_files:
              source = root / entry["path"]
              if not source.is_file():
                  raise SystemExit(f"Missing accepted manuscript file: {source}")
              source_files.append(source)
              text = source.read_text(encoding="utf-8")
              manuscript_parts.append(text.rstrip())
              destination_name = "00-prologue.md" if entry["sequence"] == 0 else f"{entry['sequence']:02d}-chapter-{entry['sequence']:02d}.md"
              shutil.copy2(source, accepted_root / destination_name)

          combined_markdown = "\n\n---\n\n".join(manuscript_parts) + "\n"
          actual_words = sum(len(source.read_text(encoding="utf-8").split()) for source in source_files)
          expected_words = int(manifest["accepted_words"])
          if actual_words != expected_words:
              raise SystemExit(f"Word-count mismatch: expected {expected_words}, got {actual_words}")

          (accepted_root / "Veridrift - Accepted Manuscript - Prologue through Chapter 24.md").write_text(combined_markdown, encoding="utf-8")

          doc = Document()
          doc.add_heading("Veridrift", level=0)
          doc.add_paragraph("Julie O'Donnell Series — Book 1")
          doc.add_paragraph(f"Accepted manuscript: Prologue and Chapters 1–24 • {actual_words:,} words")
          for index, entry in enumerate(accepted_files):
              if index:
                  doc.add_page_break()
              text = (root / entry["path"]).read_text(encoding="utf-8")
              paragraph_lines: list[str] = []
              def flush_paragraph() -> None:
                  nonlocal paragraph_lines
                  if paragraph_lines:
                      doc.add_paragraph(" ".join(line.strip() for line in paragraph_lines))
                      paragraph_lines = []
              for raw_line in text.splitlines():
                  line = raw_line.rstrip()
                  if not line:
                      flush_paragraph()
                  elif line.startswith("# "):
                      flush_paragraph()
                      doc.add_heading(line[2:].strip(), level=1)
                  elif line.startswith("## "):
                      flush_paragraph()
                      doc.add_heading(line[3:].strip(), level=2)
                  elif line.strip() == "---":
                      flush_paragraph()
                      doc.add_page_break()
                  else:
                      paragraph_lines.append(line)
              flush_paragraph()
          doc.save(accepted_root / "Veridrift - Accepted Manuscript - Prologue through Chapter 24.docx")

          for source in [root / "PROJECT_STATE.yaml", manifest_path, root / "books/book-01/control/README.md"]:
              shutil.copy2(source, control_root / source.name)
          for source in sorted((root / "books/book-01/control").glob("*.md")):
              shutil.copy2(source, control_root / source.name)
          repairs_source = root / "books/book-01/repairs"
          if repairs_source.exists():
              shutil.copytree(repairs_source, control_root / "repairs", dirs_exist_ok=True)
          for source in sorted((root / "series").glob("*.md")):
              shutil.copy2(source, series_root / source.name)
          for source in sorted((root / "docs").glob("Julie_ODonnell_Narrative_House_Style_v2*.md")):
              shutil.copy2(source, series_root / source.name)
          legacy_readme = root / "archive/legacy-sources/README.md"
          if legacy_readme.exists():
              shutil.copy2(legacy_readme, archive_root / legacy_readme.name)

          (package_root / "00 START HERE - MIGRATION README.txt").write_text(
              "Julie O'Donnell Series Drive Migration\n\n"
              "Controlling Book 1 title: Veridrift\n"
              "Accepted canon: Prologue and Chapters 1-24\n"
              f"Verified accepted words: {actual_words:,}\n"
              "Book 1 is structurally complete but not yet publication-ready.\n"
              "Do not create Chapter 25 for Book 1.\n\n"
              "The individual Markdown files are the byte-faithful accepted prose.\n"
              "The combined Markdown and DOCX are convenience working copies.\n"
              "Canon/control documents and the series continuity ledger are included.\n",
              encoding="utf-8",
          )

          checksum_lines: list[str] = []
          for path in sorted(package_root.rglob("*")):
              if path.is_file():
                  digest = hashlib.sha256(path.read_bytes()).hexdigest()
                  checksum_lines.append(f"{digest}  {path.relative_to(package_root).as_posix()}")
          (package_root / "SHA256SUMS.txt").write_text("\n".join(checksum_lines) + "\n", encoding="utf-8")
          shutil.make_archive(str(export_root / "Julie-O-Donnell-Series-Drive-Migration"), "zip", root_dir=export_root, base_dir="Julie-O-Donnell-Series")
          print(f"Export complete: {actual_words:,} accepted words across {len(source_files)} files")
          PY

      - name: Upload Drive migration package
        uses: actions/upload-artifact@v4
        with:
          name: julie-odonnell-drive-migration
          path: export/
          if-no-files-found: error
          retention-days: 7
