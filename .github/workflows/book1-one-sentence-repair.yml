name: Book 1 One-Sentence Repair

on:
  push:
    branches: [agent/book1-one-sentence-repair]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/book1-one-sentence-repair
          fetch-depth: 0
      - name: Patch protected-block verifier
        run: python3 tools/fix_book1_one_sentence_verifier.py
      - name: Build reviewed repair map
        run: python3 tools/build_book1_one_sentence_repair_map.py
      - name: Apply reviewed paragraph integrations
        id: apply
        continue-on-error: true
        run: |
          set -o pipefail
          python3 tools/apply_book1_one_sentence_repair.py 2>&1 | tee artifacts/book1-one-sentence-repair-run.log
      - name: Upload repair diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: book1-one-sentence-repair-diagnostics
          path: |
            artifacts/book1-one-sentence-repair-run.log
            books/book-01/control/52-one-sentence-repair-map.json
          if-no-files-found: error
      - name: Stop after repair failure
        if: steps.apply.outcome == 'failure'
        run: exit 1
      - name: Recompile accepted manuscript
        run: python3 tools/compile_book1_accepted.py
      - name: Regenerate developmental metrics
        run: python3 tools/analyze_book1_revision.py
      - name: Confirm accepted word count
        run: python3 tools/count_book1_words.py --expect 105081
      - name: Run publication-readiness checks
        run: python3 tools/validate_book1_publication_readiness.py
      - name: Run final revision verification
        run: python3 tools/verify_book1_revision.py
      - name: Compile repair tools
        run: >-
          python3 -m py_compile
          tools/export_book1_one_sentence_context.py
          tools/build_book1_one_sentence_repair_map.py
          tools/apply_book1_one_sentence_repair.py
          tools/fix_book1_one_sentence_verifier.py
          tools/compile_book1_accepted.py
          tools/analyze_book1_revision.py
          tools/validate_book1_publication_readiness.py
          tools/verify_book1_revision.py
      - name: Parse synchronized YAML controls
        run: ruby -e "require 'yaml'; YAML.load_file('PROJECT_STATE.yaml'); YAML.load_file('books/book-01/ACCEPTED_MANUSCRIPT.yaml')"
      - name: Diff hygiene
        run: git diff --check
      - name: Commit completed targeted repair
        run: |
          if git diff --quiet; then
            echo "No repair changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            README.md PROJECT_STATE.yaml \
            artifacts/book1-developmental-analysis.md \
            artifacts/book1-final-verification.md \
            artifacts/book1-one-sentence-repair.md \
            books/book-01/ACCEPTED_MANUSCRIPT.yaml \
            books/book-01/compiled/current/Julie_O_Donnell_Book_1_REVISED.md \
            books/book-01/control/00-overview.md \
            books/book-01/control/52-one-sentence-repair-map.json \
            books/book-01/control/53-one-sentence-repair.md \
            books/book-01/manuscript/STATUS.md \
            books/book-01/manuscript/prologue.md \
            books/book-01/manuscript/chapters \
            tools/apply_book1_one_sentence_repair.py \
            tools/verify_book1_revision.py
          git commit -m "edit: complete targeted one-sentence paragraph repair [skip ci]"
          git push origin HEAD:agent/book1-one-sentence-repair
