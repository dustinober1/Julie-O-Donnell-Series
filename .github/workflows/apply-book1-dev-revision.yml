name: Apply Book 1 Developmental Revision Patches

on:
  push:
    branches: [agent/book1-developmental-revision]

permissions:
  contents: write

jobs:
  apply:
    if: startsWith(github.event.head_commit.message, 'apply:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply idempotent editorial patches
        run: python3 tools/apply_book1_dev_revision.py
      - name: Validate blocker pass
        run: python3 tools/validate_book1_publication_readiness.py --pre-revision
      - name: Verify diff hygiene
        run: git diff --check
      - name: Commit generated manuscript changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add books/book-01/manuscript/chapters
            git commit -m "fix: apply Book 1 publication blocker patch"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
