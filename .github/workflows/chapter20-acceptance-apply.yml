name: Chapter 20 Acceptance Application

on:
  push:
    branches:
      - agent/chapter-20-acceptance-review

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[chapter20-acceptance-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/chapter-20-acceptance-review

      - name: Apply accepted Chapter 20 state
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import gzip

          payload = "[... ELLIPSIZATION ...]"
          source = gzip.decompress(base64.b64decode(payload))
          exec(compile(source, 'chapter20_acceptance_apply.py', 'exec'))
          PY

      - name: Commit synchronized acceptance state
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Accept and synchronize Chapter 20 [chapter20-acceptance-applied]"
          git push origin HEAD:agent/chapter-20-acceptance-review
