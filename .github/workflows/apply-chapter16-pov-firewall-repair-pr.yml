name: Apply Chapter 16 POV firewall repair on PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/chapter-16-pov-firewall-repair'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/chapter-16-pov-firewall-repair
          fetch-depth: 0

      - name: Apply exact reviewed patch
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          payload = """"""
          patch = gzip.decompress(base64.b64decode(payload)).decode("utf-8")
          Path("/tmp/ch16-pov.patch").write_text(patch, encoding="utf-8")
          PY
          git apply --check /tmp/ch16-pov.patch
          git apply /tmp/ch16-pov.patch

      - name: Verify reviewed state
        shell: bash
        run: |
          python tools/count_book1_words.py --expect 87610
          python - <<'PY'
          from pathlib import Path
          import hashlib

          expected = {
              "books/book-01/control/04-source-of-truth-canon-locks.md": "a4d03171dd4bcd2f689dba41de255d823a7f8356",
              "books/book-01/control/32-chapter-16-mission-lock.md": "fcd8d7e9166e224593bed06434f01410975eb3c2",
              ".github/workflows/book1-manuscript-validation.yml": "3b94a53eda3aed98e23326c05987a028264fff9d",
              "books/book-01/manuscript/chapters/chapter-16.md": "dd5249f4b510a9da9ad19ab2902a95ce1e62a1d8",
          }
          for name, wanted in expected.items():
              data = Path(name).read_bytes()
              actual = hashlib.sha1(f"blob {len(data)}\0".encode("ascii") + data).hexdigest()
              assert actual == wanted, (name, actual, wanted)
          chapter = Path("books/book-01/manuscript/chapters/chapter-16.md").read_text(encoding="utf-8")
          assert len(chapter.split()) == 6024
          assert "The request did not name Julie O’Donnell, Metropolitan Police, or seven packages in Washington." not in chapter
          assert "It named no American subject, no police incident, and no package count." in chapter
          assert not list(Path("books/book-01").rglob("chapter-17.md"))
          PY
          git diff --check

      - name: Commit reviewed repair and remove bootstraps
        shell: bash
        run: |
          rm .github/workflows/apply-chapter16-pov-firewall-repair.yml
          rm .github/workflows/apply-chapter16-pov-firewall-repair-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply Chapter 16 POV firewall repair"
          git push origin HEAD:agent/chapter-16-pov-firewall-repair
