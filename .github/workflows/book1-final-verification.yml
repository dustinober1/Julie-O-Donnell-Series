name: Book 1 Final Verification

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/book1-developmental-revision'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Gate explicit verification runs
        id: gate
        run: |
          subject="$(git log -1 --pretty=%s)"
          case "$subject" in
            tools:*|verify:*) echo "run=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "run=false" >> "$GITHUB_OUTPUT" ;;
          esac
      - name: Configure commit identity
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Compile accepted manuscript
        if: steps.gate.outputs.run == 'true'
        run: python3 tools/compile_book1_accepted.py
      - name: Synchronize canonical inventory and controls
        if: steps.gate.outputs.run == 'true'
        run: python3 tools/register_book1_compiled_output.py
      - name: Run publication-readiness validator
        if: steps.gate.outputs.run == 'true'
        run: python3 tools/validate_book1_publication_readiness.py
      - name: Run independent final verification
        if: steps.gate.outputs.run == 'true'
        id: final_verification
        continue-on-error: true
        run: python3 tools/verify_book1_revision.py > artifacts/book1-final-verification-current.txt 2>&1
      - name: Append protected opening hashes
        if: steps.gate.outputs.run == 'true'
        run: |
          {
            echo
            echo "PROTECTED_HASHES_CURRENT"
            sha256sum \
              books/book-01/manuscript/prologue.md \
              books/book-01/manuscript/chapters/chapter-01.md
          } >> artifacts/book1-final-verification-current.txt
      - name: Show independent verification result
        if: steps.gate.outputs.run == 'true'
        run: cat artifacts/book1-final-verification-current.txt
      - name: Persist failing verification diagnostic
        if: steps.gate.outputs.run == 'true' && steps.final_verification.outcome == 'failure'
        run: |
          git add artifacts/book1-final-verification-current.txt
          git commit -m "test: record Book 1 final verification failure"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Verify diff hygiene
        if: steps.gate.outputs.run == 'true' && steps.final_verification.outcome == 'success'
        run: git diff --check
      - name: Commit verified compilation, controls, and report
        if: steps.gate.outputs.run == 'true' && steps.final_verification.outcome == 'success'
        run: |
          git add \
            README.md \
            PROJECT_STATE.yaml \
            books/book-01/ACCEPTED_MANUSCRIPT.yaml \
            books/book-01/compiled/current/Julie_O_Donnell_Book_1_REVISED.md \
            books/book-01/manuscript/STATUS.md \
            books/book-01/control/00-overview.md \
            books/book-01/control/16-chapter-by-chapter-status-record.md \
            books/book-01/control/24-thread-disposition-matrix.md \
            series/recurring-character-ledger.md \
            artifacts/book1-final-verification.md \
            artifacts/book1-final-verification-current.txt
          if git diff --cached --quiet; then
            echo "Verified outputs unchanged"
          else
            git commit -m "build: add verified Book 1 revision compilation"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
      - name: Enforce independent verification
        if: steps.gate.outputs.run == 'true' && steps.final_verification.outcome == 'failure'
        run: exit 1
