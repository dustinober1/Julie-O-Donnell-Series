name: Book 1 Final Verification

on:
  pull_request:
    branches: [main]
    paths:
      - "books/book-01/**"
      - "tools/**"
      - "PROJECT_STATE.yaml"
      - "README.md"
      - ".github/workflows/book1-final-verification.yml"
  push:
    branches: [main]
    paths:
      - "books/book-01/**"
      - "tools/**"
      - "PROJECT_STATE.yaml"
      - "README.md"
      - ".github/workflows/book1-final-verification.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run validator and compiler tests
        run: python -m unittest discover -s tools -p 'test_*.py' -v

      - name: Verify exact accepted word count
        run: python tools/count_book1_words.py --expect 105157

      - name: Validate accepted manuscript and control state
        run: python tools/validate_book1_publication_readiness.py

      - name: Generate developmental diagnostics
        run: python tools/analyze_book1_revision.py

      - name: Generate publication-style diagnostics
        run: python tools/analyze_book1_publication_style.py

      - name: Compile publication-master candidate
        run: python tools/compile_book1_from_manifest.py --output /tmp/Veridrift_PUBLICATION_MASTER.md

      - name: Run independent final verification
        run: python tools/verify_book1_revision.py

      - name: Verify compiler output and ending
        run: |
          test -s /tmp/Veridrift_PUBLICATION_MASTER.md
          test -s /tmp/Veridrift_PUBLICATION_MASTER.md.build.json
          tail -n 1 /tmp/Veridrift_PUBLICATION_MASTER.md | grep -Fx 'The bubble stayed centered.'

      - name: Compile permanent validators
        run: |
          python -m py_compile \
            tools/count_book1_words.py \
            tools/validate_book1_publication_readiness.py \
            tools/verify_book1_revision.py

      - name: Parse synchronized YAML controls
        run: ruby -e "require 'yaml'; YAML.load_file('PROJECT_STATE.yaml'); YAML.load_file('books/book-01/ACCEPTED_MANUSCRIPT.yaml')"

      - name: Diff hygiene
        run: git diff --check
