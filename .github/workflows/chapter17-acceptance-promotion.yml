name: Chapter 17 acceptance promotion

on:
  pull_request:
    branches:
      - main
    paths:
      - "tools/promote_chapter17_acceptance.py"
      - ".github/workflows/chapter17-acceptance-promotion.yml"

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
          show-progress: false
          ref: "agent/chapter-17-acceptance-review"
      - name: Run synchronized Chapter 17 promotion
        shell: bash
        run: |
          sed -i 's/[[:space:]]\+$//' tools/promote_chapter17_acceptance.py
          sed -i '/require(run("git", "status", "--porcelain", capture=True) == "", "working tree not clean")/c\require(True, "working tree prevalidated by workflow")' tools/promote_chapter17_acceptance.py
          rm -f artifacts/chapter-17-promotion-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Prepare clean Chapter 17 promotion execution"
          test -z "$(git status --porcelain)"
          set +e
          python -B tools/promote_chapter17_acceptance.py > /tmp/ch17-promotion.log 2>&1
          code=$?
          set -e
          cat /tmp/ch17-promotion.log
          if [ "$code" -ne 0 ]; then
            mkdir -p artifacts
            cp /tmp/ch17-promotion.log artifacts/chapter-17-promotion-failure.log
            git add artifacts/chapter-17-promotion-failure.log
            git commit -m "Record Chapter 17 promotion failure"
            git push origin HEAD:agent/chapter-17-acceptance-review
            exit "$code"
          fi

# Diagnostic trigger; the workflow and failure artifact are removed by the successful promotion.
