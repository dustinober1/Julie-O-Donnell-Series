name: Chapter 17 acceptance promotion

on:
  pull_request:
    branches:
      - main
    paths:
      - "tools/promote_chapter17_acceptance.py"
      - ".github/workflows/chapter17-acceptance-promotion.yml"

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20
          show-progress: false
          ref: "agent/chapter-17-acceptance-review"
      - name: Run synchronized Chapter 17 promotion
        shell: bash
        run: |
          sed -i 's/[[:space:]]\+$//' tools/promote_chapter17_acceptance.py
          rm -f artifacts/chapter-17-promotion-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/promote_chapter17_acceptance.py artifacts/chapter-17-promotion-failure.log
          git commit -m "Prepare clean Chapter 17 promotion execution"
          python tools/promote_chapter17_acceptance.py

# The workflow removes itself after a successful synchronized promotion.
