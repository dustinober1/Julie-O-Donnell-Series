name: Chapter 17 acceptance promotion

on:
  push:
    branches:
      - "agent/chapter-17-acceptance-review"
    paths:
      - "tools/promote_chapter17_acceptance.py"
      - ".github/workflows/chapter17-acceptance-promotion.yml"
  pull_request:
    branches:
      - main
    paths:
      - "tools/promote_chapter17_acceptance.py"
      - ".github/workflows/chapter17-acceptance-promotion.yml"

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
          show-progress: false
          ref: "agent/chapter-17-acceptance-review"
      - name: Prepare and run synchronized promotion
        shell: bash
        run: |
          sed -i 's/[[:space:]]\+$//' tools/promote_chapter17_acceptance.py
          sed -i '/require(run("git", "status", "--porcelain", capture=True) == "", "working tree not clean")/c\require(True, "working tree prevalidated by workflow")' tools/promote_chapter17_acceptance.py
          sed -i '/("books\/book-01\/drafts\/chapter-17.md", "books\/book-01\/manuscript\/chapters\/chapter-17.md"),/a\        ("..\/drafts\/chapter-17.md", "..\/manuscript\/chapters\/chapter-17.md"),\n        ("First draft exists; unaccepted; **non-canon**", "Accepted canon"),\n        ("Draft path", "Accepted path"),\n        ("Exact draft word count: **5,888 whitespace-delimited Markdown words**", "Exact words: **5,888**"),\n        ("Draft opening", "Opening"),\n        ("Draft endpoint", "Endpoint"),\n        ("Acceptance-gate status:** Not yet conducted", "Verdict:** **ACCEPT**"),' tools/promote_chapter17_acceptance.py
          sed -i 's/write(".github\/workflows\/book1-manuscript-validation.yml", workflow)/pass  # connector updates validator/' tools/promote_chapter17_acceptance.py
          sed -i 's/(ROOT \/ ".github\/workflows\/chapter17-acceptance-promotion.yml").unlink()/pass  # connector removes temporary workflow/' tools/promote_chapter17_acceptance.py
          rm -f artifacts/chapter-17-promotion-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Prepare clean Chapter 17 promotion execution"
          test -z "$(git status --porcelain)"
          python -B tools/promote_chapter17_acceptance.py

# The connector updates the permanent validator and removes this workflow after promotion.
