name: Book 1 One-Sentence Audit

on:
  workflow_dispatch:
  push:
    branches: [agent/book1-one-sentence-audit]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/book1-one-sentence-audit
          fetch-depth: 0

      - name: Generate one-sentence paragraph audit
        run: python3 tools/audit_book1_one_sentence_paragraphs.py

      - name: Compile audit tool
        run: python3 -m py_compile tools/audit_book1_one_sentence_paragraphs.py

      - name: Confirm manuscript validation remains green
        run: |
          python3 tools/count_book1_words.py --expect 105081
          python3 tools/validate_book1_publication_readiness.py
          python3 tools/verify_book1_revision.py

      - name: Diff hygiene
        run: git diff --check

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: book1-one-sentence-paragraph-audit
          path: artifacts/book1-one-sentence-paragraph-audit.md
          if-no-files-found: error
