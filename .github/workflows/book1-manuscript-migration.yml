name: Migrate Book 1 manuscript to Markdown

on:
  pull_request:
    branches:
      - main
    paths:
      - ".migration/request.md"
      - ".github/workflows/book1-manuscript-migration.yml"

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Export controlling Google Doc
        shell: bash
        run: |
          curl --fail --location --retry 3 \
            'https://docs.google.com/document/d/15HOO8NRBsT1IjkvHycznWzAu0rCz16mvGR41SeQ6uyU/export?format=docx' \
            --output /tmp/book1.docx
          unzip -t /tmp/book1.docx >/dev/null

      - name: Install DOCX parser
        run: python -m pip install --disable-pip-version-check python-docx

      - name: Split manuscript into Markdown files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          from docx import Document

          source = Path('/tmp/book1.docx')
          root = Path('books/book-01/manuscript')
          chapter_dir = root / 'chapters'
          chapter_dir.mkdir(parents=True, exist_ok=True)

          expected = [
              'Prologue - Six Years Ago',
              'Chapter 1 - The Official Version',
              'Chapter 2 - The Poisoned Feed',
              'Chapter 3 - The Exit Protocol',
              'Chapter 4 - Burn Notice',
              'Chapter 5 - The Human Key',
              'Chapter 6 - The Descent',
              'Chapter 7 - The Human Key',
              'Chapter 8 - The 05:00 Abort',
              'Chapter 9 - The Life-Safety Override',
              'Chapter 10 - The Capital Connection',
              'Chapter 11 - Going Offensive',
              'Chapter 12 - The Sterling Trap',
          ]

          doc = Document(source)
          sections = []
          current_title = None
          current_paragraphs = []

          for paragraph in doc.paragraphs:
              text = paragraph.text.replace('\u00a0', ' ').rstrip()
              style_name = paragraph.style.name if paragraph.style else ''

              if style_name == 'Heading 1' and text.strip():
                  if current_title is not None:
                      sections.append((current_title, current_paragraphs))
                  current_title = text.strip()
                  current_paragraphs = []
                  continue

              if current_title is not None:
                  if text.startswith('● '):
                      text = '- ' + text[2:]
                  current_paragraphs.append(text)

          if current_title is not None:
              sections.append((current_title, current_paragraphs))

          titles = [title for title, _ in sections]
          if titles != expected:
              raise SystemExit(f'Unexpected manuscript headings: {titles!r}')

          def render(title: str, paragraphs: list[str]) -> str:
              body = '\n\n'.join(paragraphs).strip()
              return f'# {title}\n\n{body}\n'

          (root / 'prologue.md').write_text(render(*sections[0]), encoding='utf-8')

          for number, section in enumerate(sections[1:], start=1):
              path = chapter_dir / f'chapter-{number:02d}.md'
              path.write_text(render(*section), encoding='utf-8')

          files = [root / 'prologue.md', *sorted(chapter_dir.glob('chapter-*.md'))]
          total_words = sum(len(re.findall(r"\b[\w’'-]+\b", p.read_text(encoding='utf-8'))) for p in files)

          if len(files) != 13:
              raise SystemExit(f'Expected 13 manuscript files, found {len(files)}')
          if total_words < 65000:
              raise SystemExit(f'Manuscript unexpectedly short: {total_words} words')

          print(f'Created {len(files)} manuscript files with approximately {total_words} words.')
          PY

      - name: Validate manuscript structure
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('books/book-01/manuscript')
          chapters = sorted((root / 'chapters').glob('chapter-*.md'))
          assert (root / 'prologue.md').read_text(encoding='utf-8').startswith('# Prologue - Six Years Ago')
          assert len(chapters) == 12
          for index, path in enumerate(chapters, start=1):
              assert path.read_text(encoding='utf-8').startswith(f'# Chapter {index} - '), path
          assert (root / 'README.md').exists()
          assert (root / 'SOURCE.md').exists()
          assert (root / 'STATUS.md').exists()
          print('Validated Prologue and Chapters 1-12.')
          PY

      - name: Remove one-time migration files
        run: |
          rm .github/workflows/book1-manuscript-migration.yml
          rm -rf .migration

      - name: Commit migrated manuscript to branch
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Migrate accepted Book 1 manuscript into GitHub'
          git push origin "HEAD:${HEAD_BRANCH}"
