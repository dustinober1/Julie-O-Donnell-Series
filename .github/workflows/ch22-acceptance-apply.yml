          ch22_entry = ch21_entry + "\n  - sequence: 22\n    type: \"chapter\"\n    title: \"The Release Record\"\n    path: \"books/book-01/manuscript/chapters/chapter-22.md\""
          if ch21_entry not in manifest:
              raise SystemExit("manifest Chapter 21 entry not found")
          manifest = manifest.replace(ch21_entry, ch22_entry, 1)
          manifest = manifest.replace("no active Book 1 chapter draft after Chapter 21 promotion", "no active Book 1 chapter draft after Chapter 22 promotion")
          write("books/book-01/ACCEPTED_MANUSCRIPT.yaml", manifest)

