name: Apply Chapter 22 acceptance

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-accepted-state:
    if: github.head_ref == 'agent/chapter-22-acceptance-review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Apply accepted Chapter 22 state
        shell: bash
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import re
          import shutil
          import subprocess
          import textwrap
          from pathlib import Path

          ROOT = Path.cwd()
          BASE = "3ed760050f7e74ad152d0f46ede7db16164030b0"
          REVIEW_BLOB = "9de6c47b5984875339e8c6244ffca25f49394d9c"
          LOCK_BLOB = "9bd255ac7b09a1490dc70be4506ba29183756788"
          CH22_BLOB = "034ab496794594427d8409d03e7c6659d41b6a91"

          def read(path: str) -> str:
              return (ROOT / path).read_text(encoding="utf-8")

          def write(path: str, content: str) -> None:
              p = ROOT / path
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(content.rstrip() + "\n", encoding="utf-8")

          def block(text: str) -> str:
              return textwrap.dedent(text).strip()

          def replace_marker(path: str, start: str, end: str, replacement: str) -> None:
              content = read(path)
              pattern = re.compile(re.escape(start) + r".*?" + re.escape(end), re.S)
              if pattern.search(content):
                  content = pattern.sub(replacement, content, count=1)
              else:
                  lines = content.splitlines()
                  if not lines or not lines[0].startswith("#"):
                      raise SystemExit(f"cannot insert current-state block in {path}")
                  content = lines[0] + "\n\n" + replacement + "\n\n" + "\n".join(lines[1:]).lstrip()
              write(path, content)

          def insert_after_title(path: str, replacement: str) -> None:
              content = read(path)
              pattern = re.compile(r"\n?<!-- CH22_ACCEPTED_STATE_START -->.*?<!-- CH22_ACCEPTED_STATE_END -->\n?", re.S)
              content = pattern.sub("\n", content)
              lines = content.splitlines()
              if not lines or not lines[0].startswith("#"):
                  raise SystemExit(f"missing title in {path}")
              content = lines[0] + "\n\n" + replacement + "\n\n" + "\n".join(lines[1:]).lstrip()
              write(path, content)

          # Promote the exact reviewed prose byte-identically and remove the sole draft.
          draft = ROOT / "books/book-01/drafts/chapter-22.md"
          manuscript = ROOT / "books/book-01/manuscript/chapters/chapter-22.md"
          if not draft.is_file():
              raise SystemExit("missing reviewed Chapter 22 draft")
          if manuscript.exists():
              raise SystemExit("Chapter 22 manuscript path already exists")
          shutil.copyfile(draft, manuscript)
          draft.unlink()

          # Accepted manifest.
          manifest = read("books/book-01/ACCEPTED_MANUSCRIPT.yaml")
          manifest = manifest.replace("accepted_words: 112091", "accepted_words: 116807", 1)
          manifest = manifest.replace("  chapter: 21\n  eastern: \"12:18:04 EDT\"\n  india: \"21:48:04 IST\"\n  location: \"secure MPD evidence intake; Price's authentic source-review request and the later borrowed-identity path are separately preserved; SSO-NS-004 remains under LSS no-use hold; MPD retains seven packages; Sterling public account remains dominant\"",
