              return subprocess.check_output(["git", "hash-object", path], cwd=ROOT, text=True).strip()

          def words(path: str) -> int:
              return len((ROOT / path).read_text(encoding="utf-8").split())

          for path, (expected_words, expected_blob) in EXPECTED_CHAPTERS.items():
              if not (ROOT / path).is_file(): fail(f"missing {{path}}")
              if words(path) != expected_words: fail(f"word count {{path}}")
              if blob(path) != expected_blob: fail(f"blob {{path}}")

          if blob(MANIFEST) != EXPECTED_MANIFEST_BLOB: fail("accepted manifest blob")
          if blob(REVIEW) != EXPECTED_REVIEW_BLOB: fail("Chapter 22 review blob")
          if blob(LOCK) != EXPECTED_LOCK_BLOB: fail("Chapter 22 mission-lock blob")

          review = (ROOT / REVIEW).read_text(encoding="utf-8")
          if "## 25. Explicit verdict\n\n**ACCEPT**" not in review: fail("explicit ACCEPT verdict")
          for phrase in ("basically accepted", "provisionally canon", "accepted pending cleanup", "mostly ready"):
              if phrase.lower() in review.lower(): fail(f"ambiguous verdict phrase: {{phrase}}")

          manifest = (ROOT / MANIFEST).read_text(encoding="utf-8")
          required_manifest = ["accepted_words: 116807", "chapter: 22", 'eastern: "13:12:44 EDT"', 'india: "22:42:44 IST"',
                               'path: "books/book-01/manuscript/chapters/chapter-22.md"']
          if any(item not in manifest for item in required_manifest): fail("manifest synchronization")

          counted = subprocess.run([sys.executable, "tools/count_book1_words.py", "--expect", str(EXPECTED_TOTAL)], cwd=ROOT)
          if counted.returncode: fail("accepted word count")
          if sum(EXPECTED_CHAPTERS[p][0] for p in EXPECTED_CHAPTERS) != EXPECTED_ACT_III: fail("Act III subtotal constant")

          if (ROOT / "books/book-01/drafts/chapter-22.md").exists(): fail("Chapter 22 draft remains")
          tracked = subprocess.check_output(["git", "ls-files"], cwd=ROOT, text=True).splitlines()
          duplicates = [p for p in tracked if (ROOT / p).is_file() and blob(p) == "{CH22_BLOB}"]
          if duplicates != ["books/book-01/manuscript/chapters/chapter-22.md"]: fail(f"Chapter 22 duplicate paths: {{duplicates}}")

          forbidden_paths = [
              "books/book-01/manuscript/chapters/chapter-23.md", "books/book-01/drafts/chapter-23.md",
          ]
          if any((ROOT / p).exists() for p in forbidden_paths): fail("Chapter 23 prose exists")
          for p in tracked:
              low = p.lower()
              if p.startswith("books/book-01/control/") and "chapter-23" in low: fail(f"Chapter 23 control exists: {{p}}")
              if ("remainder" in low and "outline" in low) or ("act-iii" in low and "outline" in low): fail(f"complete remainder outline artifact: {{p}}")

          for path in AFFECTED_MARKERS:
              text = (ROOT / path).read_text(encoding="utf-8")
              if text.count("<!-- CH22_ACCEPTED_STATE_START -->") != 1 or text.count("<!-- CH22_ACCEPTED_STATE_END -->") != 1:
                  fail(f"accepted-state marker {{path}}")

          sync_files = ["PROJECT_STATE.yaml", "README.md", "books/book-01/manuscript/STATUS.md", "books/book-01/drafts/README.md",
                        "books/book-01/control/README.md", "books/book-01/control/16-chapter-by-chapter-status-record.md",
                        "books/book-01/control/18-act-iii-entry-state.md", "books/book-01/control/20-control-pack-maintenance-rules.md",
                        "books/book-01/control/23-word-budget-and-act-iii-architecture.md", "books/book-01/control/24-thread-disposition-matrix.md"]
          for path in sync_files:
              text = (ROOT / path).read_text(encoding="utf-8")
              if "116,807" not in text and "accepted_words: 116807" not in text: fail(f"accepted total missing in {{path}}")
              if "13:12:44" not in text: fail(f"endpoint missing in {{path}}")

          protected = ["books/book-01/manuscript/prologue.md"] + [f"books/book-01/manuscript/chapters/chapter-{{i:02d}}.md" for i in range(1, 22)]
          if subprocess.run(["git", "diff", "--quiet", BASE, "--", *protected], cwd=ROOT).returncode != 0:
              fail("accepted Prologue or Chapters 1-21 changed")

          changed = set(subprocess.check_output(["git", "diff", "--name-only", BASE, "--"], cwd=ROOT, text=True).splitlines())
          unexpected = changed - ALLOWED_CHANGED
          if unexpected: fail(f"unexpected changed files: {{sorted(unexpected)}}")
          required = {{REVIEW, "books/book-01/manuscript/chapters/chapter-22.md", "books/book-01/drafts/chapter-22.md", MANIFEST, "tools/validate_book1_chapter22.py"}}
          if not required.issubset(changed): fail(f"missing required changed files: {{sorted(required - changed)}}")

          for p in changed:
              name = Path(p).name.lower()
              if any(token in name for token in ("tmp", "temp", "helper", "payload", "runner", "debug", "apply", "latest", "backup")) or name.endswith((".orig", ".rej")):
                  fail(f"forbidden temporary/helper artifact: {{p}}")

          if subprocess.run(["git", "diff", "--check", BASE, "--"], cwd=ROOT).returncode != 0:
              fail("git diff --check")

          print("PASS: accepted Book 1 through Chapter 22 is synchronized and protected")
          '''
          write("tools/validate_book1_chapter22.py", textwrap.dedent(validator))

          # Final local verification before commit.
          subprocess.run(["python3", "tools/count_book1_words.py", "--expect", "116807"], check=True)
          subprocess.run(["python3", "tools/validate_book1_chapter22.py"], check=True)
          subprocess.run(["git", "diff", "--check", BASE, "--"], check=True)
          PY

