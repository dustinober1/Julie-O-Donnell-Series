            version: '2.2'
            status: locked for new chapter production and revision passes
            guide: docs/Julie_ODonnell_Narrative_House_Style_v2_2.md
            v2_1_supplement: docs/Julie_ODonnell_Narrative_House_Style_v2_1.md
            v2_base: docs/Julie_ODonnell_Narrative_House_Style_v2.md
            authority: Craft control only; accepted manuscript and canon controls remain superior.

          production_rules:
            - Accepted manuscript prose outranks every summary, plan, tracker, draft, and external snapshot.
            - No unaccepted chapter may live under books/book-01/manuscript/.
            - Protected accepted Chapters 1-22 remain byte-identical unless a later explicit acceptance review authorizes change.
            - Request identity, construction mechanism, authority binding, release act, registered authority, physical act, custody, carrier assignment, authorization, knowledge, intent, and command remain separate proof categories.
            - A certified derivative never replaces its independently controlled original.
            - A no-use hold preserves state and custody; it does not authenticate prior operation.
            - Chapter 23 prose and mission lock do not exist.
            - No complete chapter-by-chapter remainder-of-Act-III outline exists or is authorized.
            - No draft or revision may imitate or closely emulate the recognizable prose of a living author.

          archive:
            legacy_source_policy: archive/legacy-sources/README.md
            former_google_doc_active: false
            uploaded_word_snapshot_active: false
