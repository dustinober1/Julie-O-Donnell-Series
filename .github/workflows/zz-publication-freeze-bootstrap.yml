name: Publication Freeze Bootstrap Diagnostic

on:
  push:
    branches:
      - agent/book1-publication-master-freeze

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Confirm runner startup
        run: |
          echo "runner-started"
          uname -a
          python3 --version
          ruby --version
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Package clean checkout
        run: |
          git status --short
          tar --exclude=.git -czf /tmp/julie-odonnell-series-main.tar.gz .
      - name: Upload clean checkout
        uses: actions/upload-artifact@v4
        with:
          name: publication-freeze-bootstrap
          path: /tmp/julie-odonnell-series-main.tar.gz
          if-no-files-found: error
          retention-days: 1
