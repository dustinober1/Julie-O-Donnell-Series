name: Diagnose Book 1 manuscript hashes

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/restore-book1-manuscript-files'
    runs-on: ubuntu-latest

    steps:
      - name: Check out correction branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Record reconstructed hashes
        shell: bash
        run: |
          set -euo pipefail

          if [ -f .migration/hash-diff.txt ] || [ -f .migration/hashes-ok.txt ]; then
            echo "Hash diagnostics already recorded."
            exit 0
          fi

          mkdir -p /tmp/reconstructed
          for n in $(seq -w 1 12); do
            cat .migration/book1/chapter-${n}/part-*.md > /tmp/reconstructed/chapter-${n}.md
          done

          cat > /tmp/expected.sha256 <<'EOF'
          c81c916e394fd7709dd2f250d3f2443781dd1b7dcd287106ad6cf3f4d1edb1d1  chapter-01.md
          9bf38dcf9cda9abe5dcd0e9399af93198400e0b2ccddaa11c6eedbb5ba5e1a76  chapter-02.md
          35358991f25f4a38b9dbde15c93b50019590c82aaeb5ae2ecdbdcf152b9ce918  chapter-03.md
          e3f6029f069096b57f24f3b2c140ad2783c09a125967db4dacb1e93b6df3db09  chapter-04.md
          6d84964e331a50fa250a6e6e50f004401ae7f5cfc5dccc5d72245e5d56556cbb  chapter-05.md
          d7411c7acd2e28cae12b5509d4157be2b87f114f7f17338b17f5cb8da0ef463f  chapter-06.md
          a0d222a33a0cd9fd60701bdf2203c35a60056d27f34284b9ec044e52bfe72b90  chapter-07.md
          a97b538e1bcdab945ebcd442eaa90a67243d2b9855f141b63df328860c39ea5c  chapter-08.md
          533c5f5b7e5f3083caaca8ae78265a9875635a248172ebf1d9c1e60614d4be3f  chapter-09.md
          6112f20db18ad34f949face0340e7ff967ecdfffb683ad5d434b2055a78a8eac  chapter-10.md
          20443d11d2504545a22d4b11c7d906ace27340b3a228cc3f274b07f48e3f3204  chapter-11.md
          ab8e74e1f526d74946642df8d04e523bafefa4c11983433e6e4b972128279640  chapter-12.md
          EOF
          sed -i 's/^          //' /tmp/expected.sha256

          (
            cd /tmp/reconstructed
            sha256sum chapter-*.md
          ) > .migration/actual.sha256

          if diff -u /tmp/expected.sha256 .migration/actual.sha256 > .migration/hash-diff.txt; then
            rm .migration/hash-diff.txt
            echo "All chapter hashes match." > .migration/hashes-ok.txt
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .migration/actual.sha256 .migration/hash-diff.txt .migration/hashes-ok.txt 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No diagnostic changes."
            exit 0
          fi

          git commit -m 'Record manuscript hash diagnostics'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
