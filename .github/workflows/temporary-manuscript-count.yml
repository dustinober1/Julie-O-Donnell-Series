name: Temporary baseline tree export

on:
  pull_request:
    branches:
      - main

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve baseline tree
        shell: bash
        run: |
          git fetch --no-tags --depth=1 origin a426b7c98867dfb939ca5f406830126e89307f44
          git rev-parse 'a426b7c98867dfb939ca5f406830126e89307f44^{tree}' > baseline-tree.txt
          cat baseline-tree.txt
      - name: Upload baseline tree
        uses: actions/upload-artifact@v4
        with:
          name: baseline-tree
          path: baseline-tree.txt
          if-no-files-found: error
