name: Temporary clean-main export

on:
  push:
    branches:
      - agent/chapter-13-acceptance-pass
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Archive exact current main
        shell: bash
        run: |
          git rev-parse HEAD > main-commit.txt
          git rev-parse 'HEAD^{tree}' > main-tree.txt
          git ls-files -z | tar --null -T - -czf julie-book1-clean-main.tar.gz
          sha256sum julie-book1-clean-main.tar.gz > julie-book1-clean-main.tar.gz.sha256
      - name: Upload clean main archive
        uses: actions/upload-artifact@v4
        with:
          name: julie-book1-clean-main
          path: |
            julie-book1-clean-main.tar.gz
            julie-book1-clean-main.tar.gz.sha256
            main-commit.txt
            main-tree.txt
          if-no-files-found: error
