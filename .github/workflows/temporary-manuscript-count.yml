name: Temporary repository source export

on:
  pull_request:
    branches:
      - main

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package repository tree
        shell: bash
        run: git archive --format=tar.gz --output=repo-source.tgz HEAD
      - name: Upload repository package
        uses: actions/upload-artifact@v4
        with:
          name: repo-source
          path: repo-source.tgz
          if-no-files-found: error
