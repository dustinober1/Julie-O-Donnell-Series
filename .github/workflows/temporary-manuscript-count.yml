name: Temporary Chapter 13 patch export

on:
  push:
    branches:
      - agent/chapter-13-acceptance-pass
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruct and validate staged patch
        shell: bash
        run: |
          {
            base64 --decode .tmp/ch13-patch-00
            base64 --decode .tmp/ch13-patch-01
          } | gzip --decompress > ch13-acceptance.patch
          sha256sum ch13-acceptance.patch | tee ch13-acceptance.patch.sha256
          git apply --stat ch13-acceptance.patch | tee ch13-acceptance.patch.stat
          git apply --check ch13-acceptance.patch
      - name: Upload staged patch
        uses: actions/upload-artifact@v4
        with:
          name: ch13-acceptance-patch
          path: |
            ch13-acceptance.patch
            ch13-acceptance.patch.sha256
            ch13-acceptance.patch.stat
          if-no-files-found: error
