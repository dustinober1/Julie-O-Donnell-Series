name: Temporary Chapter 13 staging export

on:
  push:
    branches:
      - agent/chapter-13-acceptance-pass
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Export raw staging chunks and baseline tree
        shell: bash
        run: |
          cp .tmp/ch13-patch-00 raw-ch13-patch-00.txt
          cp .tmp/ch13-patch-01 raw-ch13-patch-01.txt
          wc -c raw-ch13-patch-00.txt raw-ch13-patch-01.txt | tee staging-sizes.txt
          sha256sum raw-ch13-patch-00.txt raw-ch13-patch-01.txt | tee staging-sha256.txt
          git fetch --no-tags --depth=1 origin a426b7c98867dfb939ca5f406830126e89307f44
          git rev-parse 'a426b7c98867dfb939ca5f406830126e89307f44^{tree}' > baseline-tree.txt
      - name: Upload raw staging export
        uses: actions/upload-artifact@v4
        with:
          name: ch13-raw-staging-export
          path: |
            raw-ch13-patch-00.txt
            raw-ch13-patch-01.txt
            staging-sizes.txt
            staging-sha256.txt
            baseline-tree.txt
          if-no-files-found: error
