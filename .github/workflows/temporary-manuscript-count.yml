name: Temporary manuscript source export

on:
  pull_request:
    branches:
      - main

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package controlling Markdown inventory
        shell: bash
        run: |
          tar -czf manuscript-source.tgz \
            books/book-01/ACCEPTED_MANUSCRIPT.yaml \
            books/book-01/manuscript \
            books/book-01/drafts/chapter-13.md
      - name: Upload source package
        uses: actions/upload-artifact@v4
        with:
          name: manuscript-source
          path: manuscript-source.tgz
          if-no-files-found: error
