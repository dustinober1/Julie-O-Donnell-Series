name: Install Book 1 documentation

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/install-documentation.yml"

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct documentation
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/payload-*.txt > /tmp/julie-repo-payload.txt
          echo "935e8373d88a9f909639f1e8861de563f1b809e2023767e48a5c94f4c43e5d57  /tmp/julie-repo-payload.txt" | sha256sum -c -
          python - <<'PY'
          from pathlib import Path

          payload = Path("/tmp/julie-repo-payload.txt").read_bytes()
          pos = 0
          magic = b"JULIE_REPO_PAYLOAD_V1\n"
          if not payload.startswith(magic):
              raise SystemExit("Invalid payload magic")
          pos = len(magic)

          installed = []
          while True:
              if payload.startswith(b"@@DONE\n", pos):
                  pos += len(b"@@DONE\n")
                  break
              line_end = payload.index(b"\n", pos)
              header = payload[pos:line_end].decode("ascii")
              pos = line_end + 1
              marker, path_len, data_len = header.split()
              if marker != "@@FILE":
                  raise SystemExit(f"Invalid header: {header}")
              path_len = int(path_len)
              data_len = int(data_len)
              rel = payload[pos:pos + path_len].decode("utf-8")
              pos += path_len
              data = payload[pos:pos + data_len]
              pos += data_len
              if payload[pos:pos + len(b"\n@@END\n")] != b"\n@@END\n":
                  raise SystemExit(f"Invalid terminator for {rel}")
              pos += len(b"\n@@END\n")
              target = Path(rel)
              if target.is_absolute() or ".." in target.parts:
                  raise SystemExit(f"Unsafe path: {rel}")
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(data)
              installed.append(rel)

          if pos != len(payload):
              raise SystemExit("Trailing payload bytes")
          if len(installed) != 28:
              raise SystemExit(f"Expected 28 files, installed {len(installed)}")
          print(f"Installed {len(installed)} documentation files")
          PY
          rm -rf .bootstrap
          rm -f .github/workflows/install-documentation.yml

      - name: Commit documentation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Install Book 1 canon documentation"
          git push origin HEAD:main
