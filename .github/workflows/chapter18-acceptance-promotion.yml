name: One-time Chapter 18 acceptance promotion

on:
  push:
    branches:
      - agent/chapter-18-acceptance-review
    paths:
      - ".github/ch18-promotion-ready"
  pull_request:
    branches:
      - main
    paths:
      - ".github/ch18-promotion-ready"

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          ref: agent/chapter-18-acceptance-review
          fetch-depth: 0

      - name: Reconstruct and verify promotion script
        shell: bash
        run: |
          set -euo pipefail
          cat .github/ch18-promotion-parts/part*.b64 | base64 --decode | gzip --decompress > tools/promote_chapter18_acceptance.py
          echo "264ad42a5e3f0b3df95a1cf534de9db794277077d3174669f79036a54e566d67  tools/promote_chapter18_acceptance.py" | sha256sum --check --strict
          python -m py_compile tools/promote_chapter18_acceptance.py

      - name: Apply and validate synchronized acceptance
        run: python tools/promote_chapter18_acceptance.py

      - name: Commit accepted Chapter 18 state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Accept and promote Chapter 18 — The Local Record"
          git push origin HEAD:agent/chapter-18-acceptance-review
