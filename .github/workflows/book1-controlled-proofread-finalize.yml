name: Finalize Book 1 Controlled Proofread

on:
  push:
    branches:
      - agent/book1-controlled-final-proofread

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/book1-controlled-final-proofread

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decode finalizer
        shell: bash
        run: |
          base64 -d tools/finalize_book1_proofread.py.gz.b64 | gunzip > tools/finalize_book1_proofread.py
          python -m py_compile tools/finalize_book1_proofread.py

      - name: Prepare manifest and proofread controls
        run: python tools/finalize_book1_proofread.py prepare

      - name: Run complete local verification
        shell: bash
        run: |
          set -euo pipefail
          LOG=/tmp/book1-final-proofread-validation.txt
          : > "$LOG"
          run_check() {
            echo "COMMAND: $*" | tee -a "$LOG"
            "$@" 2>&1 | tee -a "$LOG"
            echo "RESULT: PASS" | tee -a "$LOG"
            echo | tee -a "$LOG"
          }

          run_check python -m unittest discover -s tools -p 'test_*.py' -v
          run_check python tools/count_book1_words.py --expect 105155
          run_check python tools/validate_book1_publication_readiness.py
          run_check python tools/analyze_book1_revision.py
          run_check python tools/analyze_book1_publication_style.py
          run_check python tools/compile_book1_from_manifest.py --output /tmp/Veridrift_ACCEPTED.md
          run_check python tools/verify_book1_revision.py
          run_check python -m py_compile tools/count_book1_words.py tools/validate_book1_publication_readiness.py tools/verify_book1_revision.py
          run_check ruby -e "require 'yaml'; YAML.load_file('PROJECT_STATE.yaml'); YAML.load_file('books/book-01/ACCEPTED_MANUSCRIPT.yaml')"
          run_check bash -c "tail -n 1 /tmp/Veridrift_ACCEPTED.md | grep -Fx 'The bubble stayed centered.'"
          run_check test -s /tmp/Veridrift_ACCEPTED.md.build.json

          python - <<'PY' 2>&1 | tee -a "$LOG"
          import hashlib
          import re
          from pathlib import Path

          manifest = Path('books/book-01/ACCEPTED_MANUSCRIPT.yaml').read_text(encoding='utf-8')
          block = manifest.split('\nexcluded_from_canon:', 1)[0]
          entries = re.findall(
              r'^  - path: "([^"]+)"\n    title: "([^"]+)"\n    accepted_on: "([^"]+)"\n    words: (\d+)\n    sha256: "([0-9a-f]{64})"$',
              block,
              re.MULTILINE,
          )
          assert len(entries) == 25, len(entries)
          expected = ['books/book-01/manuscript/prologue.md'] + [f'books/book-01/manuscript/chapters/chapter-{i:02d}.md' for i in range(1, 25)]
          assert [row[0] for row in entries] == expected
          total = 0
          for path, _title, _date, words, digest in entries:
              data = Path(path).read_bytes()
              text = data.decode('utf-8')
              assert len(text.split()) == int(words), path
              assert hashlib.sha256(data).hexdigest() == digest, path
              assert "'" not in text, path
              assert '\r' not in text, path
              for line_no, line in enumerate(text.splitlines(), 1):
                  assert '\t' not in line, (path, line_no)
                  assert line.rstrip(' ') == line, (path, line_no)
                  assert not any(token in line for token in ('<<<<<<<', '=======', '>>>>>>>', 'TODO', 'TBD')), (path, line_no)
              total += int(words)
          assert total == 105155, total
          assert Path(expected[-1]).read_text(encoding='utf-8').rstrip().endswith('The bubble stayed centered.')
          chapter25 = [p for p in Path('books/book-01').rglob('*') if p.is_file() and re.search(r'chapter[-_ ]?25', p.name, re.I) and 'archive' not in p.parts]
          assert not chapter25, chapter25
          changed = set(filter(None, __import__('subprocess').check_output(['git', 'diff', '--name-only', '08c6ebd6e3447f04165bb166f219238c99673777', '--', 'books/book-01/manuscript'], text=True).splitlines()))
          expected_changed = {f'books/book-01/manuscript/chapters/chapter-{n:02d}.md' for n in (2, 8, 16, 17, 18, 19, 21, 22, 23, 24)}
          assert changed == expected_changed, changed
          print('MANUAL/STRUCTURAL VERIFICATION: PASS')
          print('ACCEPTED_FILE_COUNT=25')
          print('TOTAL_ACCEPTED_WORDS=105155')
          print('CHAPTER_25_FILE_COUNT=0')
          print('FINAL_LINE=The bubble stayed centered.')
          PY
          echo "RESULT: PASS" | tee -a "$LOG"
          echo | tee -a "$LOG"

          git restore --worktree -- artifacts 2>/dev/null || true
          git clean -fd artifacts 2>/dev/null || true
          rm -f tools/finalize_book1_proofread.py.gz.b64 .github/workflows/book1-controlled-proofread-finalize.yml
          git diff --check 2>&1 | tee -a "$LOG"
          echo "COMMAND: git diff --check" >> "$LOG"
          echo "RESULT: PASS" >> "$LOG"
          echo >> "$LOG"

          python tools/finalize_book1_proofread.py finalize --log "$LOG"
          rm -f tools/finalize_book1_proofread.py
          git diff --check

      - name: Commit finalized proofread
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          test ! -e tools/finalize_book1_proofread.py.gz.b64
          test ! -e .github/workflows/book1-controlled-proofread-finalize.yml
          git add -A
          git diff --cached --check
          git commit -m "proofread: finalize Book 1 controlled pass"
          git push origin HEAD:agent/book1-controlled-final-proofread
