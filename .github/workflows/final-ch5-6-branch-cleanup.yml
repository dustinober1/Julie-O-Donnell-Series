name: Final Chapter 5-6 branch cleanup

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  issues: write

jobs:
  cleanup:
    if: github.event.comment.body == '/cleanup-ch5-6-branches'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Delete temporary branches and self-remove
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          for branch in \
            agent/ch5-6-continuity-repair-staging \
            agent/ch5-6-event-base \
            agent/ch5-6-integration-payload \
            agent/migrate-book1-manuscript-pr-check \
            agent/private-book1-migration-bundle \
            agent/restore-book1-manuscript-files \
            agent/run-ch5-6-integration \
            agent/diagnose-ch5-6-integration \
            agent/finalize-ch5-6-verification-metadata; do
            git push origin --delete "$branch" 2>/dev/null || true
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/final-ch5-6-branch-cleanup.yml
          git diff --cached --check
          git commit -m "Remove final Chapter 5-6 cleanup machinery"
          git push origin HEAD:main

          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Temporary Chapter 5-to-6 branches deleted and the cleanup workflow removed. Final cleanup commit: $(git rev-parse HEAD)"
          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --reason completed
