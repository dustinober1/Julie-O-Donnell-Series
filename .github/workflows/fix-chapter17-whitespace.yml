name: Fix Chapter 17 whitespace

on:
  push:
    branches: [agent/chapter-17-first-draft]
    paths:
      - ".github/workflows/fix-chapter17-whitespace.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/chapter-17-first-draft
          fetch-depth: 0
          show-progress: false

      - name: Strip trailing whitespace and remove temporary workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path('books/book-01/drafts/chapter-17.md'),
              Path('PROJECT_STATE.yaml'),
              Path('README.md'),
              Path('books/book-01/control/00-overview.md'),
              Path('books/book-01/control/02-current-project-state.md'),
              Path('books/book-01/control/16-chapter-by-chapter-status-record.md'),
              Path('books/book-01/control/18-act-iii-entry-state.md'),
              Path('books/book-01/control/20-control-pack-maintenance-rules.md'),
              Path('books/book-01/control/23-word-budget-and-act-iii-architecture.md'),
              Path('books/book-01/control/README.md'),
              Path('books/book-01/drafts/README.md'),
              Path('books/book-01/manuscript/STATUS.md'),
              Path('.github/workflows/book1-manuscript-validation.yml'),
          ]
          for path in paths:
              text = path.read_text(encoding='utf-8')
              cleaned = '\n'.join(line.rstrip() for line in text.splitlines()) + '\n'
              path.write_text(cleaned, encoding='utf-8')
          PY
          rm .github/workflows/fix-chapter17-whitespace.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Remove trailing whitespace from Chapter 17 production files"
          git push origin HEAD:agent/chapter-17-first-draft
