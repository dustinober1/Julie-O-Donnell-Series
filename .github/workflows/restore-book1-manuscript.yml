name: Integrate accepted Chapter 5-6 continuity repair

on:
  workflow_dispatch:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: book1-chapter5-6-integration
  cancel-in-progress: true

jobs:
  integrate:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.comment.body == '/integrate-ch5-6')
    runs-on: ubuntu-latest
    steps:
      - name: Initialize diagnostics
        shell: bash
        run: |
          : > /tmp/ch5repair.log
          echo "event=${{ github.event_name }}" | tee -a /tmp/ch5repair.log
          echo "trigger_sha=${{ github.sha }}" | tee -a /tmp/ch5repair.log
          echo "run_id=${{ github.run_id }}" | tee -a /tmp/ch5repair.log
          echo "run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" | tee -a /tmp/ch5repair.log

      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Confirm runner and checkout
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "checkout_succeeded"
            git status --short --branch
            git rev-parse HEAD
            python3 --version
          } 2>&1 | tee -a /tmp/ch5repair.log

      - name: Fetch and verify integration payload
        shell: bash
        run: |
          set -euo pipefail
          {
            git fetch origin agent/ch5-6-integration-payload:refs/remotes/origin/agent/ch5-6-integration-payload
            mapfile -t parts < <(
              git ls-tree -r --name-only origin/agent/ch5-6-integration-payload tools/.ch5repair |
              grep '^tools/.ch5repair/source-' |
              sort
            )
            echo "payload_parts=${#parts[@]}"
            test "${#parts[@]}" -eq 14
            : > /tmp/integrate_ch5_6.py
            for part in "${parts[@]}"; do
              echo "materializing $part"
              git show "origin/agent/ch5-6-integration-payload:$part" >> /tmp/integrate_ch5_6.py
            done
            actual_hash="$(sha256sum /tmp/integrate_ch5_6.py | awk '{print $1}')"
            echo "payload_sha256=$actual_hash"
            echo "recorded_sha256=ea90a17181d0331ed9a44dddd19edbef175f6f4570ff54b9d6a5773234ad676c"
            test "$actual_hash" = "ea90a17181d0331ed9a44dddd19edbef175f6f4570ff54b9d6a5773234ad676c"
            python3 -m py_compile /tmp/integrate_ch5_6.py
          } 2>&1 | tee -a /tmp/ch5repair.log

      - name: Adapt verified payload to live repository state
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' 2>&1 | tee -a /tmp/ch5repair.log
          from pathlib import Path

          script_path = Path('/tmp/integrate_ch5_6.py')
          script = script_path.read_text(encoding='utf-8')
          replacements = [
              (
                  'STARTING_HEAD = "01e3590f6da1a860b63666045e50cb55239c0b80"',
                  'STARTING_HEAD = "454c925adb3a66c8a5f3556128e030856c83de13"',
                  'verification-pass starting commit',
              ),
              (
                  'INTEGRATION_DATE = "2026-07-11"',
                  'INTEGRATION_DATE = "2026-07-12"',
                  'actual integration date',
              ),
              (
                  '"“And even if we succeed, the review may not finish before certification.”",',
                  '"And even if we succeed, the review may not finish before certification.",',
                  'embedded Chapter 4 old sentence',
              ),
              (
                  '"“And even if we succeed, the review may not finish before source certification.”",',
                  '"And even if we succeed, the review may not finish before source certification.",',
                  'embedded Chapter 4 new sentence',
              ),
              (
                  '"The red emergency strobes came on before the alarm.",',
                  '"The red strobes beyond L3-7 accelerated.",',
                  'accepted red-strobe handoff assertion',
              ),
              (
                  '"He threw the aluminum case under the descending steel.",',
                  '"He threw the aluminum case beneath the descending steel.",',
                  'accepted evidence-case handoff assertion',
              ),
          ]
          for old, new, label in replacements:
              count = script.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one payload literal, found {count}')
              script = script.replace(old, new, 1)
          script_path.write_text(script, encoding='utf-8')

          chapter = Path('books/book-01/manuscript/chapters/chapter-04.md').read_text(encoding='utf-8')
          needle = 'And even if we succeed, the review may not finish before certification.'
          print(f'chapter4_risk_substring_matches={chapter.count(needle)}')
          if chapter.count(needle) != 1:
              raise SystemExit('Chapter 4 stable risk substring is not unique.')
          PY
          python3 -m py_compile /tmp/integrate_ch5_6.py

      - name: Apply and validate repair
        shell: bash
        run: |
          set -euo pipefail
          python3 /tmp/integrate_ch5_6.py 2>&1 | tee -a /tmp/ch5repair.log

      - name: Commit integration and record immutable SHA
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add -A
            git diff --cached --check
            git diff --cached --stat
            git commit -m "Integrate accepted Chapter 5-6 continuity repair"
            integration_sha="$(git rev-parse HEAD)"
            echo "integration_sha=$integration_sha" >> "$GITHUB_OUTPUT"

            python3 - "$integration_sha" <<'PY'
          from pathlib import Path
          import sys

          placeholder = "__INTEGRATION_COMMIT_SHA__"
          sha = sys.argv[1]
          replacements = 0
          for path in Path(".").rglob("*"):
              if not path.is_file() or ".git" in path.parts:
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              count = text.count(placeholder)
              if count:
                  path.write_text(text.replace(placeholder, sha), encoding="utf-8")
                  replacements += count

          if replacements == 0:
              raise SystemExit("No integration SHA placeholders were found.")
          print(f"Recorded {sha} in {replacements} repository locations.")
          PY

            if git grep -n "__INTEGRATION_COMMIT_SHA__"; then
              echo "Unresolved integration SHA placeholder remains."
              exit 1
            fi

            git add -A
            git diff --cached --check
            git diff --cached --stat
            git commit -m "Record verified Chapter 5-6 integration state"
            verification_sha="$(git rev-parse HEAD)"
            echo "verification_sha=$verification_sha" >> "$GITHUB_OUTPUT"
            git push origin HEAD:main
          } 2>&1 | tee -a /tmp/ch5repair.log

      - name: Delete temporary repair branches
        if: success()
        shell: bash
        run: |
          set +e
          for branch in \
            agent/ch5-6-integration-payload \
            agent/ch5-6-continuity-repair-staging \
            agent/ch5-6-event-base \
            agent/run-ch5-6-integration \
            agent/diagnose-ch5-6-integration \
            agent/migrate-book1-manuscript-pr-check \
            agent/private-book1-migration-bundle \
            agent/restore-book1-manuscript-files; do
            git push origin --delete "$branch"
          done
          exit 0

      - name: Final runner readback
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Ending HEAD: $(git rev-parse HEAD)"
            git log -2 --oneline
            test "$(find books/book-01/manuscript/chapters -maxdepth 1 -name 'chapter-*.md' | wc -l)" -eq 12
            grep -F "# Chapter 5 - The Second Clock" books/book-01/manuscript/chapters/chapter-05.md
            grep -F "# Chapter 6 - The Descent" books/book-01/manuscript/chapters/chapter-06.md
            grep -F "# Chapter 7 - The Human Key" books/book-01/manuscript/chapters/chapter-07.md
            grep -F "The hydraulic shutter came down hard enough to shake dust from the concrete ceiling." books/book-01/manuscript/chapters/chapter-06.md
            test ! -e .github/workflows/restore-book1-manuscript.yml
          } 2>&1 | tee -a /tmp/ch5repair.log

      - name: Report success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          target="${{ github.event.issue.number }}"
          test -n "$target" || target="6"
          gh issue comment "$target" --repo "${{ github.repository }}" --body "Chapter 5-to-6 integration completed. Integration commit: ${{ steps.commit.outputs.integration_sha }}. Verification commit: ${{ steps.commit.outputs.verification_sha }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          target="${{ github.event.issue.number }}"
          test -n "$target" || target="6"
          {
            echo "Chapter 5-to-6 integration failed."
            echo
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "Diagnostic tail:"
            echo
            echo '```text'
            tail -c 50000 /tmp/ch5repair.log || true
            echo
            echo '```'
          } > /tmp/failure-comment.md
          gh issue comment "$target" --repo "${{ github.repository }}" --body-file /tmp/failure-comment.md