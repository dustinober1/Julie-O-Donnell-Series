name: Prepare accepted Chapter 5-6 continuity repair

on:
  pull_request:
    branches:
      - main
      - agent/ch5-6-event-base
    types: [edited, synchronize, reopened]

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'agent/private-book1-migration-bundle'
    runs-on: ubuntu-latest
    steps:
      - name: Check out isolated integration branch
        uses: actions/checkout@v4
        with:
          ref: agent/ch5-6-continuity-repair-staging
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Materialize repository-local integration script
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import zlib
          from pathlib import Path

          parts = sorted(Path('tools/.ch5repair').glob('part*'))
          if len(parts) != 5:
              raise SystemExit(f'Expected five integration payload parts; found {len(parts)}')
          encoded = ''.join(path.read_text(encoding='utf-8') for path in parts)
          script = zlib.decompress(base64.b64decode(encoded))
          Path('tools/integrate_chapter5_6.py').write_bytes(script)
          PY

      - name: Apply and validate accepted repair
        run: python tools/integrate_chapter5_6.py

      - name: Validate patch formatting
        run: git diff --check

      - name: Commit validated staging result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "Prepare accepted Chapter 5-6 continuity repair"
          git push origin HEAD:agent/ch5-6-continuity-repair-staging
