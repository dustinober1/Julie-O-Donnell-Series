name: Temporary Apply Book 1 Copyedit

on:
  push:
    branches:
      - "agent/book1-full-copyedit"
    paths:
      - "tools/apply_book1_copyedit.py"
      - ".github/workflows/agent-book1-copyedit-apply.yml"

permissions:
  contents: write

jobs:
  apply-copyedit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out copyedit branch
        uses: actions/checkout@v4
        with:
          ref: agent/book1-full-copyedit
          fetch-depth: 0

      - name: Apply exact mechanical corrections and regenerate manifest
        run: python3 tools/apply_book1_copyedit.py

      - name: Count accepted Book 1 words
        run: |
          EXPECTED=$(python3 - <<'PY'
          import re
          from pathlib import Path
          text = Path('books/book-01/ACCEPTED_MANUSCRIPT.yaml').read_text(encoding='utf-8')
          match = re.search(r'^total_accepted_words:\s*(\d+)\s*$', text, re.MULTILINE)
          if not match:
              raise SystemExit('manifest missing total_accepted_words')
          print(match.group(1))
          PY
          )
          python3 tools/count_book1_words.py --expect "$EXPECTED"

      - name: Run publication-readiness checks
        run: python3 tools/validate_book1_publication_readiness.py

      - name: Compile permanent Book 1 validators
        run: python3 -m py_compile tools/count_book1_words.py tools/validate_book1_publication_readiness.py tools/verify_book1_revision.py

      - name: Parse synchronized YAML controls
        run: ruby -e "require 'yaml'; YAML.load_file('PROJECT_STATE.yaml'); YAML.load_file('books/book-01/ACCEPTED_MANUSCRIPT.yaml')"

      - name: Run validator and compiler tests
        run: python3 -m unittest discover -s tools -p 'test_*.py' -v

      - name: Generate developmental diagnostics
        run: python3 tools/analyze_book1_revision.py

      - name: Generate publication-style diagnostics
        run: python3 tools/analyze_book1_publication_style.py

      - name: Compile accepted review manuscript
        run: python3 tools/compile_book1_from_manifest.py --output /tmp/Veridrift_ACCEPTED.md

      - name: Verify compiled ending and build sidecar
        run: |
          tail -n 1 /tmp/Veridrift_ACCEPTED.md | grep -Fx 'The bubble stayed centered.'
          test -s /tmp/Veridrift_ACCEPTED.md.build.json

      - name: Run copyedit hygiene checks
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          from tools.count_book1_words import accepted_paths

          errors = []
          for path in accepted_paths():
              text = path.read_text(encoding='utf-8')
              lines = text.splitlines()
              for index, line in enumerate(lines, 1):
                  if line.rstrip() != line:
                      errors.append(f'{path}:{index}: trailing whitespace')
                  if '\t' in line:
                      errors.append(f'{path}:{index}: tab character')
              for pattern in (r'\bTODO\b', r'\bTBD\b', r'\[PLACEHOLDER\]', r'INSERT HERE'):
                  if re.search(pattern, text, re.IGNORECASE):
                      errors.append(f'{path}: unresolved marker matching {pattern}')
              if '\n\n\n\n' in text:
                  errors.append(f'{path}: more than two consecutive blank paragraphs')
          if errors:
              raise SystemExit('\n'.join(errors))
          print('copyedit hygiene checks passed')
          PY

      - name: Diff hygiene
        run: git diff --check

      - name: Remove temporary applicator and workflow
        run: rm tools/apply_book1_copyedit.py .github/workflows/agent-book1-copyedit-apply.yml

      - name: Commit reviewed copyedit
        run: |
          git config user.name "Book 1 Copyedit Agent"
          git config user.email "actions@users.noreply.github.com"
          git add \
            books/book-01/ACCEPTED_MANUSCRIPT.yaml \
            books/book-01/manuscript/chapters/chapter-02.md \
            books/book-01/manuscript/chapters/chapter-04.md \
            books/book-01/manuscript/chapters/chapter-06.md \
            books/book-01/manuscript/chapters/chapter-10.md \
            books/book-01/manuscript/chapters/chapter-12.md \
            books/book-01/control/61-copyedit-style-sheet.md \
            books/book-01/control/62-copyedit-query-log.md \
            tools/apply_book1_copyedit.py \
            .github/workflows/agent-book1-copyedit-apply.yml
          git diff --cached --check
          git commit -m "Copyedit Book 1 accepted manuscript"
          git push origin HEAD:agent/book1-full-copyedit
