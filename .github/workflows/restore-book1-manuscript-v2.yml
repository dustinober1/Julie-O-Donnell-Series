name: Restore Book 1 manuscript files v2

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  restore:
    if: github.head_ref == 'agent/restore-book1-manuscript-files'
    runs-on: ubuntu-latest

    steps:
      - name: Check out correction branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Assemble and validate manuscript
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d .migration/book1 ]; then
            echo "No staging directory remains; manuscript already assembled."
            exit 0
          fi

          mkdir -p books/book-01/manuscript/chapters
          for n in $(seq -w 1 12); do
            cat .migration/book1/chapter-${n}/part-*.md > books/book-01/manuscript/chapters/chapter-${n}.md
          done

          cat > /tmp/expected.sha256 <<'EOF'
          c81c916e394fd7709dd2f250d3f2443781dd1b7dcd287106ad6cf3f4d1edb1d1  books/book-01/manuscript/chapters/chapter-01.md
          9bf38dcf9cda9abe5dcd0e9399af93198400e0b2ccddaa11c6eedbb5ba5e1a76  books/book-01/manuscript/chapters/chapter-02.md
          35358991f25f4a38b9dbde15c93b50019590c82aaeb5ae2ecdbdcf152b9ce918  books/book-01/manuscript/chapters/chapter-03.md
          e3f6029f069096b57f24f3b2c140ad2783c09a125967db4dacb1e93b6df3db09  books/book-01/manuscript/chapters/chapter-04.md
          6d84964e331a50fa250a6e6e50f004401ae7f5cfc5dccc5d72245e5d56556cbb  books/book-01/manuscript/chapters/chapter-05.md
          d7411c7acd2e28cae12b5509d4157be2b87f114f7f17338b17f5cb8da0ef463f  books/book-01/manuscript/chapters/chapter-06.md
          a0d222a33a0cd9fd60701bdf2203c35a60056d27f34284b9ec044e52bfe72b90  books/book-01/manuscript/chapters/chapter-07.md
          a97b538e1bcdab945ebcd442eaa90a67243d2b9855f141b63df328860c39ea5c  books/book-01/manuscript/chapters/chapter-08.md
          533c5f5b7e5f3083caaca8ae78265a9875635a248172ebf1d9c1e60614d4be3f  books/book-01/manuscript/chapters/chapter-09.md
          6112f20db18ad34f949face0340e7ff967ecdfffb683ad5d434b2055a78a8eac  books/book-01/manuscript/chapters/chapter-10.md
          20443d11d2504545a22d4b11c7d906ace27340b3a228cc3f274b07f48e3f3204  books/book-01/manuscript/chapters/chapter-11.md
          ab8e74e1f526d74946642df8d04e523bafefa4c11983433e6e4b972128279640  books/book-01/manuscript/chapters/chapter-12.md
          EOF
          sed -i 's/^          //' /tmp/expected.sha256
          sha256sum -c /tmp/expected.sha256

          python - <<'PY'
          from pathlib import Path
          import re

          root = Path('books/book-01/manuscript')
          chapters = sorted((root / 'chapters').glob('chapter-*.md'))
          assert len(chapters) == 12, len(chapters)
          assert (root / 'prologue.md').exists()

          expected_titles = [
              'The Official Version', 'The Poisoned Feed', 'The Exit Protocol',
              'Burn Notice', 'The Human Key', 'The Descent', 'The Human Key',
              'The 05:00 Abort', 'The Life-Safety Override',
              'The Capital Connection', 'Going Offensive', 'The Sterling Trap'
          ]

          for index, (path, title) in enumerate(zip(chapters, expected_titles), start=1):
              first = path.read_text(encoding='utf-8').splitlines()[0]
              assert first == f'# Chapter {index} - {title}', (path, first)

          files = [root / 'prologue.md', *chapters]
          total = sum(len(re.findall(r"\b[\w’'-]+\b", p.read_text(encoding='utf-8'))) for p in files)
          assert total >= 65000, total
          print(f'Validated 13 manuscript files and approximately {total:,} words.')
          PY

          rm -rf .migration
          rm -f .github/workflows/restore-book1-manuscript.yml
          rm -f .github/workflows/restore-book1-manuscript-v2.yml
          rm -f .github/workflows/diagnose-book1-manuscript.yml

      - name: Commit restored manuscript
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git diff --cached --check
          git commit -m 'Restore accepted Book 1 manuscript files'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
