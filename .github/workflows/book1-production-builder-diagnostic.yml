name: Book 1 Production Builder Diagnostic

on:
  push:
    branches: [agent/book1-production-package]
    paths:
      - ".github/workflows/book1-production-builder-diagnostic.yml"
      - "tools/build_book1_production.py"
      - "tools/build_book1_production.payload.part*"
      - "requirements-production.txt"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/book1-production-builder-diagnostic.yml"
      - "tools/build_book1_production.py"
      - "tools/build_book1_production.payload.part*"
      - "requirements-production.txt"
  workflow_dispatch:

permissions:
  contents: read

env:
  BOOK1_SOURCE_COMMIT: 3a5b93adf59ab0cd84a80a676c16fdf495fd3287
  PYTHONHASHSEED: "0"
  SOURCE_DATE_EPOCH: "1784462400"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check -r requirements-production.txt
      - name: Run builder and retain traceback
        id: builder
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python tools/build_book1_production.py 2>&1 | tee /tmp/book1-production-builder.log
      - name: Upload diagnostic output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: book1-production-builder-diagnostic
          if-no-files-found: warn
          path: |
            /tmp/book1-production-builder.log
            books/book-01/production/
            books/book-01/control/67-production-package-build.md
            books/book-01/control/68-production-proof-query-log.md
            books/book-01/control/69-production-proof-approval.md
      - name: Enforce builder result
        if: steps.builder.outcome != 'success'
        run: exit 1
