name: Chapter 19 acceptance promotion

on:
  push:
    branches:
      - agent/chapter-19-acceptance

permissions:
  contents: write

jobs:
  promote:
    if: github.event.head_commit.message == 'Trigger Chapter 19 acceptance automation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/chapter-19-acceptance

      - name: Install YAML support
        run: python -m pip install --quiet pyyaml

      - name: Review, repair, promote, and synchronize Chapter 19
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          from pathlib import Path
          import re
          import subprocess
          import textwrap
          import yaml

          ROOT = Path('.')
          BOOK = ROOT / 'books/book-01'
          DRAFT = BOOK / 'drafts/chapter-19.md'
          MANUSCRIPT = BOOK / 'manuscript/chapters/chapter-19.md'
          REVIEW = BOOK / 'control/39-chapter-19-acceptance-review.md'
          BASE_SHA = '16252b9d12c010cd663996ff4c63e4704be40d3a'
          MISSION_BLOB = '7b69ff80ed9b0286a52c0a8428792489eb236ef3'
          EXPECTED_WORDS = 5393
          EXPECTED_TOTAL = 103369

          def require(value: bool, message: str) -> None:
              if not value:
                  raise SystemExit(message)

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              require(count == 1, f'{label}: expected one occurrence, found {count}')
              return text.replace(old, new, 1)

          require(DRAFT.is_file(), 'Chapter 19 draft missing')
          require(not MANUSCRIPT.exists(), 'Chapter 19 manuscript already exists')
          require(not REVIEW.exists(), 'Chapter 19 acceptance review already exists')

          prose = DRAFT.read_text(encoding='utf-8')
          require(len(prose.split()) == EXPECTED_WORDS, 'baseline Chapter 19 word count changed')

          revisions = [
              (
                  'Her signed Chapter 17 observation lay open',
                  'Her signed board observation lay open',
                  'remove an in-world chapter-number reference from the board observation',
              ),
              (
                  'No latch had moved after Chapter 17.',
                  'No latch had moved after the board reseal.',
                  'replace production shorthand with the physical custody event',
              ),
              (
                  'the Chapter 17 technical-assistance authorization',
                  'the previously signed technical-assistance authorization',
                  'replace production shorthand with the actual authorization',
              ),
              (
                  'Grant continued because the result was not an absolution and the chapter could not become one.',
                  'Grant continued because the result was not an absolution. The rest of the record still mattered.',
                  'remove explicit metanarrative wording',
              ),
              (
                  'The device certificate matched the legislative chain already captured at WSS-4.',
                  'The device certificate matched the Sterling-office authority identified in incident records.',
                  'avoid implying that the sealed WSS module was examined in Chapter 19',
              ),
          ]
          for old, new, label in revisions:
              prose = replace_once(prose, old, new, label)

          require(len(prose.split()) == EXPECTED_WORDS, 'line repairs changed the locked 5,393-word count')
          require(prose.startswith(
              '10:01:12 EDT / 19:31:12 IST\n\n'
              '# Chapter 19 - The Name on the Record\n\n'
              'Secure MPD Evidence Intake\nWashington, D.C.\n'
          ), 'Chapter 19 opening/title/location changed')
          require('At 10:44:12 EDT / 20:14:12 IST' in prose[-1800:], 'Chapter 19 endpoint missing')
          require(prose.count('Hartwell Executive Briefing Annex') == 1, 'Grant cutaway count changed')
          require('Chapter 17' not in prose, 'production chapter-number reference remains in prose')
          require('the chapter could not' not in prose, 'metanarrative artifact remains in prose')

          DRAFT.write_text(prose, encoding='utf-8')
          DRAFT.replace(MANUSCRIPT)

          prose_blob = subprocess.check_output(['git', 'hash-object', str(MANUSCRIPT)], text=True).strip()
          require(prose_blob != '49d0fc3422cf0318fb5e1ade77f439d4d95b7b11', 'review repairs did not change the prose blob')

          manifest_path = BOOK / 'ACCEPTED_MANUSCRIPT.yaml'
          manifest = manifest_path.read_text(encoding='utf-8')
          manifest = replace_once(manifest, 'accepted_words: 97976', f'accepted_words: {EXPECTED_TOTAL}', 'manifest accepted total')
          manifest = re.sub(
              r'accepted_endpoint:\n  chapter: 18\n  eastern: "10:01:12 EDT"\n  india: "19:31:12 IST"\n  location: .*?\n\naccepted_files:',
              'accepted_endpoint:\n'
              '  chapter: 19\n'
              '  eastern: "10:44:12 EDT"\n'
              '  india: "20:14:12 IST"\n'
              '  location: "secure MPD evidence intake; Alvarez/DCIS named federal receiver; MPD retains all seven packages; Hartwell retains HWA-LCA-1187; SSO-NS-004 current custodian unknown; Sterling public account remains dominant"\n\n'
              'accepted_files:',
              manifest,
              count=1,
              flags=re.S,
          )
          require('chapter: 19' in manifest, 'manifest endpoint replacement failed')
          ch18_entry = textwrap.dedent('''\
            - sequence: 18
              type: "chapter"
              title: "The Local Record"
              path: "books/book-01/manuscript/chapters/chapter-18.md"
          ''')
          ch19_entry = textwrap.dedent('''\
            - sequence: 19
              type: "chapter"
              title: "The Name on the Record"
              path: "books/book-01/manuscript/chapters/chapter-19.md"
          ''')
          require(ch18_entry in manifest, 'Chapter 18 manifest entry not found')
          manifest = manifest.replace(ch18_entry, ch18_entry + ch19_entry, 1)
          manifest = manifest.replace(
              'Unaccepted prose only; no active Book 1 chapter draft after Chapter 18 promotion',
              'Unaccepted prose only; no active Book 1 chapter draft after Chapter 19 promotion',
          )
          manifest_path.write_text(manifest, encoding='utf-8')

          project_path = ROOT / 'PROJECT_STATE.yaml'
          project = yaml.safe_load(project_path.read_text(encoding='utf-8'))
          active = project['active_book']
          budget = active['word_budget']
          budget['accepted_words'] = EXPECTED_TOTAL
          budget['words_to_planning_target'] = 9131
          budget['minimum_words_remaining'] = 0
          budget['maximum_words_remaining'] = 21631
          budget['chapter_19_words'] = EXPECTED_WORDS
          budget['accepted_act_iii_words'] = 39714
          budget.pop('chapter_19_draft_words', None)
          budget.pop('projected_total_if_exact_draft_is_later_accepted', None)
          budget.pop('accepted_count_changed_by_chapter_19_draft', None)

          canon = active['accepted_canon']
          canon['chapters'] = '1-19'
          canon['acts']['act_iii'] = 'Chapters 13-19 accepted'
          canon['endpoint'] = {
              'chapter': 19,
              'eastern': '10:44:12 EDT',
              'india': '20:14:12 IST',
              'location': 'secure MPD evidence intake',
              'status': 'Alvarez/DCIS is named federal receiver; MPD retains all seven packages; Hartwell retains its original; ARJ-K17-ACK-01 remains bounded; SSO-NS-004 current custodian unknown; Sterling public account remains dominant',
          }
          canon['accepted_manuscript_words'] = EXPECTED_TOTAL
          canon['chapter_19'] = {
              'title': 'The Name on the Record',
              'path': 'books/book-01/manuscript/chapters/chapter-19.md',
              'verdict': 'ACCEPT',
              'accepted_words': EXPECTED_WORDS,
              'prose_changed_during_review': True,
              'reviewed_blob_sha': prose_blob,
              'opening': '10:01:12 EDT / 19:31:12 IST',
              'endpoint': '10:44:12 EDT / 20:14:12 IST',
              'pov': 'Julie primary; one bounded Special Agent Leila Grant Hartwell cutaway',
              'custody_status': 'MPD retains all seven packages; Hartwell retains HWA-LCA-1187; Indian originals remain at Forward Post Arjun',
              'receiver_status': 'Miriam Alvarez / DCIS named federal receiver under DCIS-FR-187463-01',
          }

          drafts = active['drafts']
          drafts['active_chapter_drafts'] = []
          drafts['chapter_19'] = 'accepted and promoted; no duplicate draft remains'

          future = active['future_prose']
          future['chapter_19'] = 'accepted at books/book-01/manuscript/chapters/chapter-19.md'
          future['chapter_20_and_later'] = 'not drafted and not individually mission locked'
          future['chapter_19_rule'] = 'Accepted and complete'
          future['chapter_20_rule'] = 'Requires a dedicated mission-lock planning pass before prose'

          controls = active['planning_controls']
          controls['chapter_19_acceptance_review'] = 'books/book-01/control/39-chapter-19-acceptance-review.md'

          active['chapter_19_record'] = {
              'title': 'The Name on the Record',
              'status': 'accepted and promoted; canon',
              'mission_lock': 'books/book-01/control/38-chapter-19-mission-lock.md',
              'review': 'books/book-01/control/39-chapter-19-acceptance-review.md',
              'accepted_path': 'books/book-01/manuscript/chapters/chapter-19.md',
              'draft_exists': False,
              'accepted': True,
              'acceptance_gate_passed': True,
              'accepted_manifest_changed': True,
              'accepted_words_changed': True,
              'accepted_words': EXPECTED_WORDS,
              'reviewed_blob_sha': prose_blob,
              'dominant_function': 'Reconnect the bounded K-17 field result to Washington through one named federal receiving act, then obtain Hartwell’s exact SSO-NS-004 serial and institutional physical-custody chain',
              'opening': '10:01:12 EDT / 19:31:12 IST',
              'endpoint': '10:44:12 EDT / 20:14:12 IST',
              'pov': 'Julie primary; one bounded Special Agent Leila Grant Hartwell cutaway',
              'result': 'Alvarez/DCIS accepts federal receiving responsibility; Julie lawfully learns the bounded no-fire/K-17 result; Hartwell establishes SSO-NS-004 and the office-to-Hartwell custody chain; current signer custody and Sterling’s personal role remain unproved',
              'next_gate': 'Chapter 20 mission-lock planning pass only',
          }

          critical = project['critical_status']
          critical.pop('chapter_19_draft', None)
          critical['chapter_19_acceptance'] = {
              'severity': 'resolved',
              'status': 'ACCEPT; promoted at 5,393 words after five line-level repairs',
              'reviewed_blob_sha': prose_blob,
          }
          critical['next_gate'] = {
              'severity': 'planning',
              'status': 'Prepare the Chapter 20 mission-lock planning pass from the accepted Chapter 19 endpoint; do not draft Chapter 20 until that lock is approved',
          }

          rules = [
              item for item in project.get('production_rules', [])
              if not ('Chapter 19' in item and ('draft' in item.lower() or 'non-canon' in item.lower() or 'may control' in item.lower()))
          ]
          rules.extend([
              'Chapters 13 through 19 are accepted Act III canon.',
              f'Chapter 19 is accepted canon at 5,393 words; its reviewed blob is {prose_blob}.',
              'Chapter 19 promotion does not open, move, connect, combine, or transfer any MPD package.',
              'Registered authority, physical possession, knowledge, and command remain separate proof categories.',
              'No Chapter 20 prose or mission lock exists.',
              'No complete chapter-by-chapter remainder-of-Act-III outline exists or is authorized.',
          ])
          project['production_rules'] = rules
          project['last_updated'] = '2026-07-14'
          project['next_recommended_action'] = 'Prepare the Chapter 20 mission-lock planning pass from the accepted Chapter 19 endpoint. Do not draft Chapter 20 until the lock is approved and do not create a complete remainder-of-Act-III outline.'
          project_path.write_text(yaml.safe_dump(project, sort_keys=False, allow_unicode=True, width=140), encoding='utf-8')

          review = f'''# Chapter 19 Acceptance Review — The Name on the Record

          ## Review identity

          - **Repository:** `dustinober1/Julie-O-Donnell-Series`
          - **Review branch:** `agent/chapter-19-acceptance`
          - **Reviewed baseline commit:** `{BASE_SHA}` (`Draft Chapter 19`)
          - **Baseline drift:** none
          - **Reviewed draft path:** `books/book-01/drafts/chapter-19.md`
          - **Promoted manuscript path:** `books/book-01/manuscript/chapters/chapter-19.md`
          - **Mission lock:** `books/book-01/control/38-chapter-19-mission-lock.md`
          - **Mission-lock blob:** `{MISSION_BLOB}`
          - **Reviewed/promoted prose blob:** `{prose_blob}`
          - **Final title:** **The Name on the Record**
          - **Exact final word count:** **{EXPECTED_WORDS:,}**
          - **Opening:** **10:01:12 EDT / 19:31:12 IST**, secure MPD evidence intake
          - **Endpoint:** **10:44:12 EDT / 20:14:12 IST**, secure MPD evidence intake

          ## Controlling material reviewed

          The review read the accepted-manuscript manifest, project state, README and manuscript status; accepted Chapters 13–18 and the earlier accepted dependencies governing the 05:00 abort, life-safety escape, evidence separation, Northbridge session, Hartwell event, detention, first examination, and K-17 local record; the Chapter 19 mission lock and acceptance gate; the canon, timeline, character, relationship, evidence, knowledge, technology, organization, location, antagonist, public-narrative, open-thread, chapter-status, Act III, ending-contract, word-budget, thread-disposition, maintenance, recurring-character, house-style, and permanent-validation controls.

          ## Mission compliance

          **Pass.** The chapter retains one dominant mission: reconnect the bounded K-17 result to Washington through one named federal receiving act and use that authority to obtain Hartwell’s exact `SSO-NS-004` serial and institutional physical-custody chain. It does not become a general evidence review, courtroom chapter, breach, pursuit, escape, public-exoneration scene, full climax, or Chapter 20 planning vehicle.

          ## Scene-chain audit

          **Pass.** Six scenes form one causal chain: the unclaimed acknowledgment; Alvarez’s complete receiving act; the bounded field result reaching Julie; the sole Grant Hartwell cutaway; the bounded Hartwell finding and recovery request; and Sterling’s public statement colliding with the private lawful record.

          ## POV audit

          **Pass.** Julie remains the primary close-third viewpoint. Exactly one bounded Grant cutaway occurs at Hartwell. No Sterling, Vance, Tariq, Sharma, Chen, Mercer, Bell, Hackett, Alvarez, or unnamed-conspirator private viewpoint appears.

          ## Custody and evidence audit

          **Pass.** MPD retains all seven packages separately and offline. `MPD-901446` remains under replacement seal `MPD-SL-551821`. No MPD package is opened, connected, mounted, examined, moved, combined, or transferred. Alvarez’s DCIS receiving responsibility is explicitly distinct from MPD physical custody. Hartwell retains original `HWA-LCA-1187`; `HWA-CD-187463-01` is a certified derivative. Indian originals remain at Forward Post Arjun. `ARJ-K17-ACK-01`, `DCIS-LM-3106`, and `APX-B3-IR-5521` retain their bounded derivative/index proof limits. WSS-4 is preserved but not decrypted or examined.

          ## Technology and institutional audit

          **Pass.** Every used source has a named controller or custodian, original, clock basis, bounded production method, produced/withheld fields, derivative integrity path, and explicit proof limit. No generic hacking, magical decryption, omniscient camera, universal database, sealed-media shortcut, or certificate-as-human-mind inference appears.

          ## Medical audit

          **Pass.** Julie remains detained with her padded, braced, swollen, materially unusable right wrist and forearm. She leads through questions, scope, and restraint and does not handle evidence, type, fight, drive, lift, or perform delicate work. Marcus remains offstage in guarded medical care on four liters of oxygen at 92–93 percent saturation. Elias remains offstage in separate guarded medical custody without board, module, biometric, remote guidance, or technical action.

          ## Knowledge-firewall audit

          **Pass.** Julie learns the bounded no-fire and K-17 results only after Alvarez’s receiving act. The chapter does not reveal Sharma’s private reasoning, unrestricted K-17 geography, WSS plaintext, the physical K-17 operator, Tariq’s personal role, Vance’s personal keystrokes, the alternate original-deployment actor, the author of the successful remote reconstruction, or private antagonist intent.

          ## Facts established

          - Miriam Alvarez/DCIS is the named federal receiving authority for incident `187463`; MPD retains physical custody.
          - No Indian rounds were fired.
          - K-17 was physically intact at inspection; Security Line One passed.
          - Tariq-registered authority reached the controller; final local authentication failed; the maintenance commit did not execute; local writes remained zero.
          - The superseding product omitted the local events.
          - Hartwell’s exact challenged serial was `SSO-NS-004`; the accepted challenge occurred at **07:47:49 EDT**.
          - The closed case traveled through a credentialed Sterling-office support path, entered Hartwell communications-security custody for the challenge, and returned to the office support path.
          - The dark-overcoat entrant was not the direct challenge presenter at that moment.
          - The signer is no longer at Hartwell; current physical custody is unknown.
          - Chen’s relevant directive and vendor-watch categories remain preserved.
          - Sterling’s public account omits the office-device chain and failed local operation.

          ## Conclusions deliberately not established

          The chapter does not establish Sterling’s personal possession, presentation, operation, knowledge, command, or direction; courier or Hartwell-custodian conspiracy knowledge; Tariq’s physical presence or personal operation; Vance’s personal Payload 88 keystrokes; WSS plaintext; the alternative original-deployment actor; successful remote-reconstruction authorship; full compact-case contents; guilt, innocence, immunity, privilege resolution, admissibility, charge, conviction, exoneration, universal institutional complicity, final recovery of `SSO-NS-004`, or public vindication.

          ## Character and emotional movement

          **Pass.** The no-fire result lands through Julie’s restrained physical attention rather than absolution. She recognizes institutions naming limits before conclusions without granting automatic trust. She accepts the durable office-level chain, refuses an unauthenticated leak, and protects a proof limit that weakens her preferred accusation. Grant’s professional respect grows; Alvarez and Hackett accept reviewable institutional exposure; Chen’s choice remains preservation rather than defection.

          ## Style and line-level assessment

          **Pass after minimal repair.** Close-third control, physical staging, selective technical detail, institutional tension, exact authority dialogue, and short reversal beats satisfy Narrative House Style v2.2. The prose does not imitate or closely emulate a living author.

          ## Revision history during review

          Five line-level repairs were made without changing the 5,393-word count:

          1. Replaced three production-facing “Chapter 17” references with in-world board, reseal, and authorization language.
          2. Removed one explicit metanarrative reference to “the chapter.”
          3. Reworded one Hartwell certificate sentence so it cannot imply that the sealed WSS module was examined.

          No mission, scene, timeline, custody, medical, evidence, knowledge, or endpoint fact changed.

          ## Validation results

          - Final whitespace-delimited Chapter 19 count: **5,393**.
          - New accepted-manuscript total: **103,369**.
          - Mission-lock blob unchanged: `{MISSION_BLOB}`.
          - Chapter 18 protected blob unchanged: `6f5873d6e975ec74646af152aad22ea84545fc01`.
          - Exactly one Chapter 19 prose file exists after promotion, under the manuscript path.
          - No Chapter 19 draft remains.
          - No Chapter 20 prose, Chapter 20 mission lock, or complete remainder-of-Act-III outline exists.
          - Permanent validation and `git diff --check` are required before merge.

          ## Final verdict

          # ACCEPT

          ## Promotion authorization

          **Authorized.** Promote only the exact reviewed prose blob `{prose_blob}` at **5,393 words**; remove the draft copy; update the accepted manifest to **103,369 words** and the endpoint to **10:44:12 EDT / 20:14:12 IST**; synchronize all materially affected controls; and protect the chapter in permanent validation. Do not draft or mission-lock Chapter 20 in this pass.
          '''
          REVIEW.write_text(textwrap.dedent(review), encoding='utf-8')

          marker_start = '<!-- CH19_ACCEPTED_STATE_START -->'
          marker_end = '<!-- CH19_ACCEPTED_STATE_END -->'

          def insert_state(path: str, body: str, *, replace_version: tuple[str, str] | None = None) -> None:
              p = ROOT / path
              require(p.is_file(), f'missing control file: {path}')
              text = p.read_text(encoding='utf-8')
              text = re.sub(
                  rf'\n?{re.escape(marker_start)}.*?{re.escape(marker_end)}\n?',
                  '\n',
                  text,
                  flags=re.S,
              )
              text = re.sub(
                  r'(?ms)^## [^\n]*Chapter 19[^\n]*(?:draft|Draft|non-canon|first-draft)[^\n]*\n.*?(?=^## |\Z)',
                  '',
                  text,
              )
              if replace_version:
                  text = text.replace(*replace_version)
              lines = text.splitlines()
              require(lines and lines[0].startswith('#'), f'no H1 heading in {path}')
              block = f'{marker_start}\n{body.strip()}\n{marker_end}'
              new_text = lines[0] + '\n\n' + block + '\n\n' + '\n'.join(lines[1:]).lstrip('\n')
              p.write_text(new_text.rstrip() + '\n', encoding='utf-8')

          common = f'''## Chapter 19 accepted state

