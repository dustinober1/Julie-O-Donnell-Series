          - **Julie ↔ Chen:** no alliance; Chen’s preserved index creates an independently reviewable conflict record.
          - **Julie ↔ Sterling:** opposition sharpens through the collision between his dominant public account and the private lawful record; no private encounter occurs.''')
          insert_state('books/book-01/control/08-evidence-and-chain-of-custody-ledger.md', '''## Chapter 19 accepted evidence/custody delta

          - MPD retains `MPD-901441` through `MPD-901447` as seven separate, offline packages in the common chest; no package is opened, connected, mounted, examined, moved, combined, or transferred.
          - `MPD-901446` remains under replacement seal `MPD-SL-551821`; the former seal remains preserved.
