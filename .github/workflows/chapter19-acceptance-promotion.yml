          - **Accepted endpoint:** **10:44:12 EDT / 20:14:12 IST**, secure MPD evidence intake
          - **Next authorized gate:** Chapter 20 mission-lock planning only; no Chapter 20 prose is authorized.

          This section is the current accepted state and supersedes any older Chapter 19 draft-only status language retained below for historical context.'''

          insert_state('books/book-01/control/00-overview.md', common, replace_version=('Control-pack version:** 4.3', 'Control-pack version:** 4.4'))
          insert_state('books/book-01/control/02-current-project-state.md', common)
          insert_state('books/book-01/control/04-source-of-truth-canon-locks.md', f'''## Chapter 19 canon locks

          1. Chapter 19 is accepted canon at 5,393 words; reviewed blob `{prose_blob}`.
          2. Alvarez/DCIS is the named federal receiver; MPD remains physical custodian of all seven separate packages.
          3. `ARJ-K17-ACK-01` is a bounded reference; Indian originals remain at Forward Post Arjun.
