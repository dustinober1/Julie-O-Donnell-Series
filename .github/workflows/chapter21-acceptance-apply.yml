name: Apply Chapter 21 acceptance

on:
  pull_request:
    branches:
      - main
    paths:
      - "tools/.chapter21_acceptance_payload_*.b64"
      - ".github/workflows/chapter21-acceptance-apply.yml"
  push:
    branches:
      - agent/chapter-21-acceptance
    paths:
      - "tools/.chapter21_acceptance_payload_*.b64"
      - ".github/workflows/chapter21-acceptance-apply.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/chapter-21-acceptance
          fetch-depth: 0
      - name: Decode and apply accepted Chapter 21 state
        shell: bash
        run: |
          cat tools/.chapter21_acceptance_payload_*.b64 \
            | base64 --decode \
            | gzip --decompress \
            > /tmp/chapter21_acceptance_apply.py
          python - <<'PY'
          from pathlib import Path
          path = Path('/tmp/chapter21_acceptance_apply.py')
          source = path.read_text(encoding='utf-8')
          start = source.find('validator =')
          following = source.find('old_validator = ROOT', start)
          end = source.rfind("'''", start, following) + 3
          if start < 0 or following < 0 or end < 3:
              raise SystemExit('validator generator markers not found')
          block = source[start:end]
          repaired = block.replace('\\n', '\\\\n')
          if repaired == block:
              raise SystemExit('validator generator escape repair not applied')
          path.write_text(source[:start] + repaired + source[end:], encoding='utf-8')
          PY
          python -m py_compile /tmp/chapter21_acceptance_apply.py
          python /tmp/chapter21_acceptance_apply.py > /tmp/chapter21_acceptance_apply.log 2>&1
      - name: Upload apply diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chapter21-acceptance-apply-diagnostic
          path: /tmp/chapter21_acceptance_apply.log
          if-no-files-found: error
          retention-days: 1
      - name: Commit accepted Chapter 21 state
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Accept Chapter 21 — The Borrowed Name"
          git push origin HEAD:agent/chapter-21-acceptance
