name: Book 1 manuscript validation

on:
  pull_request:
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Count accepted manuscript
        run: python tools/count_book1_words.py --expect 103369

      - name: Validate accepted Chapter 19 baseline and Chapter 20 mission lock
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import subprocess

          root = Path('.')
          book = root / 'books/book-01'
          chapters = book / 'manuscript/chapters'
          control = book / 'control'
          mission20_expected = ''.join((
              'c074e4f6f9ec9cdd',
              'cbc701e2923f34b3',
              '082ede5a',
          ))

          def require(value, message):
              if not value:
                  raise SystemExit(message)

          protected = {
              'chapter-13.md': ('e7d04921431e571aab434f2f4b808655e363d30c', 6175),
              'chapter-14.md': ('78f7fff02cd271fecbc94f7daf7151dbebbd5c6d', 5763),
              'chapter-15.md': ('b8e7e2ae573a6c25ea096121c75acee867f3fad2', 5993),
              'chapter-16.md': ('dd5249f4b510a9da9ad19ab2902a95ce1e62a1d8', 6024),
              'chapter-17.md': ('1c4022ebb8d27d8d448f98bcf74fbf09e6e560c1', 5888),
              'chapter-18.md': ('6f5873d6e975ec74646af152aad22ea84545fc01', 4478),
              'chapter-19.md': ('1c7cc22fc7c480cb247efa1f6a2c0d0b1e1b1baf', 5393),
          }
          for name, (expected_blob, expected_words) in protected.items():
              path = chapters / name
              require(path.is_file(), f'missing protected chapter: {name}')
              actual_blob = subprocess.check_output(['git', 'hash-object', str(path)], text=True).strip()
              require(actual_blob == expected_blob, f'protected blob changed: {name} = {actual_blob}')
              actual_words = len(path.read_text(encoding='utf-8').split())
              require(actual_words == expected_words, f'protected count changed: {name} = {actual_words}')

          manifest_path = book / 'ACCEPTED_MANUSCRIPT.yaml'
          require(manifest_path.is_file(), 'accepted manifest missing')
          manifest_blob = subprocess.check_output(['git', 'hash-object', str(manifest_path)], text=True).strip()
          require(manifest_blob == '87a8d05d8659e8c139865c187e306d823cbc68c4', f'accepted manifest changed: {manifest_blob}')
          manifest = manifest_path.read_text(encoding='utf-8')
          require('accepted_words: 103369' in manifest, 'accepted total is not 103369')
          require('accepted_endpoint:\n  chapter: 19' in manifest, 'accepted endpoint is not Chapter 19')
          require('eastern: "10:44:12 EDT"' in manifest, 'accepted eastern endpoint changed')
          require('india: "20:14:12 IST"' in manifest, 'accepted India endpoint changed')
          listed = [int(n) for n in re.findall(r'chapter-(\d+)\.md', manifest)]
          require(listed and max(listed) == 19, f'accepted manifest does not end at Chapter 19: {listed}')
          require(listed.count(19) == 1, f'Chapter 19 manifest entry count is {listed.count(19)}')

          mission19 = control / '38-chapter-19-mission-lock.md'
          review19 = control / '39-chapter-19-acceptance-review.md'
          manuscript19 = chapters / 'chapter-19.md'
          require(mission19.is_file(), 'Chapter 19 mission lock missing')
          mission19_blob = subprocess.check_output(['git', 'hash-object', str(mission19)], text=True).strip()
          require(mission19_blob == '7b69ff80ed9b0286a52c0a8428792489eb236ef3', f'Chapter 19 mission lock changed: {mission19_blob}')
          require(review19.is_file(), 'Chapter 19 acceptance review missing')
          review19_text = review19.read_text(encoding='utf-8')
          for sentinel in [
              '# ACCEPT',
              '## Promotion authorization',
              'Reviewed/promoted prose blob:** `1c7cc22fc7c480cb247efa1f6a2c0d0b1e1b1baf`',
              'Exact final word count:** **5,393**',
              'New accepted-manuscript total: **103,369**',
              'Six line-level repairs were made',
          ]:
              require(sentinel in review19_text, f'acceptance review missing: {sentinel}')

          all_ch19 = sorted(book.rglob('chapter-19.md'))
          require(all_ch19 == [manuscript19], f'unexpected Chapter 19 prose paths: {all_ch19}')
          require(not (book / 'drafts/chapter-19.md').exists(), 'Chapter 19 draft copy remains')

          text19 = manuscript19.read_text(encoding='utf-8')
          require(text19.startswith(
              '10:01:12 EDT / 19:31:12 IST\n\n'
              '# Chapter 19 - The Name on the Record\n\n'
              'Secure MPD Evidence Intake\nWashington, D.C.\n'
          ), 'Chapter 19 opening, title, or location changed')
          require('At 10:44:12 EDT / 20:14:12 IST' in text19[-1800:], 'Chapter 19 endpoint missing')
          require(text19.count('# Chapter ') == 1, 'unexpected Chapter 19 heading count')
          require(text19.count('Hartwell Executive Briefing Annex') == 1, 'Grant cutaway count/location changed')
          require('Chapter 17' not in text19, 'production chapter-number reference remains in Chapter 19')
          require('the chapter could not' not in text19, 'metanarrative artifact remains in Chapter 19')

          required19 = [
              'DCIS-FR-187463-01',
              'ARJ-K17-ACK-01',
              'No Indian rounds were fired.',
              'K-seventeen was physically intact at inspection.',
              'Security Line One recorded an accepted pass.',
              'LOCAL SOURCE-RECORD WRITES: 0',
              'SSO-NS-004',
              'HWA-LCA-1187',
              'HWA-CD-187463-01',
              '07:47:49 EDT',
              'MPD-SL-551821',
              'APX-B3-IR-5521',
              'Hartwell has no present physical custody',
              'Who authorized `SSO-NS-004`',
          ]
          missing19 = [item for item in required19 if item not in text19]
          require(not missing19, f'Chapter 19 required element missing: {missing19}')

          prohibited19 = [
              'Sterling personally held',
              'Sterling personally presented',
              'Sterling personally operated',
              'Sterling ordered use',
              'Tariq was physically present',
              'Tariq personally operated',
              'Vance personally typed',
              'WSS-4 plaintext',
              'Julie called Sharma',
              'Sharma called Julie',
          ]
          present19 = [item for item in prohibited19 if item in text19]
          require(not present19, f'Chapter 19 prohibited conclusion present: {present19}')
          for artifact in ['TODO', 'DRAFTING NOTE', 'ALTERNATE VERSION', 'PLACEHOLDER']:
              require(artifact not in text19, f'Chapter 19 drafting artifact remains: {artifact}')

          mission20 = control / '40-chapter-20-mission-lock.md'
          require(mission20.is_file(), 'Chapter 20 mission lock missing')
          mission20_blob = subprocess.check_output(['git', 'hash-object', str(mission20)], text=True).strip()
          require(mission20_blob == mission20_expected, f'Chapter 20 mission-lock blob changed: {mission20_blob}')
          mission20_text = mission20.read_text(encoding='utf-8')
          required20 = [
              '# Chapter 20 Mission Lock — The Custody Exception',
              '**Planning status:** Mission locked; undrafted; non-canon',
              '**Accepted manuscript total before Chapter 20:** **103,369 words**',
              '`1c7cc22fc7c480cb247efa1f6a2c0d0b1e1b1baf`',
              '`7b69ff80ed9b0286a52c0a8428792489eb236ef3`',
              '### Selected structure — lawful signer hold plus responsibility-chain confrontation',
              '## Dominant dramatic function',
              '10:44:12 EDT / 20:14:12 IST',
              '11:26:32 EDT / 20:56:32 IST',
              'named no-use physical hold',
              'Legislative Secure Services',
              '`LSS-CD-187463-01`',
              '`WSS4-CD-187463-01`',
              '**Chapter 20 target:** **4,400 words**',
              '**Preferred range:** **4,000–4,800 words**',
              '**Hard ceiling:** **5,200 words**',
              '- [ ] Protected Chapters 13–18 remain unchanged.',
              '## Acceptance-test checklist',
              '## Chapter 21 handoff question only',
              'Who instructed the named office authority to create and use the `SSO-NS-004` continuity exception',
          ]
          missing20 = [item for item in required20 if item not in mission20_text]
          require(not missing20, f'Chapter 20 mission lock missing required element: {missing20}')
          require(mission20_text.count('### Selected structure —') == 1, 'Chapter 20 mission lock must contain one selected structure')
          require(mission20_text.count('## Dominant dramatic function') == 1, 'Chapter 20 mission lock must contain one dominant-function section')
          require(mission20_text.count('## Chapter 21 handoff question only') == 1, 'Chapter 20 mission lock must contain one Chapter 21 handoff section')
          require(mission20_text.count('Who instructed the named office authority to create and use the `SSO-NS-004` continuity exception') == 1, 'Chapter 21 handoff question count is not one')

          locks20 = sorted(control.glob('*chapter-20-mission-lock*.md'))
          require(locks20 == [mission20], f'unauthorized or alternate Chapter 20 mission locks: {locks20}')
          require(not list(book.rglob('chapter-20.md')), 'Chapter 20 prose exists')
          require(not list(book.rglob('chapter-21.md')), 'Chapter 21 prose exists')
          require(not list(control.glob('*chapter-21-mission-lock*.md')), 'Chapter 21 mission lock exists')

          project = (root / 'PROJECT_STATE.yaml').read_text(encoding='utf-8')
          for sentinel in [
              'accepted_words: 103369',
              'chapters: 1-19',
              'accepted_manuscript_words: 103369',
              'reviewed_blob_sha: 1c7cc22fc7c480cb247efa1f6a2c0d0b1e1b1baf',
              'chapter_19_acceptance_review: books/book-01/control/39-chapter-19-acceptance-review.md',
              'chapter_20_mission_lock: books/book-01/control/40-chapter-20-mission-lock.md',
              'status: mission locked; undrafted; non-canon',
              'mission_lock_blob_sha: ' + mission20_expected,
              'accepted_manifest_changed: false',
              'accepted_words_changed: false',
              'No Chapter 20 prose exists.',
              'No Chapter 21 prose or mission lock exists.',
          ]:
              require(sentinel in project, f'PROJECT_STATE missing required sentinel: {sentinel}')

          synchronized = {
              'README.md': ['Accepted canon: Prologue and Chapters 1–19', '103,369 words', 'Chapter 20 planning state: mission locked, undrafted, and non-canon', 'Chapter 20 prose: not created', 'Chapter 21 prose or mission lock: not created'],
              'books/book-01/manuscript/STATUS.md': ['Prologue and Chapters 1–19', 'Accepted length: **103,369 words**', '## Chapter 20 planning state', 'Status: mission locked, undrafted, and non-canon', 'Chapter 20 prose file: absent'],
              'books/book-01/drafts/README.md': ['No active Book 1 chapter draft exists after Chapter 19 promotion', 'Chapter 20 is mission locked', 'remains undrafted and non-canon'],
              'books/book-01/control/00-overview.md': ['**Control-pack version:** 4.5', '**Accepted length:** **103,369 words**', '## Chapter 20 approved planning state', mission20_expected],
              'books/book-01/control/02-current-project-state.md': ['## Chapter 20 mission-lock state', 'Mission locked; undrafted; non-canon', mission20_expected],
              'books/book-01/control/04-source-of-truth-canon-locks.md': ['## Chapter 19 canon locks', 'Registered authority is not physical possession'],
              'books/book-01/control/05-master-timeline.md': ['## Accepted Chapter 19 timeline delta', '10:44:12 EDT / 20:14:12 IST'],
              'books/book-01/control/06-character-state-ledger.md': ['## Chapter 19 accepted character-state delta'],
              'books/book-01/control/07-relationship-and-trust-matrix.md': ['## Chapter 19 accepted relationship delta'],
              'books/book-01/control/08-evidence-and-chain-of-custody-ledger.md': ['## Chapter 19 accepted evidence/custody delta'],
              'books/book-01/control/09-knowledge-and-information-control-matrix.md': ['## Chapter 19 accepted knowledge delta'],
              'books/book-01/control/10-technology-and-system-rules.md': ['## Chapter 19 accepted technology delta'],
              'books/book-01/control/11-organizations-authorities-and-institutional-control.md': ['## Chapter 19 accepted authority delta'],
              'books/book-01/control/12-location-and-security-architecture.md': ['## Chapter 19 accepted location/security delta'],
              'books/book-01/control/13-antagonist-objectives-and-conspiracy-model.md': ['## Chapter 19 accepted antagonist-pressure delta'],
              'books/book-01/control/14-public-narrative-versus-actual-record.md': ['## Chapter 19 accepted public/private record delta'],
              'books/book-01/control/15-open-plot-threads-and-payoff-matrix.md': ['## Chapter 19 accepted thread delta'],
              'books/book-01/control/16-chapter-by-chapter-status-record.md': ['## Chapter 19 — accepted', 'Reviewed blob: `1c7cc22fc7c480cb247efa1f6a2c0d0b1e1b1baf`', '## Chapter 20 — mission locked, undrafted, non-canon', mission20_expected],
              'books/book-01/control/18-act-iii-entry-state.md': ['## Controlling accepted Act III state', '**103,369 words**', '## Chapter 20 approved planning state', mission20_expected],
              'books/book-01/control/20-control-pack-maintenance-rules.md': ['## Accepted maintenance record through Chapter 19', '## Chapter 20 mission-lock maintenance record', 'Exactly one Chapter 20 mission lock is authorized', mission20_expected],
              'books/book-01/control/23-word-budget-and-act-iii-architecture.md': ['Accepted manuscript through Chapter 19', '## Chapter 20 approved planning range', 'Projected accepted total at target if later accepted:** **107,769 words**'],
              'books/book-01/control/24-thread-disposition-matrix.md': ['Accepted words: **103,369**', 'Chapter 20: mission locked', 'Chapter 21 and later: not drafted and not individually mission locked'],
              'books/book-01/control/README.md': ['# Canon Control Pack v4.5', '[40. Chapter 20 Mission Lock — The Custody Exception]', 'Chapter 20:** mission locked, undrafted, non-canon', mission20_expected],
              'series/recurring-character-ledger.md': ['## Chapter 19 accepted recurring-character delta'],
          }
          for rel, sentinels in synchronized.items():
              path = root / rel
              require(path.is_file(), f'missing synchronized control: {rel}')
              value = path.read_text(encoding='utf-8')
              absent = [item for item in sentinels if item not in value]
              require(not absent, f'{rel} missing required sentinel: {absent}')

          stale = [
              'Prepare the Chapter 20 mission-lock planning pass only',
              'Prepare the dedicated Chapter 20 mission-lock planning pass',
              'No Chapter 20 prose or mission lock exists',
              'Chapter 20 prose or mission lock: not created',
          ]
          live_files = [
              root / 'README.md',
              root / 'PROJECT_STATE.yaml',
              book / 'manuscript/STATUS.md',
              control / '00-overview.md',
              control / '02-current-project-state.md',
              control / '16-chapter-by-chapter-status-record.md',
              control / '18-act-iii-entry-state.md',
              control / '20-control-pack-maintenance-rules.md',
              control / '23-word-budget-and-act-iii-architecture.md',
              control / '24-thread-disposition-matrix.md',
              control / 'README.md',
          ]
          for path in live_files:
              value = path.read_text(encoding='utf-8')
              found = [item for item in stale if item in value]
              require(not found, f'{path} retains stale live state: {found}')

          forbidden_names = {
              'remainder-of-act-iii-outline.md',
              'act-iii-remainder-outline.md',
              'chapter-by-chapter-act-iii-outline.md',
              'chapter-20-final.md',
              'chapter-20-final2.md',
              'chapter-20-latest.md',
              'chapter-20-new-final.md',
              'chapter-21-final.md',
              'chapter-21-final2.md',
              'chapter-21-latest.md',
              'chapter-21-new-final.md',
          }
          for name in forbidden_names:
              require(not list(book.rglob(name)), f'unauthorized file exists: {name}')

          suspicious_outlines = [
              path for path in book.rglob('*')
              if path.is_file() and (
                  ('remainder' in path.name.lower() and 'act-iii' in path.name.lower())
                  or 'chapter-by-chapter-act-iii' in path.name.lower()
              )
          ]
          require(not suspicious_outlines, f'complete remainder outline artifact exists: {suspicious_outlines}')

          temporary = [path for path in root.rglob('*') if path.is_file() and path.name.endswith(('.tmp', '.bak', '.orig', '.rej', '.pyc'))]
          require(not temporary, f'temporary files remain: {temporary}')

          forbidden_helpers = [
              root / '.github/workflows/chapter19-acceptance-promotion.yml',
              root / '.github/workflows/ch19-pr-kick.yml',
              root / '.github/workflows/ch19-validation-debug.yml',
              root / '.github/ch19-acceptance-trigger.txt',
              root / '.github/ch19-promotion-debug.log',
              root / '.github/ch19-validation-debug.txt',
              root / 'tools/create_chapter19_mission_lock.py',
              root / '.github/workflows/chapter19-mission-lock.yml',
              root / 'tools/draft_chapter19.py',
              root / '.github/workflows/chapter19-draft.yml',
              root / 'tools/create_chapter20_mission_lock.py',
              root / '.github/workflows/chapter20-mission-lock.yml',
              root / '.github/workflows/ch20-pr-kick.yml',
              root / '.github/workflows/ch20-validation-debug.yml',
              root / '.github/ch20-mission-lock-trigger.txt',
              root / '.github/ch20-validation-debug.log',
          ]
          require(not any(path.exists() for path in forbidden_helpers), 'temporary Chapter 19 or Chapter 20 automation remains')

          print('accepted Chapter 19 baseline and Chapter 20 mission-lock-only state validated')
          PY

      - name: Validate diff cleanliness
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "origin/${{ github.base_ref }}...HEAD" -- .
          else
            git diff --check HEAD^ -- .
          fi
