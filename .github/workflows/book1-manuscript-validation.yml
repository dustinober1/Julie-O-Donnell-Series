name: Book 1 manuscript validation

on:
  pull_request:
    paths:
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"
  push:
    branches: [main]
    paths:
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count accepted manuscript
        shell: bash
        run: |
          expected=$(python - <<'PY'
          from pathlib import Path
          import re

          manifest = Path('books/book-01/ACCEPTED_MANUSCRIPT.yaml').read_text(encoding='utf-8')
          match = re.search(r'^accepted_words:\s*(\d+)$', manifest, re.M)
          if not match:
              raise SystemExit('accepted_words not found in manifest')
          print(match.group(1))
          PY
          )
          python tools/count_book1_words.py --expect "$expected"

      - name: Validate accepted total and Chapter 15 draft isolation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path('.')
          manifest = (root / 'books/book-01/ACCEPTED_MANUSCRIPT.yaml').read_text(encoding='utf-8')
          project = (root / 'PROJECT_STATE.yaml').read_text(encoding='utf-8')
          chapter14 = root / 'books/book-01/manuscript/chapters/chapter-14.md'
          chapter14_draft = root / 'books/book-01/drafts/chapter-14.md'
          chapter15_draft = root / 'books/book-01/drafts/chapter-15.md'
          chapter15_accepted = root / 'books/book-01/manuscript/chapters/chapter-15.md'

          accepted = int(re.search(r'^accepted_words:\s*(\d+)$', manifest, re.M).group(1))
          project_total = int(re.search(r'^\s+accepted_words:\s*(\d+)$', project, re.M).group(1))
          assert accepted == 75593, accepted
          assert project_total == accepted, (project_total, accepted)

          assert chapter14.is_file()
          assert not chapter14_draft.exists()
          chapter14_text = chapter14.read_text(encoding='utf-8')
          assert len(chapter14_text.split()) == 5763
          assert chapter14_text.splitlines()[0] == '07:46:00 EDT / 17:16:00 IST'
          assert chapter14_text.splitlines()[2] == '# Chapter 14 - The Witness Line'
          assert '07:49:32 EDT / 17:19:32 IST' in chapter14_text

          assert chapter15_draft.is_file()
          assert not chapter15_accepted.exists()
          chapter15_text = chapter15_draft.read_text(encoding='utf-8')
          assert len(chapter15_text.split()) == 5993
          chapter15_lines = chapter15_text.splitlines()
          assert chapter15_lines[0] == '07:49:32 EDT / 17:19:32 IST'
          assert chapter15_lines[2] == '# Chapter 15 - The Split Record'
          assert 'At 07:56:40 EDT / 17:26:40 IST' in chapter15_text
          assert 'Chapter 16' not in chapter15_text

          required = [
              'one hundred thirty-six sealed files',
              'forty-seven incomplete files',
              'three hundred eleven excluded',
              'partition a',
              'partition b',
              'wss-4 message blocks',
              '07:55:11',
              '07:55:22',
              '07:55:31',
          ]
          chapter15_lower = chapter15_text.lower()
          for phrase in required:
              assert phrase in chapter15_lower, phrase

          forbidden = [
              'K-17 access was confirmed',
              'WSS-4 was decrypted',
              'Sterling held the signer',
              'Sterling presented the signer',
              'Phase B was authorized',
          ]
          for phrase in forbidden:
              assert phrase not in chapter15_text, phrase

          assert 'first draft complete; unaccepted; non-canon' in project
          assert 'accepted_words: 75593' in project
          print(f'validated accepted total: {accepted}')
          print('validated Chapter 14 integrity and Chapter 15 draft isolation')
          PY

      - name: Check whitespace errors in pull-request diff
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"
