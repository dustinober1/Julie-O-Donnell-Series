name: Book 1 manuscript validation

on:
  pull_request:
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Count accepted manuscript
        run: python tools/count_book1_words.py --expect 103369

      - name: Validate accepted Chapter 19 promotion and protected prose
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import subprocess

          root = Path('.')
          book = root / 'books/book-01'
          chapters = book / 'manuscript/chapters'
          control = book / 'control'

          def require(value, message):
              if not value:
                  raise SystemExit(message)

          protected = {
              'chapter-14.md': ('78f7fff02cd271fecbc94f7daf7151dbebbd5c6d', 5763),
              'chapter-15.md': ('b8e7e2ae573a6c25ea096121c75acee867f3fad2', 5993),
              'chapter-16.md': ('dd5249f4b510a9da9ad19ab2902a95ce1e62a1d8', 6024),
              'chapter-17.md': ('1c4022ebb8d27d8d448f98bcf74fbf09e6e560c1', 5888),
              'chapter-18.md': ('6f5873d6e975ec74646af152aad22ea84545fc01', 4478),
              'chapter-19.md': ('1c7cc22fc7c480cb247efa1f6a2c0d0b1e1b1baf', 5393),
          }
          for name, (expected_blob, expected_words) in protected.items():
              path = chapters / name
              require(path.is_file(), f'missing protected chapter: {name}')
              actual_blob = subprocess.check_output(['git', 'hash-object', str(path)], text=True).strip()
              require(actual_blob == expected_blob, f'protected blob changed: {name} = {actual_blob}')
              actual_words = len(path.read_text(encoding='utf-8').split())
              require(actual_words == expected_words, f'protected count changed: {name} = {actual_words}')

          manifest = (book / 'ACCEPTED_MANUSCRIPT.yaml').read_text(encoding='utf-8')
          require('accepted_words: 103369' in manifest, 'accepted total is not 103369')
          require('accepted_endpoint:\n  chapter: 19' in manifest, 'accepted endpoint is not Chapter 19')
          require('eastern: "10:44:12 EDT"' in manifest, 'accepted eastern endpoint changed')
          require('india: "20:14:12 IST"' in manifest, 'accepted India endpoint changed')
          listed = [int(n) for n in re.findall(r'chapter-(\d+)\.md', manifest)]
          require(listed and max(listed) == 19, f'accepted manifest does not end at Chapter 19: {listed}')
          require(listed.count(19) == 1, f'Chapter 19 manifest entry count is {listed.count(19)}')

          mission = control / '38-chapter-19-mission-lock.md'
          review = control / '39-chapter-19-acceptance-review.md'
          manuscript = chapters / 'chapter-19.md'
          require(mission.is_file(), 'Chapter 19 mission lock missing')
          mission_blob = subprocess.check_output(['git', 'hash-object', str(mission)], text=True).strip()
          require(mission_blob == '7b69ff80ed9b0286a52c0a8428792489eb236ef3', f'Chapter 19 mission lock changed: {mission_blob}')
          require(review.is_file(), 'Chapter 19 acceptance review missing')
          review_text = review.read_text(encoding='utf-8')
          for sentinel in [
              '# ACCEPT',
              '## Promotion authorization',
              'Reviewed/promoted prose blob:** `1c7cc22fc7c480cb247efa1f6a2c0d0b1e1b1baf`',
              'Exact final word count:** **5,393**',
              'New accepted-manuscript total: **103,369**',
              'Six line-level repairs were made',
          ]:
              require(sentinel in review_text, f'acceptance review missing: {sentinel}')

          all_ch19 = sorted(book.rglob('chapter-19.md'))
          require(all_ch19 == [manuscript], f'unexpected Chapter 19 prose paths: {all_ch19}')
          require(not (book / 'drafts/chapter-19.md').exists(), 'Chapter 19 draft copy remains')

          text = manuscript.read_text(encoding='utf-8')
          require(text.startswith(
              '10:01:12 EDT / 19:31:12 IST\n\n'
              '# Chapter 19 - The Name on the Record\n\n'
              'Secure MPD Evidence Intake\nWashington, D.C.\n'
          ), 'Chapter 19 opening, title, or location changed')
          require('At 10:44:12 EDT / 20:14:12 IST' in text[-1800:], 'Chapter 19 endpoint missing')
          require(text.count('# Chapter ') == 1, 'unexpected Chapter 19 heading count')
          require(text.count('Hartwell Executive Briefing Annex') == 1, 'Grant cutaway count/location changed')
          require('Chapter 17' not in text, 'production chapter-number reference remains in Chapter 19')
          require('the chapter could not' not in text, 'metanarrative artifact remains in Chapter 19')

          required = [
              'DCIS-FR-187463-01',
              'ARJ-K17-ACK-01',
              'No Indian rounds were fired.',
              'K-seventeen was physically intact at inspection.',
              'Security Line One recorded an accepted pass.',
              'LOCAL SOURCE-RECORD WRITES: 0',
              'SSO-NS-004',
              'HWA-LCA-1187',
              'HWA-CD-187463-01',
              '07:47:49 EDT',
              'MPD-SL-551821',
              'APX-B3-IR-5521',
              'Hartwell has no present physical custody',
              'Who authorized `SSO-NS-004`',
          ]
          missing = [item for item in required if item not in text]
          require(not missing, f'Chapter 19 required element missing: {missing}')

          prohibited = [
              'Sterling personally held',
              'Sterling personally presented',
              'Sterling personally operated',
              'Sterling ordered use',
              'Tariq was physically present',
              'Tariq personally operated',
              'Vance personally typed',
              'WSS-4 plaintext',
              'Julie called Sharma',
              'Sharma called Julie',
          ]
          present = [item for item in prohibited if item in text]
          require(not present, f'Chapter 19 prohibited conclusion present: {present}')

          for artifact in ['TODO', 'DRAFTING NOTE', 'ALTERNATE VERSION', 'PLACEHOLDER']:
              require(artifact not in text, f'Chapter 19 drafting artifact remains: {artifact}')

          project = (root / 'PROJECT_STATE.yaml').read_text(encoding='utf-8')
          for sentinel in [
              'accepted_words: 103369',
              'chapters: 1-19',
              'accepted_manuscript_words: 103369',
              'reviewed_blob_sha: 1c7cc22fc7c480cb247efa1f6a2c0d0b1e1b1baf',
              'chapter_19_acceptance_review: books/book-01/control/39-chapter-19-acceptance-review.md',
              'status: accepted and promoted; canon',
              'next_gate: Chapter 20 mission-lock planning pass only',
          ]:
              require(sentinel in project, f'PROJECT_STATE missing accepted sentinel: {sentinel}')

          synchronized = {
              'README.md': ['Accepted canon: Prologue and Chapters 1–19', '103,369 words', 'Chapter 20 prose or mission lock: not created'],
              'books/book-01/manuscript/STATUS.md': ['Prologue and Chapters 1–19', 'Accepted length: **103,369 words**', 'The Name on the Record'],
              'books/book-01/control/00-overview.md': ['## Current accepted state', '103,369 words'],
              'books/book-01/control/02-current-project-state.md': ['## Chapter 19 accepted state', '103,369 words'],
              'books/book-01/control/04-source-of-truth-canon-locks.md': ['## Chapter 19 canon locks', 'Registered authority is not physical possession'],
              'books/book-01/control/05-master-timeline.md': ['## Accepted Chapter 19 timeline delta', '10:44:12 EDT / 20:14:12 IST'],
              'books/book-01/control/06-character-state-ledger.md': ['## Chapter 19 accepted character-state delta'],
              'books/book-01/control/07-relationship-and-trust-matrix.md': ['## Chapter 19 accepted relationship delta'],
              'books/book-01/control/08-evidence-and-chain-of-custody-ledger.md': ['## Chapter 19 accepted evidence/custody delta'],
              'books/book-01/control/09-knowledge-and-information-control-matrix.md': ['## Chapter 19 accepted knowledge delta'],
              'books/book-01/control/10-technology-and-system-rules.md': ['## Chapter 19 accepted technology delta'],
              'books/book-01/control/11-organizations-authorities-and-institutional-control.md': ['## Chapter 19 accepted authority delta'],
              'books/book-01/control/12-location-and-security-architecture.md': ['## Chapter 19 accepted location/security delta'],
              'books/book-01/control/13-antagonist-objectives-and-conspiracy-model.md': ['## Chapter 19 accepted antagonist-pressure delta'],
              'books/book-01/control/14-public-narrative-versus-actual-record.md': ['## Chapter 19 accepted public/private record delta'],
              'books/book-01/control/15-open-plot-threads-and-payoff-matrix.md': ['## Chapter 19 accepted thread delta'],
              'books/book-01/control/16-chapter-by-chapter-status-record.md': ['## Chapter 19 — accepted', 'Reviewed blob: `1c7cc22fc7c480cb247efa1f6a2c0d0b1e1b1baf`'],
              'books/book-01/control/18-act-iii-entry-state.md': ['## Controlling accepted Act III state', '**103,369 words**'],
              'books/book-01/control/20-control-pack-maintenance-rules.md': ['## Accepted maintenance record through Chapter 19', '**103,369 words**'],
              'books/book-01/control/23-word-budget-and-act-iii-architecture.md': ['## Current word budget', 'Accepted manuscript through Chapter 19'],
              'books/book-01/control/24-thread-disposition-matrix.md': ['## Current accepted baseline', 'Accepted words: **103,369**'],
              'books/book-01/control/README.md': ['## Current accepted state', '39. Chapter 19 Acceptance Review'],
              'books/book-01/drafts/README.md': ['No active Book 1 chapter draft exists after Chapter 19 promotion'],
              'series/recurring-character-ledger.md': ['## Chapter 19 accepted recurring-character delta'],
          }
          for rel, sentinels in synchronized.items():
              path = root / rel
              require(path.is_file(), f'missing synchronized control: {rel}')
              value = path.read_text(encoding='utf-8')
              absent = [item for item in sentinels if item not in value]
              require(not absent, f'{rel} missing accepted sentinel: {absent}')

          stale_live_state = {
              'books/book-01/control/00-overview.md': [
                  'Prologue and Chapters 1–18', '97,976', 'One active chapter draft exists: Chapter 19 only',
              ],
              'books/book-01/control/02-current-project-state.md': [
                  '97,976', 'Chapter 19: one', 'Perform the formal Chapter 19 acceptance',
              ],
              'books/book-01/control/04-source-of-truth-canon-locks.md': [
                  'No Chapter 19 prose or mission lock exists',
              ],
              'books/book-01/control/16-chapter-by-chapter-status-record.md': [
                  'Accepted total through Chapter 18', 'Perform the formal Chapter 19 acceptance',
              ],
              'books/book-01/control/18-act-iii-entry-state.md': [
                  '97,976', '../drafts/chapter-19.md', 'Perform the formal Chapter 19 acceptance',
              ],
              'books/book-01/control/20-control-pack-maintenance-rules.md': [
                  'Accepted maintenance record through Chapter 18', '97,976', 'Perform the formal Chapter 19 acceptance',
              ],
              'books/book-01/control/23-word-budget-and-act-iii-architecture.md': [
                  'Accepted manuscript through Chapter 18', 'Chapter 19 non-canon draft', '97,976', 'Perform the formal Chapter 19 acceptance',
              ],
              'books/book-01/control/24-thread-disposition-matrix.md': [
                  'Accepted manuscript: Prologue and Chapters 1–18', '../drafts/chapter-19.md', '97,976', 'Perform the formal Chapter 19 acceptance',
              ],
              'books/book-01/control/README.md': [
                  'non-canon Chapter 19 first draft', '97,976', 'Perform the formal Chapter 19 acceptance',
              ],
          }
          for rel, forbidden in stale_live_state.items():
              value = (root / rel).read_text(encoding='utf-8')
              found = [item for item in forbidden if item in value]
              require(not found, f'{rel} retains stale live state: {found}')

          require(not list(book.rglob('chapter-20.md')), 'Chapter 20 prose exists')
          require(not list(control.glob('*chapter-20-mission-lock*.md')), 'Chapter 20 mission lock exists')
          forbidden_names = {
              'remainder-of-act-iii-outline.md',
              'act-iii-remainder-outline.md',
              'chapter-by-chapter-act-iii-outline.md',
              'chapter-19-final.md',
              'chapter-19-final2.md',
              'chapter-19-latest.md',
              'chapter-19-new-final.md',
          }
          for name in forbidden_names:
              require(not list(book.rglob(name)), f'unauthorized file exists: {name}')

          temporary = [
              p for p in root.rglob('*')
              if p.is_file() and p.name.endswith(('.tmp', '.bak', '.orig', '.rej', '.pyc'))
          ]
          require(not temporary, f'temporary files remain: {temporary}')
          forbidden_helpers = [
              root / '.github/workflows/chapter19-acceptance-promotion.yml',
              root / '.github/workflows/ch19-pr-kick.yml',
              root / '.github/workflows/ch19-validation-debug.yml',
              root / '.github/ch19-acceptance-trigger.txt',
              root / '.github/ch19-promotion-debug.log',
              root / '.github/ch19-validation-debug.txt',
              root / 'tools/create_chapter19_mission_lock.py',
              root / '.github/workflows/chapter19-mission-lock.yml',
              root / 'tools/draft_chapter19.py',
              root / '.github/workflows/chapter19-draft.yml',
          ]
          require(not any(path.exists() for path in forbidden_helpers), 'temporary Chapter 19 automation remains')

          print('accepted Chapter 19 promotion and synchronized canon validated')
          PY

      - name: Validate diff cleanliness
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "origin/${{ github.base_ref }}...HEAD" -- .
          else
            git diff --check HEAD^ -- .
          fi
