name: Book 1 manuscript validation

on:
  pull_request:
    paths:
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"
  push:
    branches: [main]
    paths:
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count accepted manuscript
        shell: bash
        run: |
          expected=$(python - <<'PYCOUNT'
          from pathlib import Path
          import re
          manifest = Path('books/book-01/ACCEPTED_MANUSCRIPT.yaml').read_text(encoding='utf-8')
          match = re.search(r'^accepted_words:\s*(\d+)$', manifest, re.M)
          if not match:
              raise SystemExit('accepted_words not found in manifest')
          print(match.group(1))
          PYCOUNT
          )
          python tools/count_book1_words.py --expect "$expected"

      - name: Validate Chapter 15 acceptance and single Chapter 16 draft
        shell: bash
        run: |
          python - <<'PYVALIDATE'
          from pathlib import Path
          import hashlib
          import re

          root = Path('.')
          manifest = (root / 'books/book-01/ACCEPTED_MANUSCRIPT.yaml').read_text(encoding='utf-8')
          project = (root / 'PROJECT_STATE.yaml').read_text(encoding='utf-8')
          chapter14 = root / 'books/book-01/manuscript/chapters/chapter-14.md'
          chapter15 = root / 'books/book-01/manuscript/chapters/chapter-15.md'
          chapter15_draft = root / 'books/book-01/drafts/chapter-15.md'
          chapter16_draft = root / 'books/book-01/drafts/chapter-16.md'
          chapter16_manuscript = root / 'books/book-01/manuscript/chapters/chapter-16.md'
          review = root / 'books/book-01/control/31-chapter-15-acceptance-review.md'
          mission16 = root / 'books/book-01/control/32-chapter-16-mission-lock.md'
          canon_locks = root / 'books/book-01/control/04-source-of-truth-canon-locks.md'
          maintenance = root / 'books/book-01/control/20-control-pack-maintenance-rules.md'

          accepted = int(re.search(r'^accepted_words:\s*(\d+)$', manifest, re.M).group(1))
          project_total = int(re.search(r'^\s+accepted_words:\s*(\d+)$', project, re.M).group(1))
          assert accepted == 81586, accepted
          assert project_total == accepted, (project_total, accepted)
          assert 'chapter-16.md' not in manifest
          assert 'sequence: 15' in manifest
          assert 'sequence: 16' not in manifest
          assert 'chapter: 15' in manifest
          assert '07:56:40 EDT' in manifest
          assert '17:26:40 IST' in manifest

          assert chapter14.is_file()
          chapter14_text = chapter14.read_text(encoding='utf-8')
          chapter14_data = chapter14_text.encode('utf-8')
          chapter14_blob = hashlib.sha1(
              f"blob {len(chapter14_data)}\0".encode('ascii') + chapter14_data
          ).hexdigest()
          assert chapter14_blob == '78f7fff02cd271fecbc94f7daf7151dbebbd5c6d', chapter14_blob
          assert len(chapter14_text.split()) == 5763
          assert not (root / 'books/book-01/drafts/chapter-14.md').exists()

          assert chapter15.is_file()
          assert not chapter15_draft.exists()
          assert review.is_file()
          assert mission16.is_file()

          text = chapter15.read_text(encoding='utf-8')
          lines = text.splitlines()
          data = text.encode('utf-8')
          chapter15_blob = hashlib.sha1(
              f"blob {len(data)}\0".encode('ascii') + data
          ).hexdigest()
          assert chapter15_blob == 'b8e7e2ae573a6c25ea096121c75acee867f3fad2', chapter15_blob
          assert len(text.split()) == 5993
          assert lines[0] == '07:49:32 EDT / 17:19:32 IST'
          assert lines[2] == '# Chapter 15 - The Split Record'
          assert 'At 07:56:40 EDT / 17:26:40 IST' in text
          assert 'Chapter 16' not in text
          assert 'No camera guaranteed truth. Batteries failed. Angles missed hands. Files could later be challenged.' in text
          assert 'Batteries failed. angles missed hands. files could later be challenged.' not in text

          required15 = [
              'one hundred thirty-six sealed files',
              'forty-seven incomplete files',
              'three hundred eleven excluded',
              'partition a',
              'partition b',
              'wss-4 message blocks',
              '07:54:48', '07:54:56', '07:55:02', '07:55:06',
              '07:55:11', '07:55:22', '07:55:31',
              'nine-zero-one-four-four-one',
              'nine-zero-one-four-four-two',
              'nine-zero-one-four-four-three',
              'nine-zero-one-four-four-four',
              'nine-zero-one-four-four-five',
              'nine-zero-one-four-four-six',
              'nine-zero-one-four-four-seven',
          ]
          lower15 = text.lower()
          for phrase in required15:
              assert phrase in lower15, phrase

          forbidden15 = [
              'K-17 access was confirmed',
              'WSS-4 was decrypted',
              'Sterling held the signer',
              'Sterling presented the signer',
              'Phase B was authorized',
          ]
          for phrase in forbidden15:
              assert phrase not in text, phrase

          assert chapter16_draft.is_file()
          assert not chapter16_manuscript.exists()
          chapter16_files = list((root / 'books/book-01').rglob('chapter-16.md'))
          assert chapter16_files == [chapter16_draft], chapter16_files

          draft = chapter16_draft.read_text(encoding='utf-8')
          draft_lines = draft.splitlines()
          draft_words = len(draft.split())
          assert 5800 <= draft_words <= 6500, draft_words
          assert draft_words == 6024, draft_words
          assert draft_lines[0] == '07:56:40 EDT / 17:26:40 IST'
          assert draft_lines[2] == '# Chapter 16 - The Hold Order'
          assert 'At 08:15:52 EDT / 17:45:52 IST' in draft
          assert '08:16:40 EDT / 17:46:40 IST' not in draft
          assert draft.count('Public Commercial Garage') == 1
          assert draft.count('Guarded Ambulance') == 1
          assert draft.count('Forward Post Arjun') == 1
          assert draft.count('MPD Secure Evidence Intake') == 1
          assert 'Chapter 17' not in draft

          required16 = [
              'incident `187463`',
              'General William Hackett',
              'named federal preservation sponsor',
              'MPD-nine-zero-one-four-four-one',
              'MPD-nine-zero-one-four-four-two',
              'MPD-nine-zero-one-four-four-three',
              'MPD-nine-zero-one-four-four-four',
              'MPD-nine-zero-one-four-four-five',
              'MPD-nine-zero-one-four-four-six',
              'MPD-nine-zero-one-four-four-seven',
              'separate, sealed, offline, unopened, unconnected, and uncombined',
              'Physical custody remains with Metropolitan Police',
              'I described confusion in the room',
              'I knew it did not state the full truth',
              'No one asked for one more answer.',
              'challenged allied incident set',
              'Their existence and custody did.',
              'No examiner had opened a package.',
              'No federal officer had accepted final custody.',
              'No public statement had changed.',
          ]
          for phrase in required16:
              assert phrase in draft, phrase

          forbidden16 = [
              'K-17 access was confirmed',
              'K-seventeen access was confirmed',
              'WSS-4 was decrypted',
              'Sterling held the signer',
              'Sterling presented the signer',
              'Vance typed',
              'Tariq operated',
              'Phase B was authorized',
              'India did not fire',
              'the reconstruction was false',
              'the superseding product was false',
          ]
          for phrase in forbidden16:
              assert phrase not in draft, phrase

          assert 'chapters: "1-15"' in project
          assert 'accepted_words: 81586' in project
          assert 'prose_changed_during_review: true' in project
          assert 'b8e7e2ae573a6c25ea096121c75acee867f3fad2' in project
          assert 'books/book-01/drafts/chapter-16.md' in project
          assert 'draft_words: 6024' in project
          assert 'first draft complete; unaccepted and non-canon' in project
          assert 'Run the formal Chapter 16 acceptance and revision review' in project

          review_text = review.read_text(encoding='utf-8')
          assert 'Chapter 16 and later prose do not exist' in review_text
          assert 'one capitalization-only copyedit' in review_text
          assert 'b8e7e2ae573a6c25ea096121c75acee867f3fad2' in review_text

          canon_text = canon_locks.read_text(encoding='utf-8')
          assert 'Chapter 15 — **The Split Record** — is accepted after one capitalization-only copyedit' in canon_text
          assert 'Reviewed and accepted blob: `b8e7e2ae573a6c25ea096121c75acee867f3fad2`' in canon_text

          maintenance_text = maintenance.read_text(encoding='utf-8')
          assert '`31-chapter-15-acceptance-review.md` records **ACCEPT** after one capitalization-only copyedit at 5,993 words.' in maintenance_text
          assert 'the corrected blob now lives only at `../manuscript/chapters/chapter-15.md`' in maintenance_text
          assert 'Exact draft word count is **6,024**.' in maintenance_text

          assert not (root / 'tools/apply_chapter15_acceptance_copyedit.py').exists()
          assert not (root / '.github/workflows/apply-chapter-15-acceptance-copyedit.yml').exists()

          print(f'validated accepted total: {accepted}')
          print(f'validated Chapter 14 blob: {chapter14_blob}')
          print(f'validated Chapter 15 blob: {chapter15_blob}')
          print(f'validated Chapter 16 draft words: {draft_words}')
          print('validated accepted-state protection and one unaccepted Chapter 16 draft')
          PYVALIDATE

      - name: Check whitespace errors in pull-request diff
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"
