name: Book 1 manuscript validation

on:
  pull_request:
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count accepted manuscript
        shell: bash
        run: |
          expected=$(python - <<'PYCOUNT'
          from pathlib import Path
          import re
          manifest = Path('books/book-01/ACCEPTED_MANUSCRIPT.yaml').read_text(encoding='utf-8')
          match = re.search(r'^accepted_words:\s*(\d+)$', manifest, re.M)
          if not match:
              raise SystemExit('accepted_words not found in manifest')
          print(match.group(1))
          PYCOUNT
          )
          python tools/count_book1_words.py --expect "$expected"

      - name: Validate Chapter 16 acceptance and Chapter 17 absence
        shell: bash
        run: |
          python - <<'PYVALIDATE'
          from pathlib import Path
          import hashlib
          import re

          root = Path('.')
          manifest = (root / 'books/book-01/ACCEPTED_MANUSCRIPT.yaml').read_text(encoding='utf-8')
          project = (root / 'PROJECT_STATE.yaml').read_text(encoding='utf-8')
          chapter14 = root / 'books/book-01/manuscript/chapters/chapter-14.md'
          chapter15 = root / 'books/book-01/manuscript/chapters/chapter-15.md'
          chapter16 = root / 'books/book-01/manuscript/chapters/chapter-16.md'
          draft16 = root / 'books/book-01/drafts/chapter-16.md'
          review16 = root / 'books/book-01/control/33-chapter-16-acceptance-review.md'
          mission16 = root / 'books/book-01/control/32-chapter-16-mission-lock.md'

          def blob(path):
              data = path.read_bytes()
              return hashlib.sha1(f"blob {len(data)}\0".encode('ascii') + data).hexdigest()

          accepted = int(re.search(r'^accepted_words:\s*(\d+)$', manifest, re.M).group(1))
          project_total = int(re.search(r'^\s+accepted_words:\s*(\d+)$', project, re.M).group(1))
          assert accepted == 87610, accepted
          assert project_total == accepted, (project_total, accepted)
          assert 'sequence: 16' in manifest
          assert 'sequence: 17' not in manifest
          assert 'chapter: 16' in manifest
          assert '08:15:52 EDT' in manifest
          assert '17:45:52 IST' in manifest
          assert 'Secure MPD evidence intake under Hackett' in manifest

          assert chapter14.is_file() and blob(chapter14) == '78f7fff02cd271fecbc94f7daf7151dbebbd5c6d'
          assert len(chapter14.read_text(encoding='utf-8').split()) == 5763
          assert chapter15.is_file() and blob(chapter15) == 'b8e7e2ae573a6c25ea096121c75acee867f3fad2'
          assert len(chapter15.read_text(encoding='utf-8').split()) == 5993

          assert chapter16.is_file()
          assert not draft16.exists()
          chapter16_files = list((root / 'books/book-01').rglob('chapter-16.md'))
          assert chapter16_files == [chapter16], chapter16_files
          text = chapter16.read_text(encoding='utf-8')
          lines = text.splitlines()
          assert blob(chapter16) == 'ff6fbaa66170a03502589309b3d1c2d74b50a289'
          assert len(text.split()) == 6024
          assert lines[0] == '07:56:40 EDT / 17:26:40 IST'
          assert lines[2] == '# Chapter 16 - The Hold Order'
          assert 'At 08:15:52 EDT / 17:45:52 IST' in text
          assert '08:16:40 EDT / 17:46:40 IST' not in text

          for header in ['Public Commercial Garage', 'Guarded Ambulance', 'Forward Post Arjun', 'MPD Secure Evidence Intake']:
              assert sum(line == header for line in lines) == 1, header

          required = [
              'incident `187463`',
              'General William Hackett',
              'named federal preservation sponsor',
              'MPD-nine-zero-one-four-four-one',
              'MPD-nine-zero-one-four-four-two',
              'MPD-nine-zero-one-four-four-three',
              'MPD-nine-zero-one-four-four-four',
              'MPD-nine-zero-one-four-four-five',
              'MPD-nine-zero-one-four-four-six',
              'MPD-nine-zero-one-four-four-seven',
              'separate, sealed, offline, unopened, unconnected, and uncombined',
              'Physical custody remains with Metropolitan Police',
              'I described confusion in the room',
              'I knew it did not state the full truth',
              'No one asked for one more answer.',
              'challenged allied incident set',
              'Their existence and custody did.',
              'No examiner had opened a package.',
              'No federal officer had accepted final custody.',
              'No public statement had changed.',
          ]
          for phrase in required:
              assert phrase in text, phrase

          forbidden = [
              'K-17 access was confirmed',
              'K-seventeen access was confirmed',
              'WSS-4 was decrypted',
              'Sterling held the signer',
              'Sterling presented the signer',
              'Vance typed',
              'Tariq operated',
              'Phase B was authorized',
              'India did not fire',
              'the reconstruction was false',
              'the superseding product was false',
          ]
          for phrase in forbidden:
              assert phrase not in text, phrase

          assert review16.is_file()
          review = review16.read_text(encoding='utf-8')
          assert '**Formal verdict:** **ACCEPT**' in review
          assert 'Prose changed during review: **No**' in review
          assert 'Final reviewed blob: `ff6fbaa66170a03502589309b3d1c2d74b50a289`' in review
          assert mission16.is_file()
          assert 'Chapter 16 acceptance disposition — 2026-07-13' in mission16.read_text(encoding='utf-8')

          assert 'chapters: "1-16"' in project
          assert 'accepted_words: 87610' in project
          assert 'prose_changed_during_review: false' in project
          assert 'Chapter 17 mission planning and mission locking only' in project
          assert not list((root / 'books/book-01').rglob('chapter-17.md'))
          assert not (root / 'books/book-01/control/34-chapter-17-mission-lock.md').exists()
          assert not (root / 'tools/promote_chapter16_acceptance.py').exists()
          assert not (root / '.github/workflows/promote-chapter16-acceptance.yml').exists()

          controls = [
              '04-source-of-truth-canon-locks.md', '05-master-timeline.md',
              '06-character-state-ledger.md', '07-relationship-and-trust-matrix.md',
              '08-evidence-and-chain-of-custody-ledger.md',
              '09-knowledge-and-information-control-matrix.md',
              '10-technology-and-system-rules.md',
              '11-organizations-authorities-and-institutional-control.md',
              '12-location-and-security-architecture.md',
              '13-antagonist-objectives-and-conspiracy-model.md',
              '14-public-narrative-versus-actual-record.md',
              '15-open-plot-threads-and-payoff-matrix.md',
              '16-chapter-by-chapter-status-record.md', '18-act-iii-entry-state.md',
              '20-control-pack-maintenance-rules.md', '22-book-1-ending-contract.md',
              '23-word-budget-and-act-iii-architecture.md', '24-thread-disposition-matrix.md',
          ]
          for name in controls:
              control = (root / 'books/book-01/control' / name).read_text(encoding='utf-8')
              assert (
                  'Chapter 16 accepted' in control
                  or 'Chapter 16 — The Hold Order' in control
                  or 'Chapter 16 acceptance' in control
              ), name

          print(f'validated accepted total: {accepted}')
          print('validated protected Chapter 14 and Chapter 15 blobs')
          print('validated unchanged accepted Chapter 16 blob and 6,024-word count')
          print('validated Chapter 16 promotion, control synchronization, and Chapter 17 absence')
          PYVALIDATE

      - name: Check whitespace errors in pull-request diff
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"
