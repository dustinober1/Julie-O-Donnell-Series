name: Book 1 manuscript validation

on:
  pull_request:
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Count accepted manuscript
        run: python tools/count_book1_words.py --expect 93498

      - name: Validate accepted Chapter 17 promotion
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib

          root = Path('.')

          def require(condition, message):
              if not condition:
                  raise SystemExit(message)

          def read(rel):
              path = root / rel
              require(path.is_file(), f'missing required file: {rel}')
              return path.read_text(encoding='utf-8')

          def blob(path):
              data = path.read_bytes()
              return hashlib.sha1(f"blob {len(data)}\0".encode('ascii') + data).hexdigest()

          manifest = read('books/book-01/ACCEPTED_MANUSCRIPT.yaml')
          project = read('PROJECT_STATE.yaml')
          review = read('books/book-01/control/35-chapter-17-acceptance-review.md')

          require('accepted_words: 93498' in manifest, 'accepted total is not 93498')
          require('sequence: 17' in manifest, 'Chapter 17 missing from manifest')
          require('chapter: 17' in manifest, 'accepted endpoint chapter is not 17')
          require('09:12:52 EDT' in manifest and '18:42:52 IST' in manifest, 'accepted endpoint changed')
          require('chapters: "1-17"' in project, 'PROJECT_STATE accepted range wrong')
          require('accepted_words: 93498' in project, 'PROJECT_STATE count wrong')
          require('acceptance_gate_passed: true' in project, 'Chapter 17 acceptance gate not locked true')
          require('**ACCEPT**' in review, 'review verdict missing')
          require('1c4022ebb8d27d8d448f98bcf74fbf09e6e560c1' in review, 'reviewed blob missing')
          require('Prose changed during acceptance review: **No**' in review, 'review prose-change record wrong')

          ch17 = root / 'books/book-01/manuscript/chapters/chapter-17.md'
          require(ch17.is_file(), 'accepted Chapter 17 missing')
          require(not (root / 'books/book-01/drafts/chapter-17.md').exists(), 'duplicate Chapter 17 draft remains')
          require(not list((root / 'books/book-01').rglob('chapter-18.md')), 'Chapter 18 prose exists')
          require(blob(ch17) == '1c4022ebb8d27d8d448f98bcf74fbf09e6e560c1', 'Chapter 17 blob changed')
          ch17_text = ch17.read_text(encoding='utf-8')
          require(len(ch17_text.split()) == 5888, 'Chapter 17 count changed')
          require(ch17_text.startswith('# Chapter 17 - The First Examination\n'), 'Chapter 17 title changed')
          require('08:15:52 Eastern Daylight Time' in ch17_text[:500], 'Chapter 17 EDT opening changed')
          require('17:45:52 Indian Standard Time' in ch17_text[:500], 'Chapter 17 IST opening changed')
          require('09:12:52 Eastern Daylight Time / 18:42:52 Indian Standard Time' in ch17_text[-2200:], 'Chapter 17 endpoint changed')

          protected = [
              ('chapter-14.md', '78f7fff02cd271fecbc94f7daf7151dbebbd5c6d', 5763),
              ('chapter-15.md', 'b8e7e2ae573a6c25ea096121c75acee867f3fad2', 5993),
              ('chapter-16.md', 'dd5249f4b510a9da9ad19ab2902a95ce1e62a1d8', 6024),
              ('chapter-17.md', '1c4022ebb8d27d8d448f98bcf74fbf09e6e560c1', 5888),
          ]
          chapter_root = root / 'books/book-01/manuscript/chapters'
          for name, expected_blob, expected_words in protected:
              path = chapter_root / name
              require(path.is_file(), f'missing protected prose: {name}')
              require(blob(path) == expected_blob, f'protected blob changed: {name}')
              require(len(path.read_text(encoding='utf-8').split()) == expected_words, f'protected word count changed: {name}')

          required_status = [
              'README.md',
              'books/book-01/control/00-overview.md',
              'books/book-01/control/02-current-project-state.md',
              'books/book-01/control/16-chapter-by-chapter-status-record.md',
              'books/book-01/control/18-act-iii-entry-state.md',
              'books/book-01/control/20-control-pack-maintenance-rules.md',
              'books/book-01/control/23-word-budget-and-act-iii-architecture.md',
              'books/book-01/control/README.md',
              'books/book-01/drafts/README.md',
              'books/book-01/manuscript/STATUS.md',
          ]
          stale_phrases = [
              'First draft exists; unaccepted; **non-canon**',
              'first draft; unaccepted; non-canon',
              '../drafts/chapter-17.md',
              'Acceptance gate: not yet conducted',
              'Acceptance status: **not reviewed',
              'These drafted events are not canon',
              'No Chapter 17 prose exists under `manuscript/`',
              'Do not move the draft to `manuscript/`',
          ]
          for rel in required_status:
              text = read(rel)
              for phrase in ['93,498', '09:12:52 EDT / 18:42:52 IST']:
                  require(phrase in text, f'{phrase} missing from {rel}')
              for stale in stale_phrases:
                  require(stale not in text, f'stale Chapter 17 status remains in {rel}: {stale}')

          overview = read('books/book-01/control/00-overview.md')
          require('Control-pack version:** 3.8' in overview, 'overview control-pack version wrong')
          require('Opening: **08:15:52 EDT / 17:45:52 IST**' in overview, 'overview Chapter 17 opening wrong')

          current = read('books/book-01/control/02-current-project-state.md')
          require('| Chapters 1–17 | Accepted |' in current, 'current-state accepted range wrong')
          require('| Active chapter drafts | None |' in current, 'current-state draft list wrong')

          chapter_status = read('books/book-01/control/16-chapter-by-chapter-status-record.md')
          require('## Chapter 16 — The Hold Order' in chapter_status, 'Chapter 16 status missing')
          require('**Endpoint:** 08:15:52 EDT / 17:45:52 IST' in chapter_status, 'Chapter 16 historical endpoint wrong')
          require('**Accepted total after chapter:** 87,610 words' in chapter_status, 'Chapter 16 historical total wrong')
          require('## Chapter 17 — The First Examination' in chapter_status, 'Chapter 17 status missing')
          require('**Opening:** 08:15:52 EDT / 17:45:52 IST' in chapter_status, 'Chapter 17 opening wrong')
          require('**Endpoint:** 09:12:52 EDT / 18:42:52 IST' in chapter_status, 'Chapter 17 endpoint wrong')
          require('**Accepted total after chapter:** 93,498 words' in chapter_status, 'Chapter 17 accepted total wrong')

          act_state = read('books/book-01/control/18-act-iii-entry-state.md')
          require('Act III contains five accepted chapters' in act_state, 'Act III accepted chapter count wrong')
          require('Special Agent Leila Grant, DCIS' in act_state, 'Grant missing from accepted Act III state')
          require('Federal receiver:** none' in act_state, 'final receiver state wrong')

          budget = read('books/book-01/control/23-word-budget-and-act-iii-architecture.md')
          require('| Accepted manuscript through Chapter 17 | **93,498** |' in budget, 'current word budget total wrong')
          require('| Remaining to minimum | **6,502** |' in budget, 'minimum gap wrong')
          require('| Remaining to planning target | **19,002** |' in budget, 'planning gap wrong')
          require('| Remaining before maximum | **31,502** |' in budget, 'maximum gap wrong')
          require('| Accepted Act III subtotal, Chapters 13–17 | **29,843** |' in budget, 'Act III subtotal wrong')

          control_readme = read('books/book-01/control/README.md')
          require('Canon Control Pack v3.8' in control_readme, 'control pack index version wrong')
          require('Version 3.8 records Chapter 17' in control_readme, 'control pack current-state summary missing')
          require('[35. Chapter 17 Acceptance Review](35-chapter-17-acceptance-review.md)' in control_readme, 'review link missing')
          require('**Acceptance review:** `35-chapter-17-acceptance-review.md` — **ACCEPT**' in control_readme, 'control pack verdict record wrong')
          require('**Opening:** 08:15:52 EDT / 17:45:52 IST' in control_readme, 'control pack Chapter 17 opening wrong')
          require('**Endpoint:** 09:12:52 EDT / 18:42:52 IST' in control_readme, 'control pack Chapter 17 endpoint wrong')
          for stale in [
              'Version 3.7 records the Chapter 17 accepted chapter',
              '**Status:** unaccepted, non-canon',
              '**Accepted manifest:** unchanged through Chapter 16',
              '**Opening:** 09:12:52 EDT / 18:42:52 IST',
          ]:
              require(stale not in control_readme, f'stale control-pack Chapter 17 state remains: {stale}')

          required_ledger_markers = {
              'books/book-01/control/04-source-of-truth-canon-locks.md': 'Accepted Chapter 17 canon lock',
              'books/book-01/control/05-master-timeline.md': 'Accepted Chapter 17 timeline',
              'books/book-01/control/06-character-state-ledger.md': 'Accepted Chapter 17 character-state update',
              'books/book-01/control/07-relationship-and-trust-matrix.md': 'Accepted Chapter 17 relationship update',
              'books/book-01/control/08-evidence-and-chain-of-custody-ledger.md': 'Accepted Chapter 17 evidence and custody update',
              'books/book-01/control/09-knowledge-and-information-control-matrix.md': 'Accepted Chapter 17 knowledge update',
              'books/book-01/control/10-technology-and-system-rules.md': 'Accepted Chapter 17 technology update',
              'books/book-01/control/11-organizations-authorities-and-institutional-control.md': 'Accepted Chapter 17 institutional update',
              'books/book-01/control/12-location-and-security-architecture.md': 'Accepted Chapter 17 location update',
              'books/book-01/control/13-antagonist-objectives-and-conspiracy-model.md': 'Chapter 17 non-expansion note',
              'books/book-01/control/14-public-narrative-versus-actual-record.md': 'Accepted Chapter 17 public-versus-actual update',
              'books/book-01/control/15-open-plot-threads-and-payoff-matrix.md': 'Accepted Chapter 17 thread update',
              'books/book-01/control/24-thread-disposition-matrix.md': 'Accepted Chapter 17 disposition update',
              'series/recurring-character-ledger.md': 'Accepted Book 1 Chapter 17 update',
          }
          for rel, marker in required_ledger_markers.items():
              require(marker in read(rel), f'Chapter 17 ledger update missing: {rel}')

          for temp in [
              root / 'tools/promote_chapter17_acceptance.py',
              root / '.github/workflows/chapter17-acceptance-promotion.yml',
              root / 'artifacts/chapter-17-promotion-failure.log',
          ]:
              require(not temp.exists(), f'temporary promotion file remains: {temp}')

          print('accepted Chapter 17 promotion validated')
          PY

      - name: Check whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"
