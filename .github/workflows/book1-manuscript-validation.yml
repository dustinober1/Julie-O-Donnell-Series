name: Book 1 manuscript validation

on:
  pull_request:
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Count accepted manuscript
        run: python tools/count_book1_words.py --expect 93498

      - name: Validate Chapter 18 mission lock
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib

          root = Path('.')

          def require(condition, message):
              if not condition:
                  raise SystemExit(message)

          def read(rel):
              path = root / rel
              require(path.is_file(), f'missing required file: {rel}')
              return path.read_text(encoding='utf-8')

          def blob(path):
              data = path.read_bytes()
              return hashlib.sha1(f"blob {len(data)}\0".encode('ascii') + data).hexdigest()

          manifest = read('books/book-01/ACCEPTED_MANUSCRIPT.yaml')
          project = read('PROJECT_STATE.yaml')
          review = read('books/book-01/control/35-chapter-17-acceptance-review.md')
          lock = read('books/book-01/control/36-chapter-18-mission-lock.md')

          require('accepted_words: 93498' in manifest, 'accepted total is not 93498')
          require('sequence: 17' in manifest, 'Chapter 17 missing from manifest')
          require('sequence: 18' not in manifest, 'Chapter 18 was added to accepted manifest')
          require('chapter: 17' in manifest, 'accepted endpoint chapter is not 17')
          require('09:12:52 EDT' in manifest and '18:42:52 IST' in manifest, 'accepted endpoint changed')
          require('chapters: "1-17"' in project, 'PROJECT_STATE accepted range wrong')
          require('accepted_words: 93498' in project, 'PROJECT_STATE count wrong')
          require('**ACCEPT**' in review, 'Chapter 17 review verdict missing')
          require('1c4022ebb8d27d8d448f98bcf74fbf09e6e560c1' in review, 'Chapter 17 reviewed blob missing')

          protected = [
              ('chapter-14.md', '78f7fff02cd271fecbc94f7daf7151dbebbd5c6d', 5763),
              ('chapter-15.md', 'b8e7e2ae573a6c25ea096121c75acee867f3fad2', 5993),
              ('chapter-16.md', 'dd5249f4b510a9da9ad19ab2902a95ce1e62a1d8', 6024),
              ('chapter-17.md', '1c4022ebb8d27d8d448f98bcf74fbf09e6e560c1', 5888),
          ]
          chapter_root = root / 'books/book-01/manuscript/chapters'
          for name, expected_blob, expected_words in protected:
              path = chapter_root / name
              require(path.is_file(), f'missing protected prose: {name}')
              require(blob(path) == expected_blob, f'protected blob changed: {name}')
              require(len(path.read_text(encoding='utf-8').split()) == expected_words, f'protected word count changed: {name}')

          require('# 36. CHAPTER 18 MISSION LOCK — THE LOCAL RECORD' in lock, 'Chapter 18 title/lock heading wrong')
          for section in [
              '## 1. Status and authority',
              '## 3. Remaining-obligation audit',
              '## 4. Candidate mission analysis',
              '## 5. Selected title and title rationale',
              '## 6. Dominant dramatic function',
              '## 10. Opening time and location',
              '## 12. POV structure',
              '## 16. Evidence-custody plan',
              '## 17. Technology rules',
              '## 22. Success condition',
              '## 23. Failure condition',
              '## 24. Hard-stop or decision boundary',
              '## 25. Midpoint reversal',
              '## 28. Scene-by-scene blueprint',
              '## 29. Exact endpoint state',
              '## 33. Word budget',
              '## 34. Drafting instructions',
              '## 38. No-prose certification',
          ]:
              require(section in lock, f'mission-lock section missing: {section}')

          for marker in [
              '09:12:52 EDT / 18:42:52 IST',
              '10:01:12 EDT / 19:31:12 IST',
              'Major Ananya Sharma',
              'ARJ-K17-018',
              'ARJ-K17-001',
              'ARJ-K17-002',
              'ARJ-K17-003',
              'ARJ-K17-ACK-01',
              '4,400–5,200 words',
              'Mission locked; undrafted; non-canon planning',
              '### Candidate A — The Local Record',
              '### Candidate B — The Second Examination',
              '### Candidate C — The Witness Choice',
              '### Candidate D — The Hartwell Production',
              'No complete remainder-of-Act-III outline is created.',
              'This mission lock contains no Chapter 18 narrative prose',
          ]:
              require(marker in lock, f'mission-lock marker missing: {marker}')

          require(not (root / 'books/book-01/drafts/chapter-18.md').exists(), 'Chapter 18 draft exists')
          require(not (root / 'books/book-01/manuscript/chapters/chapter-18.md').exists(), 'Chapter 18 manuscript prose exists')
          require(not list((root / 'books/book-01').rglob('chapter-19.md')), 'Chapter 19 prose exists')
          require(not (root / 'books/book-01/control/37-chapter-19-mission-lock.md').exists(), 'Chapter 19 mission lock exists')

          require('chapter_18_mission_lock: "books/book-01/control/36-chapter-18-mission-lock.md"' in project, 'PROJECT_STATE mission-lock path missing')
          require('status: "mission locked; undrafted; non-canon planning"' in project, 'PROJECT_STATE Chapter 18 status wrong')
          require('next_gate: "Draft exactly one complete first version at books/book-01/drafts/chapter-18.md; do not draft Chapter 19"' in project, 'PROJECT_STATE Chapter 18 next gate wrong')
          require('accepted_words: 93498' in project, 'PROJECT_STATE accepted count changed')
          require('endpoint: "09:12:52 EDT / 18:42:52 IST"' in project, 'PROJECT_STATE accepted endpoint changed')

          control_readme = read('books/book-01/control/README.md')
          require('[36. Chapter 18 Mission Lock](36-chapter-18-mission-lock.md)' in control_readme, 'control-pack index link missing')

          drafts_status = read('books/book-01/drafts/README.md')
          manuscript_status = read('books/book-01/manuscript/STATUS.md')
          require('chapter-18.md' in drafts_status and 'does not exist' in drafts_status.lower(), 'draft status is not explicit')
          require('Chapter 18' in manuscript_status and 'non-canon' in manuscript_status, 'manuscript status is not explicit')

          print('Chapter 18 mission-lock state validated')
          PY

      - name: Check whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"
