name: Book 1 manuscript validation

on:
  pull_request:
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Count accepted manuscript
        run: python tools/count_book1_words.py --expect 97976

      - name: Validate protected accepted prose and manifest
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import subprocess

          root = Path(".")
          chapters = root / "books/book-01/manuscript/chapters"

          def require(value, message):
              if not value:
                  raise SystemExit(message)

          protected = {
              "chapter-14.md": ("78f7fff02cd271fecbc94f7daf7151dbebbd5c6d", 5763),
              "chapter-15.md": ("b8e7e2ae573a6c25ea096121c75acee867f3fad2", 5993),
              "chapter-16.md": ("dd5249f4b510a9da9ad19ab2902a95ce1e62a1d8", 6024),
              "chapter-17.md": ("1c4022ebb8d27d8d448f98bcf74fbf09e6e560c1", 5888),
              "chapter-18.md": ("6f5873d6e975ec74646af152aad22ea84545fc01", 4478),
          }
          for name, (expected_blob, expected_words) in protected.items():
              path = chapters / name
              require(path.is_file(), f"missing protected chapter: {name}")
              actual_blob = subprocess.check_output(["git", "hash-object", str(path)], text=True).strip()
              require(actual_blob == expected_blob, f"protected blob changed: {name} = {actual_blob}")
              actual_words = len(path.read_text(encoding="utf-8").split())
              require(actual_words == expected_words, f"protected count changed: {name} = {actual_words}")

          manifest = (root / "books/book-01/ACCEPTED_MANUSCRIPT.yaml").read_text(encoding="utf-8")
          require("accepted_words: 97976" in manifest, "accepted total changed")
          require("accepted_endpoint:\n  chapter: 18" in manifest, "accepted endpoint chapter changed")
          require("chapter-18.md" in manifest, "Chapter 18 missing from accepted manifest")
          require("chapter-19.md" not in manifest, "Chapter 19 entered accepted manifest")
          listed = [int(n) for n in re.findall(r"chapter-(\d+)\.md", manifest)]
          require(listed and max(listed) == 18, f"accepted manifest does not end at Chapter 18: {listed}")
          require(not (root / "books/book-01/drafts/chapter-18.md").exists(), "duplicate Chapter 18 draft remains")
          print("protected accepted prose and manifest validated")
          PY

      - name: Validate Chapter 18 accepted state
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          book = Path("books/book-01")
          chapter = book / "manuscript/chapters/chapter-18.md"

          def require(value, message):
              if not value:
                  raise SystemExit(message)

          require((book / "control/36-chapter-18-mission-lock.md").is_file(), "Chapter 18 mission lock missing")
          require((book / "control/37-chapter-18-acceptance-review.md").is_file(), "Chapter 18 acceptance review missing")
          require(chapter.is_file(), "Chapter 18 manuscript missing")
          require(sorted(book.rglob("chapter-18.md")) == [chapter], "unexpected Chapter 18 path")

          text = chapter.read_text(encoding="utf-8")
          require(len(text.split()) == 4478, "Chapter 18 count changed")
          require(text.startswith("09:12:52 EDT / 18:42:52 IST\n\n# Chapter 18 - The Local Record\n"), "opening or title changed")
          require("Forward Post Arjun\nKashmir" in text[:300], "opening location changed")
          require("10:01:12 Eastern Daylight Time / 19:31:12 Indian Standard Time" in text[-2500:], "endpoint changed")
          require(text.count("# Chapter ") == 1, "unexpected Chapter 18 heading count")
          print("Chapter 18 accepted state validated")
          PY

      - name: Validate Chapter 19 draft state
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess

          root = Path(".")
          book = root / "books/book-01"
          control = book / "control"
          drafts = book / "drafts"
          mission = control / "38-chapter-19-mission-lock.md"
          draft = drafts / "chapter-19.md"

          def require(value, message):
              if not value:
                  raise SystemExit(message)

          require(mission.is_file(), "Chapter 19 mission lock missing")
          mission_blob = subprocess.check_output(["git", "hash-object", str(mission)], text=True).strip()
          require(mission_blob == "7b69ff80ed9b0286a52c0a8428792489eb236ef3",
                  f"Chapter 19 mission lock changed: {mission_blob}")

          all_ch19 = sorted(book.rglob("chapter-19.md"))
          require(all_ch19 == [draft], f"unexpected Chapter 19 prose paths: {all_ch19}")
          require(not (book / "manuscript/chapters/chapter-19.md").exists(), "Chapter 19 manuscript file exists")
          require(not list(control.glob("*chapter-19-acceptance-review*.md")), "Chapter 19 acceptance review exists")
          require(not (control / "39-chapter-19-acceptance-review.md").exists(), "Chapter 19 acceptance review exists at expected next path")
          require(not list(book.rglob("chapter-20.md")), "Chapter 20 prose exists")
          require(not list(control.glob("*chapter-20-mission-lock*.md")), "Chapter 20 mission lock exists")

          text = draft.read_text(encoding="utf-8")
          words = len(text.split())
          require(words == 5393, f"Chapter 19 draft count changed: {words}")
          require(5200 <= words <= 5900, f"Chapter 19 draft outside approved range: {words}")
          require(text.startswith(
              "10:01:12 EDT / 19:31:12 IST\n\n"
              "# Chapter 19 - The Name on the Record\n\n"
              "Secure MPD Evidence Intake\nWashington, D.C.\n"
          ), "Chapter 19 opening, title, or location changed")
          require("At 10:44:12 EDT / 20:14:12 IST" in text[-1600:], "Chapter 19 endpoint missing")
          require(text.count("# Chapter ") == 1, "unexpected Chapter 19 heading count")
          require(text.count("Hartwell Executive Briefing Annex") == 1, "Grant cutaway count/location changed")

          required = [
              "DCIS-FR-187463-01",
              "ARJ-K17-ACK-01",
              "No Indian rounds were fired.",
              "K-seventeen was physically intact at inspection.",
              "Security Line One recorded an accepted pass.",
              "LOCAL SOURCE-RECORD WRITES: 0",
              "SSO-NS-004",
              "HWA-LCA-1187",
              "HWA-CD-187463-01",
              "07:47:49 EDT",
              "MPD-SL-551821",
              "APX-B3-IR-5521",
              "Hartwell has no present physical custody",
              "Who authorized `SSO-NS-004`",
          ]
          missing = [item for item in required if item not in text]
          require(not missing, f"Chapter 19 required element missing: {missing}")

          prohibited = [
              "Sterling personally held",
              "Sterling personally presented",
              "Sterling personally operated",
              "Sterling ordered use",
              "Tariq was physically present",
              "Tariq personally operated",
              "Vance personally typed",
              "WSS-4 plaintext",
              "Julie called Sharma",
              "Sharma called Julie",
          ]
          present = [item for item in prohibited if item in text]
          require(not present, f"Chapter 19 prohibited conclusion present: {present}")

          for artifact in ["TODO", "DRAFTING NOTE", "ALTERNATE VERSION", "PLACEHOLDER"]:
              require(artifact not in text, f"Chapter 19 drafting artifact remains: {artifact}")

          forbidden_names = {
              "remainder-of-act-iii-outline.md",
              "act-iii-remainder-outline.md",
              "chapter-by-chapter-act-iii-outline.md",
              "chapter-19-final.md",
              "chapter-19-final2.md",
              "chapter-19-latest.md",
              "chapter-19-new-final.md",
          }
          for name in forbidden_names:
              require(not list(book.rglob(name)), f"unauthorized file exists: {name}")

          print("Chapter 19 draft state validated")
          PY

      - name: Validate synchronized Chapter 19 draft controls
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path(".")

          def require(value, message):
              if not value:
                  raise SystemExit(message)

          project = (root / "PROJECT_STATE.yaml").read_text(encoding="utf-8")
          project_required = [
              "accepted_words: 97976",
              "chapters: 1-18",
              "reviewed_blob_sha: 6f5873d6e975ec74646af152aad22ea84545fc01",
              "chapter_19_record:",
              "working_title: The Name on the Record",
              "status: drafted; unaccepted; non-canon",
              "draft_path: books/book-01/drafts/chapter-19.md",
              "draft_exists: true",
              "draft_words: 5393",
              "acceptance_review_exists: false",
              "draft_endpoint: 10:44:12 EDT / 20:14:12 IST",
              "next_gate: Formal Chapter 19 acceptance review and promotion pass",
          ]
          missing = [item for item in project_required if item not in project]
          require(not missing, f"PROJECT_STATE missing draft sentinel: {missing}")

          sentinels = {
              "README.md": [
                  "Chapter 19 working title: **The Name on the Record**",
                  "Chapter 19 draft length: **5,393 words**",
                  "Chapter 19 acceptance review: not created",
                  "Perform the formal Chapter 19 acceptance review",
              ],
              "books/book-01/control/00-overview.md": [
                  "Control-pack version:** 4.3",
                  "## Chapter 19 first-draft state — non-canon",
                  "Exact draft words: **5,393**",
              ],
              "books/book-01/control/02-current-project-state.md": [
                  "Chapter 19 | Drafted at 5,393 words; unaccepted; non-canon",
                  "## Chapter 19 first draft — non-canon",
              ],
              "books/book-01/control/16-chapter-by-chapter-status-record.md": [
                  "## Chapter 19 first draft",
                  "**Exact words:** 5,393",
              ],
              "books/book-01/control/18-act-iii-entry-state.md": [
                  "## Chapter 19 first-draft transition — non-canon",
                  "`38-chapter-19-mission-lock.md` controls the single draft at `../drafts/chapter-19.md`.",
              ],
              "books/book-01/control/20-control-pack-maintenance-rules.md": [
                  "## Chapter 19 maintenance record — draft only",
                  "Exact draft words: **5,393**",
              ],
              "books/book-01/control/23-word-budget-and-act-iii-architecture.md": [
                  "## Chapter 19 draft state — non-canon",
                  "| Exact words | **5,393** |",
              ],
              "books/book-01/control/24-thread-disposition-matrix.md": [
                  "## Chapter 19 draft-state update — non-canon",
                  "The draft below is available for formal review.",
              ],
              "books/book-01/control/README.md": [
                  "# Canon Control Pack v4.3",
                  "## Chapter 19 draft state",
              ],
              "books/book-01/drafts/README.md": [
                  "Active chapter drafts: **Chapter 19 only**",
                  "Exact words: **5,393**",
              ],
              "books/book-01/manuscript/STATUS.md": [
                  "## Chapter 19 first draft — non-canon",
                  "Exact words: **5,393**",
              ],
          }
          for rel, expected in sentinels.items():
              path = root / rel
              require(path.is_file(), f"missing draft control: {rel}")
              text = path.read_text(encoding="utf-8")
              missing = [item for item in expected if item not in text]
              require(not missing, f"{rel} missing draft sentinel: {missing}")
              require("97,976" in text, f"{rel} missing accepted total")
          print("Chapter 19 draft controls synchronized")
          PY

      - name: Validate cleanup and whitespace
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path(".")
          temporary = [
              p for p in root.rglob("*")
              if p.is_file() and p.name.endswith((".tmp", ".bak", ".orig", ".rej", ".pyc"))
          ]
          if temporary:
              raise SystemExit(f"temporary files remain: {temporary}")

          forbidden_helpers = [
              Path("tools/promote_chapter18_acceptance.py"),
              Path(".github/workflows/chapter18-acceptance-promotion.yml"),
              Path(".github/ch18-promotion-parts"),
              Path("tools/create_chapter19_mission_lock.py"),
              Path(".github/workflows/chapter19-mission-lock.yml"),
              Path("tools/draft_chapter19.py"),
              Path(".github/workflows/chapter19-draft.yml"),
          ]
          if any(path.exists() for path in forbidden_helpers):
              raise SystemExit("temporary implementation automation remains")
          print("cleanup validated")
          PY

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "origin/${{ github.base_ref }}...HEAD" -- .
          else
            git diff --check HEAD^ -- .
          fi
