name: Book 1 manuscript validation

on:
  pull_request:
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count accepted manuscript
        shell: bash
        run: |
          expected=$(python - <<'PYCOUNT'
          from pathlib import Path
          import re
          manifest = Path('books/book-01/ACCEPTED_MANUSCRIPT.yaml').read_text(encoding='utf-8')
          match = re.search(r'^accepted_words:\s*(\d+)$', manifest, re.M)
          if not match:
              raise SystemExit('accepted_words not found in manifest')
          print(match.group(1))
          PYCOUNT
          )
          python tools/count_book1_words.py --expect "$expected"

      - name: Validate Chapter 17 mission lock and Chapter 17 prose absence
        shell: bash
        run: |
          python - <<'PYVALIDATE'
          from pathlib import Path
          import hashlib
          import re

          root = Path('.')
          manifest_path = root / 'books/book-01/ACCEPTED_MANUSCRIPT.yaml'
          project_path = root / 'PROJECT_STATE.yaml'
          manifest = manifest_path.read_text(encoding='utf-8')
          project = project_path.read_text(encoding='utf-8')

          chapter14 = root / 'books/book-01/manuscript/chapters/chapter-14.md'
          chapter15 = root / 'books/book-01/manuscript/chapters/chapter-15.md'
          chapter16 = root / 'books/book-01/manuscript/chapters/chapter-16.md'
          mission17 = root / 'books/book-01/control/34-chapter-17-mission-lock.md'
          draft17 = root / 'books/book-01/drafts/chapter-17.md'
          manuscript17 = root / 'books/book-01/manuscript/chapters/chapter-17.md'

          def blob(path):
              data = path.read_bytes()
              return hashlib.sha1(f"blob {len(data)}\0".encode('ascii') + data).hexdigest()

          accepted = int(re.search(r'^accepted_words:\s*(\d+)$', manifest, re.M).group(1))
          project_total = int(re.search(r'^\s+accepted_words:\s*(\d+)$', project, re.M).group(1))
          assert accepted == 87610, accepted
          assert project_total == accepted, (project_total, accepted)
          assert 'sequence: 16' in manifest
          assert 'sequence: 17' not in manifest
          assert 'chapter: 16' in manifest
          assert '08:15:52 EDT' in manifest
          assert '17:45:52 IST' in manifest
          assert 'Secure MPD evidence intake under Hackett' in manifest

          assert chapter14.is_file() and blob(chapter14) == '78f7fff02cd271fecbc94f7daf7151dbebbd5c6d'
          assert len(chapter14.read_text(encoding='utf-8').split()) == 5763
          assert chapter15.is_file() and blob(chapter15) == 'b8e7e2ae573a6c25ea096121c75acee867f3fad2'
          assert len(chapter15.read_text(encoding='utf-8').split()) == 5993
          assert chapter16.is_file() and blob(chapter16) == 'dd5249f4b510a9da9ad19ab2902a95ce1e62a1d8'
          assert len(chapter16.read_text(encoding='utf-8').split()) == 6024

          chapter16_files = list((root / 'books/book-01').rglob('chapter-16.md'))
          assert chapter16_files == [chapter16], chapter16_files
          assert not (root / 'books/book-01/drafts/chapter-16.md').exists()

          assert mission17.is_file()
          lock = mission17.read_text(encoding='utf-8')
          required_lock_phrases = [
              '# Chapter 17 Mission Lock — The First Examination',
              '**Status:** Approved production planning only.',
              '08:15:52 EDT / 17:45:52 IST',
              '09:12:52 EDT / 18:42:52 IST',
              'Special Agent Leila Grant',
              'Defense Criminal Investigative Service',
              '`MPD-901446` — administrator-token board `EAT-0881147`',
              '**5,600–6,300 words**',
              'MPD retains physical custody of all seven packages',
              'The other six packages remain closed and unchanged.',
              'No-prose certification',
              'Draft exactly one complete first version of Chapter 17',
          ]
          for phrase in required_lock_phrases:
              assert phrase in lock, phrase

          candidate_phrases = [
              'Candidate A — Independent technical intake',
              'Candidate B — Washington/field reconnection',
              'Candidate C — Institutional pressure and record attack',
              'ACCEPT as Chapter 17\'s single dominant function',
              'REJECT as dominant. ACCEPT only as supporting pressure',
          ]
          for phrase in candidate_phrases:
              assert phrase in lock, phrase

          lock_sections = [
              'Accepted canon',
              'Approved Chapter 17 planning',
              'Unresolved evidence',
              'Strong inference only',
              'Prohibited invention',
              'Later Book 1 obligations',
          ]
          for section in lock_sections:
              assert section in lock, section

          assert not draft17.exists()
          assert not manuscript17.exists()
          assert not list((root / 'books/book-01').rglob('chapter-17.md'))
          assert 'active_chapter_drafts: []' in project
          assert 'chapter_17_mission_lock: "books/book-01/control/34-chapter-17-mission-lock.md"' in project
          assert 'status: "mission locked; planning only; not drafted; non-canon"' in project
          assert 'Draft exactly one complete first version of Chapter 17' in project
          assert 'accepted_words_changed: false' in project
          assert 'accepted_manifest_changed: false' in project

          status_files = [
              root / 'README.md',
              root / 'books/book-01/control/00-overview.md',
              root / 'books/book-01/control/02-current-project-state.md',
              root / 'books/book-01/control/16-chapter-by-chapter-status-record.md',
              root / 'books/book-01/control/18-act-iii-entry-state.md',
              root / 'books/book-01/control/20-control-pack-maintenance-rules.md',
              root / 'books/book-01/control/23-word-budget-and-act-iii-architecture.md',
              root / 'books/book-01/control/24-thread-disposition-matrix.md',
              root / 'books/book-01/control/README.md',
              root / 'books/book-01/drafts/README.md',
              root / 'books/book-01/manuscript/STATUS.md',
          ]
          for path in status_files:
              text = path.read_text(encoding='utf-8')
              assert 'Chapter 17' in text, path
              assert ('mission lock' in text.lower() or 'mission locked' in text.lower()), path

          core_status_files = [
              root / 'README.md',
              root / 'books/book-01/control/00-overview.md',
              root / 'books/book-01/control/02-current-project-state.md',
              root / 'books/book-01/control/16-chapter-by-chapter-status-record.md',
              root / 'books/book-01/control/18-act-iii-entry-state.md',
              root / 'books/book-01/control/20-control-pack-maintenance-rules.md',
              root / 'books/book-01/control/23-word-budget-and-act-iii-architecture.md',
              root / 'books/book-01/control/README.md',
              root / 'books/book-01/drafts/README.md',
              root / 'books/book-01/manuscript/STATUS.md',
          ]
          for path in core_status_files:
              text = path.read_text(encoding='utf-8')
              assert '87,610' in text, path
              assert '08:15:52 EDT / 17:45:52 IST' in text, path

          assert 'Canon Control Pack v3.6' in (root / 'books/book-01/control/README.md').read_text(encoding='utf-8')
          assert '[34. Chapter 17 Mission Lock](34-chapter-17-mission-lock.md)' in (root / 'books/book-01/control/README.md').read_text(encoding='utf-8')

          temporary_paths = [
              root / 'tools/promote_chapter16_acceptance.py',
              root / '.github/workflows/promote-chapter16-acceptance.yml',
              root / '.github/workflows/apply-chapter16-pov-firewall-repair.yml',
              root / '.github/workflows/apply-chapter16-pov-firewall-repair-pr.yml',
              root / '.github/workflows/apply-chapter16-explicit-repair.yml',
          ]
          for path in temporary_paths:
              assert not path.exists(), path

          print(f'validated accepted total: {accepted}')
          print('validated protected Chapter 14, Chapter 15, and Chapter 16 blobs and counts')
          print('validated Chapter 17 mission lock, synchronized planning state, and prose absence')
          PYVALIDATE

      - name: Check whitespace errors in pull-request diff
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"
