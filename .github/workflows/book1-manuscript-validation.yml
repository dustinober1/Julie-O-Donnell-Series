name: Book 1 manuscript validation

on:
  pull_request:
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Count accepted manuscript
        run: python tools/count_book1_words.py --expect 93498

      - name: Validate accepted baseline and protected prose
        shell: bash
        run: |
          python - <<'PYBASELINE'
          from pathlib import Path
          import subprocess

          root = Path(".")
          chapter_root = root / "books/book-01/manuscript/chapters"

          def require(condition, message):
              if not condition:
                  raise SystemExit(message)

          protected = {
              "chapter-14.md": ("78f7fff02cd271fecbc94f7daf7151dbebbd5c6d", 5763),
              "chapter-15.md": ("b8e7e2ae573a6c25ea096121c75acee867f3fad2", 5993),
              "chapter-16.md": ("dd5249f4b510a9da9ad19ab2902a95ce1e62a1d8", 6024),
              "chapter-17.md": ("1c4022ebb8d27d8d448f98bcf74fbf09e6e560c1", 5888),
          }
          for name, (expected_blob, expected_words) in protected.items():
              path = chapter_root / name
              require(path.is_file(), f"protected chapter missing: {name}")
              blob = subprocess.check_output(
                  ["git", "hash-object", str(path)], text=True
              ).strip()
              require(blob == expected_blob, f"protected blob changed: {name} = {blob}")
              words = len(path.read_text(encoding="utf-8").split())
              require(words == expected_words, f"protected word count changed: {name} = {words}")

          manifest = (root / "books/book-01/ACCEPTED_MANUSCRIPT.yaml").read_text(encoding="utf-8")
          require("accepted_words: 93498" in manifest, "accepted total changed")
          require('last_accepted_chapter: 17' in manifest, "accepted endpoint chapter changed")
          require("chapter-17.md" in manifest, "Chapter 17 missing from accepted manifest")
          require("chapter-18.md" not in manifest, "unaccepted Chapter 18 entered accepted manifest")

          require(not (chapter_root / "chapter-18.md").exists(), "unaccepted Chapter 18 entered manuscript")
          require(not (root / "books/book-01/drafts/chapter-17.md").exists(), "accepted Chapter 17 draft remains")
          print("accepted baseline, manifest, and protected prose validated")
          PYBASELINE

      - name: Validate Chapter 18 first draft
        shell: bash
        run: |
          python - <<'PYDRAFT'
          from pathlib import Path

          root = Path(".")
          book = root / "books/book-01"
          draft = book / "drafts/chapter-18.md"
          mission = book / "control/36-chapter-18-mission-lock.md"
          project = (root / "PROJECT_STATE.yaml").read_text(encoding="utf-8")

          def require(condition, message):
              if not condition:
                  raise SystemExit(message)

          require(mission.is_file(), "Chapter 18 mission lock missing")
          require(draft.is_file(), "Chapter 18 first draft missing")

          chapter18_paths = sorted(book.rglob("chapter-18.md"))
          require(chapter18_paths == [draft], f"unexpected Chapter 18 paths: {chapter18_paths}")
          require(not (book / "manuscript/chapters/chapter-18.md").exists(), "Chapter 18 manuscript file exists")

          chapter19_prose = sorted(book.rglob("chapter-19.md"))
          require(not chapter19_prose, f"Chapter 19 prose exists: {chapter19_prose}")
          chapter19_locks = [
              path for path in book.joinpath("control").glob("*chapter-19*")
              if "mission-lock" in path.name
          ]
          require(not chapter19_locks, f"Chapter 19 mission lock exists: {chapter19_locks}")

          text = draft.read_text(encoding="utf-8")
          words = len(text.split())
          require(4400 <= words <= 5200, f"Chapter 18 word count out of range: {words}")
          require(words == 4600, f"Chapter 18 exact draft word count changed: {words}")
          require(text.startswith("09:12:52 EDT / 18:42:52 IST\n\n# Chapter 18 - The Local Record\n"), "Chapter 18 opening/title changed")
          require("Forward Post Arjun\nKashmir" in text[:300], "Chapter 18 opening location changed")
          require("10:01:12 Eastern Daylight Time / 19:31:12 Indian Standard Time" in text[-2500:], "Chapter 18 endpoint changed")
          require(text.count("# Chapter ") == 1, "unexpected additional chapter heading")
          require("Chapter 19" not in text, "Chapter 19 material appears in Chapter 18 draft")

          required = [
              "ARJ-K17-018",
              "ARJ-K17-001",
              "ARJ-K17-002",
              "ARJ-K17-003",
              "ARJ-K17-ACK-01",
              "K17-AC-44719",
              "K17-FS-1176",
              "ARJ-SL-20471",
              "ARJ-SL-20472",
              "ARJ-SL-20473",
              "Captain Rao",
              "Naib Subedar Vikram Sethi",
              "Lance Naik Suresh Pal",
              "SECURITY LINE ONE: PASS",
              "TARIQ, MAJOR / FORWARD LIAISON CELL",
              "LOCAL SOURCE-RECORD RECONSTRUCTION / MAINTENANCE COMMIT",
              "FINAL LOCAL AUTHENTICATION / COMMIT: NOT COMPLETE / NOT EXECUTED",
              "LOCAL SOURCE-RECORD WRITES: 0",
              "IRR-2041",
              "REGISTERED AUTHORITY: TARIQ, MAJOR / FORWARD LIAISON CELL",
              "The local record had entered the route without leaving the mountain.",
          ]
          for phrase in required:
              require(phrase in text, f"Chapter 18 draft missing required element: {phrase}")

          hard_stop_terms = [
              "It did not cross the inner security boundary.",
              "It did not pursue tracks where a hostile presence, tamper hazard, explosive hazard, or Line-of-Control crossing could not be excluded.",
              "We could not exclude an explosive or tamper hazard on the lower seam.",
              "it did not open the relay, create a live network path, or change the preceding record.",
              "No replacement medium was connected.",
              "its local incident-write path stayed offline pending authorized restoration.",
              "LIVE WRITE STATE: NOT AUTHORIZED",
              "I am removing him from questioning.",
          ]
          for phrase in hard_stop_terms:
              require(phrase in text, f"hard-stop or medical rule missing: {phrase}")

          prohibited_claims = [
              "Tariq was physically present",
              "Tariq personally operated",
              "Sterling personally held",
              "Vance personally typed",
              "WSS-4 plaintext",
              "the Hartwell presenter was",
              "universal Northbridge",
              "Julie called Sharma",
              "Sharma called Julie",
          ]
          for phrase in prohibited_claims:
              require(phrase not in text, f"prohibited conclusion appears: {phrase}")

          for artifact in ["TODO", "DRAFTING NOTE", "ALTERNATE VERSION", "PLACEHOLDER"]:
              require(artifact not in text, f"drafting artifact remains: {artifact}")

          require("active_chapter_drafts:" in project and "books/book-01/drafts/chapter-18.md" in project, "PROJECT_STATE active draft missing")
          require('status: "first draft exists; unaccepted; non-canon"' in project, "PROJECT_STATE Chapter 18 status wrong")
          require("draft_exists: true" in project, "PROJECT_STATE draft_exists not true")
          require("draft_words: 4600" in project, "PROJECT_STATE exact draft count missing")
          require("accepted_manifest_changed: false" in project, "accepted manifest effect not locked false")
          require("accepted_words_changed: false" in project, "accepted word effect not locked false")
          require("Conduct the formal Chapter 18 acceptance review" in project, "formal acceptance review is not next gate")

          print(f"Chapter 18 first draft validated at {words} words")
          PYDRAFT

      - name: Validate synchronized draft status
        shell: bash
        run: |
          python - <<'PYSTATUS'
          from pathlib import Path

          root = Path(".")
          status_files = [
              root / "README.md",
              root / "books/book-01/control/00-overview.md",
              root / "books/book-01/control/02-current-project-state.md",
              root / "books/book-01/control/16-chapter-by-chapter-status-record.md",
              root / "books/book-01/control/18-act-iii-entry-state.md",
              root / "books/book-01/control/20-control-pack-maintenance-rules.md",
              root / "books/book-01/control/23-word-budget-and-act-iii-architecture.md",
              root / "books/book-01/control/README.md",
              root / "books/book-01/drafts/README.md",
              root / "books/book-01/manuscript/STATUS.md",
          ]

          def require(condition, message):
              if not condition:
                  raise SystemExit(message)

          for path in status_files:
              require(path.is_file(), f"missing synchronized status file: {path}")
              text = path.read_text(encoding="utf-8")
              for required in [
                  "Chapter 18",
                  "non-canon",
                  "93,498",
                  "09:12:52 EDT / 18:42:52 IST",
                  "4,600",
              ]:
                  require(required in text, f"{required} missing from {path}")
              require(
                  "formal Chapter 18 acceptance review" in text
                  or "Formal Chapter 18 acceptance review" in text,
                  f"next acceptance gate missing from {path}",
              )

          control_readme = (root / "books/book-01/control/README.md").read_text(encoding="utf-8")
          require("Canon Control Pack v4.0" in control_readme, "control-pack version not advanced to 4.0")
          require("[36. Chapter 18 Mission Lock](36-chapter-18-mission-lock.md)" in control_readme, "control index missing Chapter 18 lock")
          print("Chapter 18 draft status synchronized")
          PYSTATUS

      - name: Validate cleanup and scope
        shell: bash
        run: |
          python - <<'PYCLEAN'
          from pathlib import Path

          root = Path(".")
          forbidden_names = {
              "chapter-18-final.md",
              "chapter-18-final2.md",
              "chapter-18-latest.md",
              "chapter-18-new-final.md",
          }
          found = [p for p in root.rglob("*") if p.name in forbidden_names]
          if found:
              raise SystemExit(f"duplicate or temporary Chapter 18 files remain: {found}")

          temporary_suffixes = (".tmp", ".bak", ".orig", ".rej")
          temporary = [
              p for p in root.rglob("*")
              if p.is_file() and p.name.endswith(temporary_suffixes)
          ]
          if temporary:
              raise SystemExit(f"temporary implementation files remain: {temporary}")

          if list(root.joinpath("books/book-01").rglob("chapter-19.md")):
              raise SystemExit("Chapter 19 prose exists")
          if any(
              "chapter-19" in p.name and "mission-lock" in p.name
              for p in root.joinpath("books/book-01/control").glob("*")
          ):
              raise SystemExit("Chapter 19 mission lock exists")
          print("cleanup and Chapter 19 absence validated")
          PYCLEAN

      - name: Check changed-file whitespace
        if: github.event_name == 'pull_request'
        run: |
          git diff --check "origin/${{ github.base_ref }}...HEAD" -- \
            .github/workflows/book1-manuscript-validation.yml \
            PROJECT_STATE.yaml \
            README.md \
            books/book-01/control/00-overview.md \
            books/book-01/control/02-current-project-state.md \
            books/book-01/control/16-chapter-by-chapter-status-record.md \
            books/book-01/control/18-act-iii-entry-state.md \
            books/book-01/control/20-control-pack-maintenance-rules.md \
            books/book-01/control/23-word-budget-and-act-iii-architecture.md \
            books/book-01/control/README.md \
            books/book-01/drafts/README.md \
            books/book-01/drafts/chapter-18.md \
            books/book-01/manuscript/STATUS.md
