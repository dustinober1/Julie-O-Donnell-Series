name: Book 1 manuscript validation

on:
  pull_request:
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Count accepted manuscript
        run: python tools/count_book1_words.py --expect 93498

      - name: Validate accepted baseline and protected prose
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess

          root = Path(".")
          chapters = root / "books/book-01/manuscript/chapters"

          def require(value, message):
              if not value:
                  raise SystemExit(message)

          protected = {
              "chapter-14.md": ("78f7fff02cd271fecbc94f7daf7151dbebbd5c6d", 5763),
              "chapter-15.md": ("b8e7e2ae573a6c25ea096121c75acee867f3fad2", 5993),
              "chapter-16.md": ("dd5249f4b510a9da9ad19ab2902a95ce1e62a1d8", 6024),
              "chapter-17.md": ("1c4022ebb8d27d8d448f98bcf74fbf09e6e560c1", 5888),
          }
          for name, (blob, words) in protected.items():
              path = chapters / name
              require(path.is_file(), f"missing protected chapter: {name}")
              actual_blob = subprocess.check_output(["git", "hash-object", str(path)], text=True).strip()
              require(actual_blob == blob, f"protected blob changed: {name} = {actual_blob}")
              actual_words = len(path.read_text(encoding="utf-8").split())
              require(actual_words == words, f"protected count changed: {name} = {actual_words}")

          manifest = (root / "books/book-01/ACCEPTED_MANUSCRIPT.yaml").read_text(encoding="utf-8")
          require("accepted_words: 93498" in manifest, "accepted total changed")
          require("accepted_endpoint:\n  chapter: 17" in manifest, "accepted endpoint chapter changed")
          require("chapter-17.md" in manifest, "Chapter 17 missing from accepted manifest")
          require("chapter-18.md" not in manifest, "Chapter 18 entered accepted manifest")
          require(not (chapters / "chapter-18.md").exists(), "Chapter 18 entered manuscript")
          print("accepted baseline validated")
          PY

      - name: Validate Chapter 18 inventory and exact 4600-word count
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          book = Path("books/book-01")
          draft = book / "drafts/chapter-18.md"

          def require(value, message):
              if not value:
                  raise SystemExit(message)

          require((book / "control/36-chapter-18-mission-lock.md").is_file(), "Chapter 18 mission lock missing")
          require(draft.is_file(), "Chapter 18 draft missing")
          require(sorted(book.rglob("chapter-18.md")) == [draft], "unexpected Chapter 18 path")
          require(not (book / "manuscript/chapters/chapter-18.md").exists(), "Chapter 18 manuscript file exists")
          require(not list(book.rglob("chapter-19.md")), "Chapter 19 prose exists")
          require(not [
              p for p in (book / "control").glob("*chapter-19*")
              if "mission-lock" in p.name
          ], "Chapter 19 mission lock exists")

          words = len(draft.read_text(encoding="utf-8").split())
          print(f"Chapter 18 repository count: {words}")
          require(words == 4600, f"Chapter 18 count is {words}, expected 4600")
          require(4400 <= words <= 5200, f"Chapter 18 out of planned range: {words}")
          PY

      - name: Validate Chapter 18 locked opening endpoint and evidence
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          text = Path("books/book-01/drafts/chapter-18.md").read_text(encoding="utf-8")

          def require(value, message):
              if not value:
                  raise SystemExit(message)

          require(text.startswith("09:12:52 EDT / 18:42:52 IST\n\n# Chapter 18 - The Local Record\n"), "opening or title changed")
          require("Forward Post Arjun\nKashmir" in text[:300], "opening location changed")
          require("10:01:12 Eastern Daylight Time / 19:31:12 Indian Standard Time" in text[-2500:], "endpoint changed")
          require(text.count("# Chapter ") == 1, "unexpected chapter heading")
          require("Chapter 19" not in text, "Chapter 19 content appears")

          required = [
              "ARJ-K17-018", "ARJ-K17-001", "ARJ-K17-002", "ARJ-K17-003",
              "ARJ-K17-ACK-01", "K17-AC-44719", "K17-FS-1176",
              "ARJ-SL-20471", "ARJ-SL-20472", "ARJ-SL-20473",
              "Captain Rao", "Naib Subedar Vikram Sethi", "Lance Naik Suresh Pal",
              "SECURITY LINE ONE: PASS",
              "REGISTERED AUTHORITY: TARIQ, MAJOR / FORWARD LIAISON CELL",
              "LOCAL SOURCE-RECORD RECONSTRUCTION / MAINTENANCE COMMIT",
              "FINAL LOCAL AUTHENTICATION / COMMIT: NOT COMPLETE / NOT EXECUTED",
              "LOCAL SOURCE-RECORD WRITES: 0", "IRR-2041",
              "The local record had entered the route without leaving the mountain.",
          ]
          missing = [item for item in required if item not in text]
          require(not missing, f"required Chapter 18 elements missing: {missing}")
          print("locked opening, endpoint, and evidence markers validated")
          PY

      - name: Validate Chapter 18 hard stops and prohibited conclusions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          text = Path("books/book-01/drafts/chapter-18.md").read_text(encoding="utf-8")

          def require(value, message):
              if not value:
                  raise SystemExit(message)

          required = [
              "It did not cross the inner security boundary.",
              "It did not pursue tracks where a hostile presence, tamper hazard, explosive hazard, or Line-of-Control crossing could not be excluded.",
              "We could not exclude an explosive or tamper hazard on the lower seam.",
              "it did not open the relay, create a live network path, or change the preceding record.",
              "No replacement medium was connected.",
              "its local incident-write path stayed offline pending authorized restoration.",
              "LIVE WRITE STATE: NOT AUTHORIZED",
              "I am removing him from questioning.",
          ]
          missing = [item for item in required if item not in text]
          require(not missing, f"hard-stop or medical markers missing: {missing}")

          prohibited = [
              "Tariq was physically present", "Tariq personally operated",
              "Sterling personally held", "Vance personally typed", "WSS-4 plaintext",
              "the Hartwell presenter was", "universal Northbridge",
              "Julie called Sharma", "Sharma called Julie",
              "The WSS record had shown",
          ]
          present = [item for item in prohibited if item in text]
          require(not present, f"prohibited conclusion or POV leak present: {present}")

          for artifact in ["TODO", "DRAFTING NOTE", "ALTERNATE VERSION", "PLACEHOLDER"]:
              require(artifact not in text, f"drafting artifact remains: {artifact}")
          print("hard stops, medical stop, POV firewall, and proof ceiling validated")
          PY

      - name: Validate synchronized non-canon status
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path(".")
          project = (root / "PROJECT_STATE.yaml").read_text(encoding="utf-8")

          def require(value, message):
              if not value:
                  raise SystemExit(message)

          for item in [
              "books/book-01/drafts/chapter-18.md",
              'status: "first draft exists; unaccepted; non-canon"',
              "draft_exists: true",
              "draft_words: 4600",
              "accepted_manifest_changed: false",
              "accepted_words_changed: false",
              "Conduct the formal Chapter 18 acceptance review",
          ]:
              require(item in project, f"PROJECT_STATE missing: {item}")

          status_files = [
              "README.md",
              "books/book-01/control/00-overview.md",
              "books/book-01/control/02-current-project-state.md",
              "books/book-01/control/16-chapter-by-chapter-status-record.md",
              "books/book-01/control/18-act-iii-entry-state.md",
              "books/book-01/control/20-control-pack-maintenance-rules.md",
              "books/book-01/control/23-word-budget-and-act-iii-architecture.md",
              "books/book-01/control/README.md",
              "books/book-01/drafts/README.md",
              "books/book-01/manuscript/STATUS.md",
          ]
          for rel in status_files:
              text = (root / rel).read_text(encoding="utf-8")
              for item in ["Chapter 18", "non-canon", "93,498", "09:12:52 EDT / 18:42:52 IST", "4,600"]:
                  require(item in text, f"{rel} missing {item}")
              require(
                  "formal Chapter 18 acceptance review" in text
                  or "Formal Chapter 18 acceptance review" in text,
                  f"{rel} missing next review gate",
              )

          index = (root / "books/book-01/control/README.md").read_text(encoding="utf-8")
          require("Canon Control Pack v4.0" in index, "control-pack version not 4.0")
          require("[36. Chapter 18 Mission Lock](36-chapter-18-mission-lock.md)" in index, "Chapter 18 lock missing from index")
          print("non-canon production state synchronized")
          PY

      - name: Validate cleanup and whitespace
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path(".")
          temporary = [
              p for p in root.rglob("*")
              if p.is_file() and p.name.endswith((".tmp", ".bak", ".orig", ".rej"))
          ]
          if temporary:
              raise SystemExit(f"temporary files remain: {temporary}")
          for name in [
              "chapter-18-final.md", "chapter-18-final2.md",
              "chapter-18-latest.md", "chapter-18-new-final.md",
          ]:
              if list(root.rglob(name)):
                  raise SystemExit(f"duplicate draft file remains: {name}")
          print("cleanup validated")
          PY
          git diff --check "origin/${{ github.base_ref }}...HEAD"
