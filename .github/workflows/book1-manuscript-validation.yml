name: Book 1 manuscript validation

on:
  pull_request:
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Count accepted manuscript
        shell: bash
        run: |
          expected=$(python - <<'PYCOUNT'
          from pathlib import Path
          import re
          manifest = Path('books/book-01/ACCEPTED_MANUSCRIPT.yaml').read_text(encoding='utf-8')
          match = re.search(r'^accepted_words:\s*(\d+)$', manifest, re.M)
          if not match:
              raise SystemExit('accepted_words not found in manifest')
          print(match.group(1))
          PYCOUNT
          )
          python tools/count_book1_words.py --expect "$expected"

      - name: Validate accepted baseline and protected prose
        shell: bash
        run: |
          python - <<'PYBASELINE'
          from pathlib import Path
          import hashlib
          import re

          root = Path('.')
          manifest = (root / 'books/book-01/ACCEPTED_MANUSCRIPT.yaml').read_text(encoding='utf-8')
          project = (root / 'PROJECT_STATE.yaml').read_text(encoding='utf-8')

          def require(condition, message):
              if not condition:
                  raise SystemExit(message)

          def blob(path):
              data = path.read_bytes()
              return hashlib.sha1(f"blob {len(data)}\0".encode('ascii') + data).hexdigest()

          accepted_match = re.search(r'^accepted_words:\s*(\d+)$', manifest, re.M)
          project_match = re.search(r'^\s+accepted_words:\s*(\d+)$', project, re.M)
          require(accepted_match is not None, 'manifest accepted_words missing')
          require(project_match is not None, 'PROJECT_STATE accepted_words missing')
          accepted = int(accepted_match.group(1))
          project_total = int(project_match.group(1))
          require(accepted == 87610, f'unexpected accepted total: {accepted}')
          require(project_total == accepted, f'project total {project_total} != manifest {accepted}')
          require('sequence: 16' in manifest and 'sequence: 17' not in manifest, 'accepted manifest must end at Chapter 16')
          require('chapter: 16' in manifest, 'accepted endpoint chapter is not 16')
          require('08:15:52 EDT' in manifest and '17:45:52 IST' in manifest, 'accepted endpoint time changed')
          require('Secure MPD evidence intake under Hackett' in manifest, 'accepted endpoint location changed')

          protected = [
              ('chapter-14.md', '78f7fff02cd271fecbc94f7daf7151dbebbd5c6d', 5763),
              ('chapter-15.md', 'b8e7e2ae573a6c25ea096121c75acee867f3fad2', 5993),
              ('chapter-16.md', 'dd5249f4b510a9da9ad19ab2902a95ce1e62a1d8', 6024),
          ]
          chapter_root = root / 'books/book-01/manuscript/chapters'
          for name, expected_blob, expected_words in protected:
              path = chapter_root / name
              require(path.is_file(), f'missing protected prose: {name}')
              require(blob(path) == expected_blob, f'protected blob changed: {name}')
              words = len(path.read_text(encoding='utf-8').split())
              require(words == expected_words, f'protected word count changed: {name} = {words}')

          chapter16 = chapter_root / 'chapter-16.md'
          chapter16_files = list((root / 'books/book-01').rglob('chapter-16.md'))
          require(chapter16_files == [chapter16], f'duplicate Chapter 16 paths: {chapter16_files}')
          require(not (root / 'books/book-01/drafts/chapter-16.md').exists(), 'Chapter 16 draft remains')

          print('accepted baseline and protected prose validated')
          PYBASELINE

      - name: Validate Chapter 17 mission lock and prose absence
        shell: bash
        run: |
          python - <<'PYLOCK'
          from pathlib import Path

          root = Path('.')
          mission17 = root / 'books/book-01/control/34-chapter-17-mission-lock.md'
          project = (root / 'PROJECT_STATE.yaml').read_text(encoding='utf-8')

          def require(condition, message):
              if not condition:
                  raise SystemExit(message)

          require(mission17.is_file(), 'Chapter 17 mission lock missing')
          lock = mission17.read_text(encoding='utf-8')

          required_lock_phrases = [
              '# Chapter 17 Mission Lock — The First Examination',
              '**Status:** Approved production planning only.',
              '08:15:52 EDT / 17:45:52 IST',
              '09:12:52 EDT / 18:42:52 IST',
              'Special Agent Leila Grant',
              'Defense Criminal Investigative Service',
              '`MPD-901446` — administrator-token board `EAT-0881147`',
              '**5,600–6,300 words**',
              'MPD retains physical custody of all seven packages',
              'The other six packages remain closed and unchanged.',
              'No-prose certification',
              'Draft exactly one complete first version of Chapter 17',
          ]
          for phrase in required_lock_phrases:
              require(phrase in lock, f'mission lock missing required phrase: {phrase}')

          candidate_phrases = [
              'Candidate A — Independent technical intake',
              'Candidate B — Washington/field reconnection',
              'Candidate C — Institutional pressure and record attack',
              "ACCEPT as Chapter 17's single dominant function",
              'REJECT as dominant. ACCEPT only as supporting pressure',
          ]
          for phrase in candidate_phrases:
              require(phrase in lock, f'candidate analysis missing: {phrase}')

          for section in [
              'Accepted canon',
              'Approved Chapter 17 planning',
              'Unresolved evidence',
              'Strong inference only',
              'Prohibited invention',
              'Later Book 1 obligations',
          ]:
              require(section in lock, f'mission-lock classification missing: {section}')

          chapter17_paths = list((root / 'books/book-01').rglob('chapter-17.md'))
          require(not chapter17_paths, f'Chapter 17 prose exists: {chapter17_paths}')
          require('active_chapter_drafts: []' in project, 'active draft list changed')
          require('chapter_17_mission_lock: "books/book-01/control/34-chapter-17-mission-lock.md"' in project, 'PROJECT_STATE mission-lock path missing')
          require('status: "mission locked; planning only; not drafted; non-canon"' in project, 'PROJECT_STATE Chapter 17 status wrong')
          require('Draft exactly one complete first version of Chapter 17' in project, 'next drafting gate missing')
          require('accepted_words_changed: false' in project, 'accepted-word effect not locked false')
          require('accepted_manifest_changed: false' in project, 'manifest effect not locked false')

          print('Chapter 17 mission lock and prose absence validated')
          PYLOCK

      - name: Validate Chapter 17 status references
        shell: bash
        run: |
          python - <<'PYSTATUS'
          from pathlib import Path

          root = Path('.')
          status_files = [
              root / 'README.md',
              root / 'books/book-01/control/00-overview.md',
              root / 'books/book-01/control/02-current-project-state.md',
              root / 'books/book-01/control/16-chapter-by-chapter-status-record.md',
              root / 'books/book-01/control/18-act-iii-entry-state.md',
              root / 'books/book-01/control/20-control-pack-maintenance-rules.md',
              root / 'books/book-01/control/23-word-budget-and-act-iii-architecture.md',
              root / 'books/book-01/control/24-thread-disposition-matrix.md',
              root / 'books/book-01/control/README.md',
              root / 'books/book-01/drafts/README.md',
              root / 'books/book-01/manuscript/STATUS.md',
          ]
          for path in status_files:
              if not path.is_file():
                  raise SystemExit(f'missing synchronized status file: {path}')
              text = path.read_text(encoding='utf-8')
              if 'Chapter 17' not in text:
                  raise SystemExit(f'Chapter 17 missing from {path}')
              if 'mission lock' not in text.lower() and 'mission locked' not in text.lower():
                  raise SystemExit(f'mission-lock state missing from {path}')
          print('Chapter 17 status references validated')
          PYSTATUS

      - name: Validate accepted count and endpoint summaries
        shell: bash
        run: |
          python - <<'PYSUMMARY'
          from pathlib import Path

          root = Path('.')
          core_status_files = [
              root / 'README.md',
              root / 'books/book-01/control/00-overview.md',
              root / 'books/book-01/control/02-current-project-state.md',
              root / 'books/book-01/control/16-chapter-by-chapter-status-record.md',
              root / 'books/book-01/control/18-act-iii-entry-state.md',
              root / 'books/book-01/control/20-control-pack-maintenance-rules.md',
              root / 'books/book-01/control/23-word-budget-and-act-iii-architecture.md',
              root / 'books/book-01/control/README.md',
              root / 'books/book-01/drafts/README.md',
              root / 'books/book-01/manuscript/STATUS.md',
          ]
          for path in core_status_files:
              text = path.read_text(encoding='utf-8')
              if '87,610' not in text:
                  raise SystemExit(f'accepted total missing from {path}')
              if '08:15:52 EDT / 17:45:52 IST' not in text:
                  raise SystemExit(f'accepted endpoint missing from {path}')
          print('accepted count and endpoint summaries validated')
          PYSUMMARY

      - name: Validate control index and temporary-file cleanup
        shell: bash
        run: |
          python - <<'PYCLEAN'
          from pathlib import Path

          root = Path('.')
          control_readme = (root / 'books/book-01/control/README.md').read_text(encoding='utf-8')
          if 'Canon Control Pack v3.6' not in control_readme:
              raise SystemExit('control-pack version not advanced')
          if '[34. Chapter 17 Mission Lock](34-chapter-17-mission-lock.md)' not in control_readme:
              raise SystemExit('control-pack index missing Chapter 17 lock')

          temporary_paths = [
              root / 'tools/promote_chapter16_acceptance.py',
              root / '.github/workflows/promote-chapter16-acceptance.yml',
              root / '.github/workflows/apply-chapter16-pov-firewall-repair.yml',
              root / '.github/workflows/apply-chapter16-pov-firewall-repair-pr.yml',
              root / '.github/workflows/apply-chapter16-explicit-repair.yml',
          ]
          for path in temporary_paths:
              if path.exists():
                  raise SystemExit(f'temporary file remains: {path}')
          print('control index and temporary-file cleanup validated')
          PYCLEAN

      - name: Check whitespace errors in pull-request diff
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"
