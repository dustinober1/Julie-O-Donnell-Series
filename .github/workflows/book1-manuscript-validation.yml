name: Book 1 Manuscript Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Count accepted Book 1 words (expect 116,807)
        run: python3 tools/count_book1_words.py --expect 116807
      - name: Validate accepted Book 1 through Chapter 22
        run: python3 tools/validate_book1_chapter22.py
      - name: Diff hygiene against authorized Chapter 22 baseline
        run: git diff --check 3ed760050f7e74ad152d0f46ede7db16164030b0 --
