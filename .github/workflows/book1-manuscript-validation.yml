name: Book 1 Manuscript Validation

on:
  pull_request:
    paths:
      - "PROJECT_STATE.yaml"
      - "README.md"
      - "books/book-01/**"
      - "series/**"
      - "tools/**"
      - ".github/workflows/book1-manuscript-validation.yml"
  push:
    branches: [main]
    paths:
      - "PROJECT_STATE.yaml"
      - "README.md"
      - "books/book-01/**"
      - "series/**"
      - "tools/**"
      - ".github/workflows/book1-manuscript-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - name: Count accepted manuscript
        run: python tools/count_book1_words.py --expect 107676

      - name: Validate accepted Chapter 20 state
        run: python tools/validate_book1_chapter20.py

      - name: Diff hygiene
        run: git diff --check
