name: Book 1 Manuscript Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Count accepted Book 1 words (expect 116,807)
        run: python3 tools/count_book1_words.py --expect 116807
      - name: Validate accepted Book 1 through Chapter 22
        run: python3 tools/validate_book1_chapter22.py
      - name: Validate Chapter 23 mission lock
        run: python3 tools/validate_book1_chapter23_mission_lock.py
      - name: Validate non-canon Chapter 23 draft
        run: python3 tools/validate_book1_chapter23_draft.py
      - name: Diff hygiene against authorized Chapter 23 drafting baseline
        run: git diff --check c4dca2aa7781709b6ba78f41abe5a35f14b13280 --
