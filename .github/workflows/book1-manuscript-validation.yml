name: Book 1 manuscript validation

on:
  pull_request:
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "PROJECT_STATE.yaml"
      - "books/book-01/**"
      - "series/recurring-character-ledger.md"
      - "tools/count_book1_words.py"
      - ".github/workflows/book1-manuscript-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Count accepted manuscript
        run: python tools/count_book1_words.py --expect 93498

      - name: Validate Chapter 18 mission-lock state
        shell: bash
        run: |
          test -f books/book-01/control/36-chapter-18-mission-lock.md
          test ! -f books/book-01/drafts/chapter-18.md
          test ! -f books/book-01/manuscript/chapters/chapter-18.md
          test ! -f books/book-01/control/37-chapter-19-mission-lock.md
          ! find books/book-01 -name 'chapter-19.md' -print -quit | grep -q .
          grep -Fq '# 36. CHAPTER 18 MISSION LOCK — THE LOCAL RECORD' books/book-01/control/36-chapter-18-mission-lock.md
          grep -Fq '**Status:** Mission locked; undrafted; non-canon planning' books/book-01/control/36-chapter-18-mission-lock.md
          grep -Fq '09:12:52 EDT / 18:42:52 IST' books/book-01/control/36-chapter-18-mission-lock.md
          grep -Fq '10:01:12 EDT / 19:31:12 IST' books/book-01/control/36-chapter-18-mission-lock.md
          grep -Fq 'ARJ-K17-018' books/book-01/control/36-chapter-18-mission-lock.md
          grep -Fq 'ARJ-K17-ACK-01' books/book-01/control/36-chapter-18-mission-lock.md
          grep -Fq '## 38. No-prose certification' books/book-01/control/36-chapter-18-mission-lock.md
          grep -Fq 'chapter_18_mission_lock: "books/book-01/control/36-chapter-18-mission-lock.md"' PROJECT_STATE.yaml
          grep -Fq 'accepted_words: 93498' PROJECT_STATE.yaml
          grep -Fq '[36. Chapter 18 Mission Lock](36-chapter-18-mission-lock.md)' books/book-01/control/README.md

      - name: Check whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"
