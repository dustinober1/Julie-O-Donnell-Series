name: Append final Chapter 14 locks

on:
  push:
    branches:
      - "agent/chapter-14-acceptance-pass"

permissions:
  contents: write

jobs:
  append:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Append accepted canon and technology locks
        shell: bash
        run: |
          cat >> books/book-01/control/04-source-of-truth-canon-locks.md <<'EOF'

          ---

          ## Accepted Chapter 14 canon locks

          - Chapter 14 — **The Witness Line** — is accepted unchanged at 5,763 words.
          - The accepted endpoint is 07:49:32 EDT / 17:19:32 IST on public garage level six beside powered-down PCF-27 under Metropolitan Police scene control.
          - The dark-overcoat entrant is visibly outside before Hartwell’s exterior state changes from white challenge-ready to steady green.
          - The exterior green state proves only a local accepted/complete condition; it does not prove the challenged serial, certificate, presenter, receiver, case contents, human intent, or Phase B result.
          - Hartwell acknowledges that a relevant local-challenge/access record exists and is held, but discloses no protected fields.
          - The physical presenter of `SSO-NS-004`, exact Hartwell serial, compact black case contents, WSS-4 plaintext, K-17 access, Phase B action, Masking Window Two purpose, and reconstruction-profile purpose remain unresolved.
          - Marcus and Elias retain physically separated primary originals. MPD scene control, object inventory, and serial collection do not constitute a completed evidence transfer.
          - Chapter 15 and later prose do not exist. The next gate is Chapter 15 mission planning and mission locking only.
          EOF

          cat >> books/book-01/control/10-technology-and-system-rules.md <<'EOF'

          ---

          ## Accepted Chapter 14 technology locks

          - Elias’s dual-partition incident module remains offline throughout Chapter 14 and has no route into Hartwell.
          - Manual events 010–013 prove only local operator input, module time, local hardware state, and the statement entered. They do not prove the described external event.
          - No remote Hartwell access, wireless penetration, certificate sniffing, emission analysis, omnipotent Apex backdoor, WSS-4 decryption, sealed-partition alteration, or new digital derivative occurs.
          - Hartwell’s own held local-challenge/access record—not Elias’s module—is the potential future source for the exact challenged serial, certificate, presenter, receiver, challenge content, and local access context.
          - The white-to-steady-green exterior change is a bounded physical indicator of accepted/complete local state only. It cannot identify a device serial or human hand.
          - The Module, Hartwell, MPD body camera, MPD dispatch, commercial-garage records, WSS-4 local audit, and Apex/Chen records remain technically and institutionally distinct sources requiring later authentication and clock reconciliation.
          EOF

          rm .github/workflows/ch14-append-final-locks.yml

      - name: Commit final lock updates
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Append accepted Chapter 14 canon and technology locks"
          git push origin HEAD:"${GITHUB_REF_NAME}"
