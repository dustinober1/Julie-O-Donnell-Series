name: Book 1 One-Sentence Context

on:
  push:
    branches: [agent/book1-one-sentence-repair]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/book1-one-sentence-repair
          fetch-depth: 0
      - name: Export full candidate context
        run: python3 tools/export_book1_one_sentence_context.py
      - name: Compile exporter
        run: python3 -m py_compile tools/export_book1_one_sentence_context.py
      - name: Confirm accepted manuscript baseline
        run: |
          python3 tools/count_book1_words.py --expect 105081
          python3 tools/validate_book1_publication_readiness.py
          python3 tools/verify_book1_revision.py
      - name: Diff hygiene
        run: git diff --check
      - name: Upload full context
        uses: actions/upload-artifact@v4
        with:
          name: book1-one-sentence-context
          path: artifacts/book1-one-sentence-context.json
          if-no-files-found: error
