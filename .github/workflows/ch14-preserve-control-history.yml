name: Preserve Chapter 14 control history

on:
  push:
    branches:
      - "agent/chapter-14-acceptance-pass"

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore existing ledgers and append Chapter 14 deltas
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess

          base = "5b8c3c9902acc48d41e95276740499cdd17fd326"
          deltas = {
