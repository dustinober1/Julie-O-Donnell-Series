name: Run Chapter 20 Acceptance Application

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Clone review branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf ./* ./.git
          git clone -q --branch agent/chapter-20-acceptance-review --single-branch "https://x-access-token:${GH_TOKEN}@github.com/dustinober1/Julie-O-Donnell-Series.git" .

      - name: Apply reviewed Chapter 20 state
        shell: bash
        run: |
          set +e
          python - <<'PY' > chapter20-application.log 2>&1
          from pathlib import Path
          import base64
          import gzip
          import re

          workflow = Path('.github/workflows/chapter20-acceptance-apply.yml').read_text(encoding='utf-8')
          match = re.search(r'payload = "([A-Za-z0-9+/=]+)"', workflow)
          if not match:
              raise SystemExit('embedded Chapter 20 acceptance payload not found')
          source = gzip.decompress(base64.b64decode(match.group(1)))
          exec(compile(source, 'chapter20_acceptance_apply.py', 'exec'))
          PY
          status=$?
          tail -n 100 chapter20-application.log
          rm -f chapter20-application.log
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          rm -f .github/workflows/chapter20-acceptance-pr.yml

      - name: Commit synchronized acceptance state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Accept and synchronize Chapter 20 [chapter20-acceptance-applied]"
          git push -q origin HEAD:agent/chapter-20-acceptance-review
