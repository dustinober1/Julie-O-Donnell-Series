name: Run Chapter 20 Acceptance Application

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Clone review branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf ./* ./.git
          git clone -q --branch agent/chapter-20-acceptance-review --single-branch "https://x-access-token:${GH_TOKEN}@github.com/dustinober1/Julie-O-Donnell-Series.git" .
          git fetch -q origin main:refs/remotes/origin/main

      - name: Apply reviewed Chapter 20 state
        shell: bash
        run: |
          set +e
          python - <<'PY' > chapter20-application.log 2>&1
          from pathlib import Path

          parts = sorted(Path('.chapter20-acceptance-py').glob('*.part'))
          if [p.name for p in parts] != [f'{i:02d}.part' for i in range(9)]:
              raise SystemExit(f'Chapter 20 acceptance script parts incomplete: {[p.name for p in parts]}')
          source = ''.join(p.read_text(encoding='utf-8') for p in parts)
          compile(source, 'chapter20_acceptance_apply.py', 'exec')
          exec(compile(source, 'chapter20_acceptance_apply.py', 'exec'))
          PY
          status=$?
          tail -n 20 chapter20-application.log
          rm -f chapter20-application.log
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          rm -rf .chapter20-acceptance-py .chapter20-acceptance
          rm -f .github/workflows/chapter20-acceptance-pr.yml

      - name: Commit synchronized acceptance state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Accept and synchronize Chapter 20 [chapter20-acceptance-applied]"
          set +e
          git push origin HEAD:agent/chapter-20-acceptance-review > chapter20-push.log 2>&1
          status=$?
          cat chapter20-push.log
          rm -f chapter20-push.log
          exit "$status"
