name: Run Chapter 19 acceptance promotion

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  promote:
    if: github.head_ref == 'agent/chapter-19-acceptance'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/chapter-19-acceptance

      - name: Install YAML support
        run: python -m pip install --quiet pyyaml

      - name: Execute reviewed promotion script
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import yaml

          workflow = yaml.safe_load(Path('.github/workflows/chapter19-acceptance-promotion.yml').read_text(encoding='utf-8'))
          steps = workflow['jobs']['promote']['steps']
          selected = {
              step['name']: step['run']
              for step in steps
              if step.get('name') in {
                  'Review, repair, promote, and synchronize Chapter 19',
                  'Commit synchronized promotion',
              }
          }
          log = []
          for name in (
              'Review, repair, promote, and synchronize Chapter 19',
              'Commit synchronized promotion',
          ):
              script = selected.get(name)
              if not script:
                  raise SystemExit(f'missing promotion step: {name}')
              if name == 'Review, repair, promote, and synchronize Chapter 19':
                  extra = """revisions = [
              (
                  'No movement after the Chapter 17 reseal.',
                  'No movement after the witnessed board reseal.',
                  'replace the remaining production shorthand with the witnessed custody event',
              ),"""
                  script = script.replace('revisions = [', extra, 1)
                  script = script.replace('Five line-level repairs were made', 'Six line-level repairs were made')
                  script = script.replace('Replaced three production-facing', 'Replaced four production-facing')
              result = subprocess.run(
                  ['bash', '-euo', 'pipefail', '-c', script],
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.STDOUT,
              )
              log.append(f'## {name}\nexit={result.returncode}\n{result.stdout}')
              if result.returncode:
                  Path('.github/ch19-promotion-debug.log').write_text('\n\n'.join(log), encoding='utf-8')
                  subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'], check=True)
                  subprocess.run(['git', 'config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com'], check=True)
                  subprocess.run(['git', 'add', '.github/ch19-promotion-debug.log'], check=True)
                  subprocess.run(['git', 'commit', '-m', 'Record Chapter 19 promotion failure'], check=True)
                  subprocess.run(['git', 'push', 'origin', 'HEAD:agent/chapter-19-acceptance'], check=True)
                  raise SystemExit(result.returncode)
          PY
