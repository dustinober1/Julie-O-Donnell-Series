name: Apply Chapter 15 acceptance copyedit

on:
  push:
    branches:
      - agent/chapter-15-acceptance-copyedit
    paths:
      - ".github/workflows/apply-chapter-15-acceptance-copyedit.yml"
      - "tools/apply_chapter15_acceptance_copyedit.py"
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.ref_name == 'agent/chapter-15-acceptance-copyedit' || github.head_ref == 'agent/chapter-15-acceptance-copyedit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/chapter-15-acceptance-copyedit

      - name: Run correction with captured diagnostic
        id: correction
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python tools/apply_chapter15_acceptance_copyedit.py > correction.log 2>&1
          status=$?
          cat correction.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit $status

      - name: Record working-tree state
        if: always()
        shell: bash
        run: |
          git status --short > correction-status.txt
          git diff --check > correction-diff-check.txt 2>&1 || true
          git diff > correction.patch
          printf 'script_status=%s\n' '${{ steps.correction.outputs.status }}' > correction-summary.txt
          cat correction-status.txt
          cat correction-summary.txt

      - name: Upload correction diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chapter-15-copyedit-diagnostic
          path: |
            correction.log
            correction-status.txt
            correction-diff-check.txt
            correction.patch
            correction-summary.txt
          if-no-files-found: error

      - name: Fail when correction failed
        if: steps.correction.outputs.status != '0'
        shell: bash
        run: exit 1
