name: Apply Chapter 15 acceptance copyedit

on:
  push:
    branches:
      - agent/chapter-15-acceptance-copyedit
    paths:
      - ".github/workflows/apply-chapter-15-acceptance-copyedit.yml"
      - "tools/apply_chapter15_acceptance_copyedit.py"
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.ref_name == 'agent/chapter-15-acceptance-copyedit' || github.head_ref == 'agent/chapter-15-acceptance-copyedit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/chapter-15-acceptance-copyedit

      - name: Apply bounded correction
        shell: bash
        run: |
          python tools/apply_chapter15_acceptance_copyedit.py
          rm tools/apply_chapter15_acceptance_copyedit.py
          rm .github/workflows/apply-chapter-15-acceptance-copyedit.yml

      - name: Validate corrected acceptance state
        shell: bash
        run: |
          python tools/count_book1_words.py --expect 81586
          python - <<'PY'
          from pathlib import Path
          import hashlib

          chapter14 = Path('books/book-01/manuscript/chapters/chapter-14.md')
          chapter15 = Path('books/book-01/manuscript/chapters/chapter-15.md')
          assert not Path('books/book-01/drafts/chapter-14.md').exists()
          assert not Path('books/book-01/drafts/chapter-15.md').exists()
          assert not list(Path('books/book-01').rglob('chapter-16.md'))
          assert not Path('tools/apply_chapter15_acceptance_copyedit.py').exists()
          assert not Path('.github/workflows/apply-chapter-15-acceptance-copyedit.yml').exists()

          text14 = chapter14.read_text(encoding='utf-8')
          text15 = chapter15.read_text(encoding='utf-8')
          data14 = text14.encode('utf-8')
          data15 = text15.encode('utf-8')
          blob14 = hashlib.sha1(f"blob {len(data14)}\0".encode('ascii') + data14).hexdigest()
          blob15 = hashlib.sha1(f"blob {len(data15)}\0".encode('ascii') + data15).hexdigest()
          assert blob14 == '78f7fff02cd271fecbc94f7daf7151dbebbd5c6d', blob14
          assert len(text15.split()) == 5993
          assert text15.splitlines()[0] == '07:49:32 EDT / 17:19:32 IST'
          assert 'At 07:56:40 EDT / 17:26:40 IST' in text15
          assert 'No camera guaranteed truth. Batteries failed. Angles missed hands. Files could later be challenged.' in text15
          assert 'Batteries failed. angles missed hands. files could later be challenged.' not in text15
          assert 'one hundred thirty-six sealed files' in text15.lower()
          assert 'forty-seven incomplete files' in text15.lower()
          assert 'three hundred eleven excluded' in text15.lower()
          assert 'partition a' in text15.lower() and 'partition b' in text15.lower()
          assert 'Chapter 16' not in text15

          review = Path('books/book-01/control/31-chapter-15-acceptance-review.md').read_text(encoding='utf-8')
          assert blob15 in review
          assert 'one capitalization-only copyedit' in review
          print('chapter15_blob=' + blob15)
          PY
          git diff --check

      - name: Commit corrected acceptance state
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Correct Chapter 15 acceptance copyedit"
          git push origin HEAD:agent/chapter-15-acceptance-copyedit
