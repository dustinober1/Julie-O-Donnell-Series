name: Chapter 18 diagnostic

on:
  pull_request:
    paths:
      - ".github/workflows/chapter18-diagnostic.yml"
      - "books/book-01/drafts/chapter-18.md"

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare exact draft artifact
        shell: bash
        run: |
          mkdir -p chapter18-diagnostic
          cp books/book-01/drafts/chapter-18.md chapter18-diagnostic/chapter-18.md
          python - <<'PY'
          from pathlib import Path
          text = Path('books/book-01/drafts/chapter-18.md').read_text(encoding='utf-8')
          Path('chapter18-diagnostic/word-count.txt').write_text(f'{len(text.split())}\n', encoding='utf-8')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: chapter18-diagnostic
          path: chapter18-diagnostic
          if-no-files-found: error
          retention-days: 1
