name: Finalize Chapter 19 control synchronization

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/chapter-19-acceptance'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/chapter-19-acceptance
          fetch-depth: 0
      - name: Relabel superseded Chapter 18 status and remove diagnostics
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('books/book-01/control/04-source-of-truth-canon-locks.md')
          text = path.read_text(encoding='utf-8')
          replacements = [
              (
                  '## Accepted Chapter 18 canon lock — 2026-07-14',
                  '## Historical Chapter 18 canon lock — superseded by Chapter 19 acceptance',
              ),
              (
                  '- Accepted total: **97,976 words**.\n- Accepted endpoint: **10:01:12 EDT / 19:31:12 IST** at Forward Post Arjun.',
                  '- This was the controlling endpoint before Chapter 19 acceptance.\n- Historical endpoint: **10:01:12 EDT / 19:31:12 IST** at Forward Post Arjun.',
              ),
              (
                  '- No Chapter 19 prose or mission lock exists. The next gate is a dedicated Chapter 19 mission lock only.',
                  '- This endpoint and production gate were superseded by the accepted Chapter 19 canon lock recorded at the top of this document.',
              ),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'missing expected canon-lock text: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          git rm .github/workflows/ch19-validation-debug.yml .github/ch19-validation-debug.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add books/book-01/control/04-source-of-truth-canon-locks.md
          git diff --cached --check
          git commit -m "Finalize Chapter 19 control synchronization"
          git push origin HEAD:agent/chapter-19-acceptance
