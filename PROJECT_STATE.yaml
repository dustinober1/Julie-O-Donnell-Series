  - "Draft existence does not create canon."
  - "Promotion requires the same commit to move prose into manuscript, update ACCEPTED_MANUSCRIPT.yaml, update PROJECT_STATE.yaml, and update every affected control ledger."
  - "Chapter 13 remains a draft until its acceptance review is completed and an explicit promotion commit is made."
  - "Chapter 14 may not treat Chapter 13 facts as canon before promotion."
  - "Registered authority never proves physical human custody without separate evidence."
  - "Do not identify the physical custodian of SSO-NS-004 without accepted evidence."
  - "High-level Act III architecture is production planning, not canon; chapter functions become controlling only through a chapter mission lock."
  - "Plans for unwritten chapters remain non-canon until dramatized and accepted."
  - "The former Google Doc and uploaded Word snapshot are historical sources only and must not be edited as active manuscripts."
  - "No draft or revision may imitate or closely emulate the recognizable prose of a living author."

next_recommended_action: "Complete the Chapter 13 acceptance pass in books/book-01/control/27-chapter-13-acceptance-review.md; do not draft Chapter 14 first."
