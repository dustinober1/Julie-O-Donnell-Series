protagonist:
  name: "Julie O'Donnell"
  public_role: "former U.S. Army Captain"
  prior_role: "Army intelligence officer"
  present_home_base: "Culpeper, Virginia"
  defining_wound: >-
    Six years earlier, at a forward operating base near the Pakistan border, Julie detected that an AI-enabled SIGINT/targeting confidence pattern was too perfect and likely engineered. Command pressure overrode her warning, trapping her inside a corrupted system failure that ended her Army career.
  current_mask: >-
    She lives on a farmhouse property, handles fence work and horses, and tries to stay away from government systems.
  core_strengths:
    - "pattern recognition"
    - "signals-intelligence skepticism"
    - "moral courage under command pressure"
    - "operational literacy"
    - "ability to see how people hide inside systems"
  core_flaws:
    - "institutional distrust"
    - "trauma from being right too late"
    - "tendency to isolate"
    - "anger when bureaucrats protect systems over people"

book_001:
  working_title: "Untitled Julie O'Donnell Book 1"
  status: "relaunch planning"
  target_word_count: "100,000-125,000 words"
  target_chapter_count: "45-60 chapters"
  target_average_chapter_length: "2,200-3,000 words, with shorter high-pressure chapters as needed"
  opening_anchor: "Prologue: Six Years Ago — Forward Operating Base near the Pakistan border"
  present_day_problem: >-
    Julie is pulled back toward a new Argus/Apex Defense system failure when an enterprise warning platform may wrongly classify a Pakistan-linked incident as state-sponsored, risking escalation toward India.
  current_draft_assumption: >-
    Use the prologue as the moral wound and Book 1 present-day crisis as the proof that the same family of institutional failure has scaled up.
  must_preserve:
    - "Julie is competent, not merely traumatized."
    - "The AI system is dangerous because incentives, data, contractors, and command culture interact badly."
    - "The threat must have human accountability, not magic AI villainy."
    - "Julie should be pressured back in, not casually volunteer."
    - "The opening must establish both personal damage and geopolitical stakes quickly."

technology_canon:
  contractor: "Apex Defense"
  system_family: "ARGUS / Argus"
  prologue_variant: "Argus Beta"
  present_enterprise_variant: "ARGUS-ENT-4.6"
  possible_module_or_nickname: "RoboWarning"
  naming_rule: >-
    Treat ARGUS as the platform family, Argus Beta as the older field-grade/FOB variant, ARGUS-ENT-4.6 as the present enterprise system, and RoboWarning as either a nickname or warning-classification module until a later canon pass decides otherwise.

