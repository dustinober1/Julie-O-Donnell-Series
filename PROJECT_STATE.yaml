production_rules:
- Accepted manuscript prose outranks all summaries, plans, trackers, drafts, and external snapshots.
- No unaccepted chapter may live under books/book-01/manuscript/.
- Draft existence does not create canon.
- Promotion requires the same production pass to move prose, update the manifest and project state, and update every affected control ledger.
- Chapter 18 is accepted canon at 4,478 words; its reviewed blob is protected.
- Registered authority never proves physical human custody without separate evidence.
- The physical-board mismatch does not identify the alternative identity path or human actor.
- The Hartwell original, WSS local audit, Indian originals, and MPD packages remain independently controlled in accepted canon.
- No draft or revision may imitate or closely emulate the recognizable prose of a living author.
- Chapters 13 through 19 are accepted Act III canon.
- Chapter 19 is accepted canon at 5,393 words; its reviewed blob is 1c7cc22fc7c480cb247efa1f6a2c0d0b1e1b1baf.
- Chapter 19 promotion does not open, move, connect, combine, or transfer any MPD package.
- Registered authority, physical possession, knowledge, and command remain separate proof categories.
- No Chapter 20 prose or mission lock exists.
- No complete chapter-by-chapter remainder-of-Act-III outline exists or is authorized.
next_recommended_action: Prepare the Chapter 20 mission-lock planning pass from the accepted Chapter 19 endpoint. Do not draft Chapter 20 until
