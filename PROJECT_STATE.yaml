production_rules:
  - Accepted manuscript prose outranks every summary, plan, tracker, draft, and external snapshot.
  - No unaccepted chapter may live under books/book-01/manuscript/.
  - Protected accepted Chapters 1-23 remain byte-identical unless a later explicit acceptance review authorizes change.
  - Request identity, construction mechanism, authority binding, release act, registered authority, physical act, custody, carrier assignment, authorization, knowledge, intent, and command remain separate proof categories.
  - A certified derivative never replaces an independently controlled original.
  - A no-use hold preserves state and custody; it does not authenticate prior operation.
  - Chapter 23 exists only at books/book-01/manuscript/chapters/chapter-23.md and is accepted under control/47.
  - No Chapter 24 artifact exists.
  - No complete chapter-by-chapter remainder-of-Act-III outline exists or is authorized.
  - No draft or revision may imitate or closely emulate the recognizable prose of a living author.

