production_rules:
  - Accepted manuscript prose outranks every summary, plan, tracker, draft, and external snapshot.
  - No unaccepted chapter may live under books/book-01/manuscript/.
  - Draft existence does not create canon.
  - Promotion requires an explicit formal acceptance verdict and synchronized prose, manifest, state, ledger, and validation changes.
  - Accepted words remain 103369 and the accepted endpoint remains Chapter 19 until promotion.
  - Protected Chapters 13-19 and the Chapter 20 mission lock must remain unchanged during the draft pass.
  - Registered authority, physical possession, carrier custody, authorization, knowledge, intent, and command remain separate proof categories.
  - A certified derivative never replaces its independently controlled original.
  - A no-use hold preserves state and custody; it does not authenticate prior operation.
  - The Chapter 20 draft exists only at books/book-01/drafts/chapter-20.md and remains non-canon.
  - No Chapter 21 prose or mission lock exists.
  - No complete chapter-by-chapter remainder-of-Act-III outline exists or is authorized.
  - No draft or revision may imitate or closely emulate the recognizable prose of a living author.

