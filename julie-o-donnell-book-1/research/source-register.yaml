sources:
- id: SRC-001
  type: government-directive
  title: DoD Directive 3000.09, Autonomy in Weapon Systems
  location: https://media.defense.gov/2023/Jan/25/2003149928/-1/-1/0/DOD-DIRECTIVE-3000.09-AUTONOMY-IN-WEAPON-SYSTEMS.PDF
  verified_on: '2026-07-17'
  supports:
  - autonomous-targeting-human-judgment
  notes: Official U.S. Department of Defense directive (originally Nov 2012; current update dated Jan 25, 2023). Requires autonomous and semi-autonomous weapon systems be designed so commanders and operators exercise appropriate levels of human judgment over the use of force, and mandates test, evaluation, validation, and verification before fielding. Supports the 'human validation as the final authorization gate before kinetic commitment' element.
  reliability: primary
  observed_on: '2023-01-25'
  supports_research_ids:
  - RES-001
- id: SRC-002
  type: defense-analysis
  title: Principles for the Combat Employment of Weapon Systems with Autonomous Functionalities
  location: https://www.cnas.org/publications/reports/proposed-dod-principles-for-the-combat-employment-of-weapon-systems-with-autonomous-functionalities
  verified_on: '2026-07-17'
  supports:
  - kill-chain-human-judgment
  notes: Center for a New American Security (CNAS) report by Robert Work (former Deputy Secretary of Defense). Articulates the detect-to-engage 'kill chain' and the principle that initiating or authorizing a sequence of actions that may result in lethal force is the sole province of human intent and judgment; characterizes human-in/on-the-loop control as discretionary rather than mandatory. Supports the validation choke point a human analyst holds.
  reliability: high
  observed_on: '2026-07-17'
  supports_research_ids:
  - RES-001
- id: SRC-003
  type: official-news
  title: Project Maven to Deploy Computer Algorithms to War Zone by Year's End
  location: https://www.defense.gov/News/News-Stories/Article/Article/1254719/project-maven-to-deploy-computer-algorithms-to-war-zone-by-years-end/
  verified_on: '2026-07-17'
  supports:
  - ai-confidence-cuing-human-analysts
  notes: Official U.S. Department of Defense news story on Project Maven (the Algorithmic Warfare Cross-Functional Team, stood up 2017), which applies computer-vision and AI to multi-source full-motion-video and imagery to flag candidate objects for human analyst review. Supports the pattern of automated, confidence-scored telemetry cueing human validation rather than replacing it.
  reliability: high
  observed_on: '2026-07-17'
  supports_research_ids:
  - RES-001
- id: SRC-004
  type: clinical-reference
  title: DSM-5 Criteria for PTSD (U.S. Department of Veterans Affairs, National Center for PTSD)
  location: https://www.ptsd.va.gov/professional/treat/essentials/dsm5_ptsd.asp
  verified_on: '2026-07-17'
  supports:
  - hypervigilance-diagnostic-criterion
  notes: VA National Center for PTSD professional reference enumerating DSM-5 PTSD criteria; lists hypervigilance and exaggerated startle under Criterion E (marked alterations in arousal and reactivity) as trauma-linked symptoms that emerge or worsen after the traumatic event. Supports hypervigilance as a clinically established post-trauma presentation.
  reliability: high
  observed_on: '2026-07-17'
  supports_research_ids:
  - RES-005
- id: SRC-005
  type: clinical-practice-guideline
  title: VA/DoD Clinical Practice Guideline for the Management of Posttraumatic Stress Disorder and Acute Stress Disorder
  location: https://www.healthquality.va.gov/guidelines/MH/ptsd/
  verified_on: '2026-07-17'
  supports:
  - veteran-hyperarousal-clinical-framing
  notes: Joint U.S. Department of Veterans Affairs and Department of Defense clinical practice guideline for PTSD and acute stress disorder. Describes arousal and reactivity symptom clusters (persistent vigilance, exaggerated startle, physiological stress registration, irritability) in service members and veterans. Supports the depiction of vigilance that is functional in analysis yet read as paranoia socially.
  reliability: primary
  observed_on: '2026-07-17'
  supports_research_ids:
  - RES-005
- id: SRC-006
  type: peer-reviewed-study
  title: Heightened Attentional Capture by Threat in Veterans with PTSD
  location: https://pmc.ncbi.nlm.nih.gov/articles/PMC4104529/
  verified_on: '2026-07-17'
  supports:
  - combat-veteran-threat-detection-bias
  notes: Peer-reviewed empirical study (Most, Chun, Widders and Zald, Journal of Abnormal Psychology, 2012;122(2):397-405; doi:10.1037/a0030440). Using an emotional attentional-blink task, shows veterans with PTSD display heightened automatic attentional capture by combat-related threat cues and prolonged difficulty disengaging, relative to trauma-exposed veterans without PTSD and nonveteran controls. Supports reflexive environmental threat assessment that is adaptive for analysis yet reads as paranoia socially.
  reliability: high
  observed_on: '2012-11-12'
  supports_research_ids:
  - RES-005
- id: SRC-007
  type: government-reference
  title: 'NIST CSRC Glossary: replay attack'
  location: https://csrc.nist.gov/glossary/term/replay_attack
  verified_on: '2025-08-15'
  supports:
  - replay-attack-definition
  notes: 'NIST glossary definition of replay attack: capture of transmitted authentication or access-control information and later retransmission to produce an unauthorized effect. Grounds the core mechanism of reusing previously captured messages or telemetry artifacts rather than inventing wholly new signals.'
  reliability: primary
  observed_on: '2025-08-15'
  supports_research_ids:
  - RES-002
- id: SRC-008
  type: government-publication
  title: A Survey of Physics-Based Attack Detection in Cyber-Physical Systems
  location: https://www.nist.gov/publications/survey-physics-based-attack-detection-cyber-physical-systems
  verified_on: '2025-08-15'
  supports:
  - false-sensor-reading-detection-cps
  notes: NIST publication page for the ACM Computing Surveys article by Giraldo et al. (2018). The abstract states that security monitors model time-series sensor readings to identify anomalies and detect false sensor readings or false control commands. Supports the idea that replayed or injected telemetry can look valid enough that defenders must detect it through anomaly signatures rather than obvious corruption.
  reliability: primary
  observed_on: '2018-03-30'
  supports_research_ids:
  - RES-002
- id: SRC-009
  type: peer-reviewed-study
  title: A Survey on Cyber-Physical Systems Security
  location: https://ittc.ku.edu/~bluo/pubs/humayed2017.pdf
  verified_on: '2025-08-15'
  supports:
  - replay-and-false-data-injection-cps
  notes: Humayed et al. survey (IEEE Access, 2017) catalogs replay attacks, false-data-injection attacks, and sensor spoofing across cyber-physical systems, including cases where attackers tamper with sensed data or replay previously captured signals/commands. Supports the plausibility of a synthetic telemetry injection being constructed from clean, previously valid-looking signal patterns.
  reliability: high
  observed_on: '2025-08-15'
  supports_research_ids:
  - RES-002
- id: SRC-010
  type: government-guidance
  title: UFC 4-010-05 SCIF/SAPF Planning, Design, and Construction
  location: https://www.wbdg.org/FFC/DOD/UFC/ufc_4_010_05_2023.pdf
  verified_on: '2025-08-15'
  supports:
  - scif-emergency-exit-monitoring-life-safety
  notes: Unified Facilities Criteria for SCIF/SAPF design. Publicly states that emergency exit doors must be alarmed 24/7 with local annunciation, recommends delayed egress where code-compliant, and requires monitoring of emergency exit doors 24 hours a day. Also sets ACS expectations for card reader plus keypad at primary entrances. Supports the real access-control and emergency-exit constraints behind Julie's detention and escape mechanic.
  reliability: primary
  observed_on: '2023-05-26'
  supports_research_ids:
  - RES-004
- id: SRC-011
  type: government-guidance
  title: UFC 4-021-02 Electronic Security Systems
  location: https://www.wbdg.org/FFC/DOD/UFC/ufc_4_021_02_2025.pdf
  verified_on: '2025-08-15'
  supports:
  - acs-logs-door-monitoring-free-egress
  notes: Unified Facilities Criteria for DoD electronic security systems. States that access control systems log and archive transactions and events, alert on unauthorized entry attempts, forced entries, and door-held-open events, and monitor door position for access-controlled and emergency-exit doors. It also states free egress must be maintained and that designers must balance security with life-safety and fire-alarm interface requirements. Supports the procedural reality that emergency conditions and access control are tightly coupled rather than cinematic magic.
  reliability: primary
  observed_on: '2025-07-28'
  supports_research_ids:
  - RES-004
- id: SRC-012
  type: government-report
  title: 'GAO-17-506, Whistleblower Protection: Opportunities Exist for DOD to Improve the Timeliness and Quality of Civilian and Contractor Reprisal Investigations'
  location: https://www.gao.gov/assets/gao-17-506.pdf
  verified_on: '2025-08-15'
  supports:
  - dod-reprisal-investigation-delays
  notes: GAO report finding major delays and quality concerns in DOD civilian and contractor reprisal investigations. The report states DODIG missed timeliness goals in more than 83 percent of closed investigations during fiscal years 2013-2015. Supports the institutional reality that protected disclosure can become a slow, punishing process rather than a clean corrective channel.
  reliability: primary
  observed_on: '2025-08-15'
  supports_research_ids:
  - RES-006
- id: SRC-013
  type: government-report
  title: 'Whistleblower Protection: Analysis of DOD''s Actions to Improve Case Timeliness and Safeguard Confidentiality'
  location: https://www.gao.gov/products/gao-19-198
  verified_on: '2025-08-15'
  supports:
  - dod-whistleblower-confidentiality-gaps
  notes: GAO review finding that DOD inspector general offices met some but not all timeliness goals, that about 85 percent of DODIG reprisal and senior-official-misconduct investigations exceeded timeliness goals, and that employees had access to sensitive whistleblower information without a need to know. Supports the pattern that institutional handling can itself expose and isolate the reporter.
  reliability: primary
  observed_on: '2025-08-15'
  supports_research_ids:
  - RES-006
- id: SRC-014
  type: government-investigative-summary
  title: Findings of Whistleblower Retaliation by Army and Contractor Jacobs Technologies Management Officials
  location: https://oig.hhs.gov/fraud/whistleblower/whistleblower-retaliation-investigation/findings-of-whistleblower-retaliation-army-jacob-tech/
  verified_on: '2025-08-15'
  supports:
  - contractor-whistleblower-retaliation-case
  notes: HHS OIG investigative summary involving a Jacobs Technologies contractor employee working at DoD who was terminated after reporting possible security breaches. OIG found retaliation occurred and recommended remedies and additional whistleblower training. Supports the concrete risk that disclosure inside a defense-adjacent program can trigger personnel retaliation rather than correction.
  reliability: primary
  observed_on: '2025-08-15'
  supports_research_ids:
  - RES-006
- id: SRC-015
  type: congressional-analysis
  title: DOD Cost Overruns and The Nunn-McCurdy Act
  location: https://www.congress.gov/crs_external_products/IF/PDF/IF13027/IF13027.1.pdf
  verified_on: '2025-08-15'
  supports:
  - critical-breach-national-security-certification
  notes: CRS summary of the Nunn-McCurdy framework. States that a critical breach occurs at 25 percent cost growth over the current baseline or 50 percent over the original baseline, and that DOD must either certify within 60 days that continuation is essential to national security and provide root-cause analysis or notify Congress of program termination. Supports the real institutional pressure around admitting serious program flaws.
  reliability: high
  observed_on: '2025-06-12'
  supports_research_ids:
  - RES-003
- id: SRC-016
  type: official-news
  title: DOD Releases First Defense Industrial Strategy
  location: https://www.defense.gov/News/News-Stories/Article/Article/3644527/dod-releases-first-defense-industrial-strategy/
  verified_on: '2025-08-15'
  supports:
  - defense-industrial-base-workforce-and-resilience-pressure
  notes: Official Defense Department release describing the 2024 National Defense Industrial Strategy. It emphasizes resilient supply chains, workforce readiness, flexible acquisition, and economic deterrence, and frames the defense industrial base as a national-security priority requiring public-private investment and continuity. Supports the logic that a critical flaw can carry workforce, supply-chain, and institutional-survival pressure beyond pure technical merit.
  reliability: high
  observed_on: '2024-01-11'
  supports_research_ids:
  - RES-003
