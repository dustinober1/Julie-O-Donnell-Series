schema_version: 1.0.0
safe_obvious_version: "A competent analyst uncovers a data flaw, reports it through proper channels, is thanked, and the system is fixed — a procedural drama where institutions work as intended and the protagonist returns to a stable career."
author_only_advantage: "Julie's hyper-vigilance is both the exact skill the plot requires and the wound that makes her impossible to reintegrate — the system needs her competence and cannot survive her being right."
productive_discomfort: "The book makes the reader feel the paranoid weight of being correct inside an institution that punishes correctness — dread comes from watching competence get treated as liability."
retellable_hook: "The night Julie sits alone with the impossible feed and realizes the machine is not broken but weaponized — and that the same pattern destroyed her once before."
signature_moments:
  - id: SIG-001
    description: "The Too-Clean Feed"
    intended_reader_memory: "Julie reads Marcus's data sheet at the farm and recognizes the four-second ghost signature — but this feed is untouched by the weather that should degrade it. The recognition lands as bodily memory, not thought."
    planned_location: "Chapter 2 — The Ghost Pattern"
    status: planned
  - id: SIG-002
    description: "The SCIF Fire Alarm"
    intended_reader_memory: "Julie detained in a SCIF with no way out pulls a manual fire alarm to weaponize the building's own environmental protocols against the institution that built them."
    planned_location: "Chapter 11 — The Crossing"
    status: planned
  - id: SIG-003
    description: "The Rogue Actor Absorption"
    intended_reader_memory: "Sterling and Apex sacrifice Vance as a rogue actor on live institutional channels, proving the system protects its architecture by consuming its own people."
    planned_location: "Chapter 18 — The Rogue Actor"
    status: planned
  - id: SIG-004
    description: "The Severing Before Dawn"
    intended_reader_memory: "Julie cuts the live Payload 88 injection in the final window before Major Sharma's 05:00 strike authorization — stopping a war by proving a machine was lying."
    planned_location: "Chapter 19 — The Severing"
    status: planned
productive_disagreements:
  - question: "Can the institution be corrected from inside, or does it protect itself before truth?"
    competing_readings:
      - "Marcus believes the institution can be corrected from inside through proper channels."
      - "Julie believes the institution protects itself before truth and will suppress any disclosure that threatens it; the book tests both and leaves Marcus's position costlier."
  - question: "Should an insider trust institutional process, or only verifiable evidence?"
    competing_readings:
      - "Elias trusts process and disclosure to surface and correct the flaw."
      - "Julie trusts only verifiable evidence and assumes suppression; Elias is nearly destroyed by the process he trusted."
  - question: "Is institutional silence protecting national capability, or endangering lives?"
    competing_readings:
      - "Vance argues silence protects national capability, jobs, and the $6B contract."
      - "Julie argues a system that hides its failures will get people killed; both are partially right and the book sides with Julie on the stakes."
recurring_motifs:
  - id: MOT-001
    element: "The too-clean signal"
    function: "Real systems wear the conditions they move through; a signal untouched by friction is synthetic. Used to test every claim of certainty."
    restraint_rule: "Appears no more than four times; never explained, only demonstrated."
  - id: MOT-002
    element: "What the institution omits"
    function: "Trust judgments emerge from what others refuse to say. Silence and deflection carry more weight than admission."
    restraint_rule: "Threaded through dialogue, never named as a theme."
  - id: MOT-003
    element: "Physical evidence against digital certainty"
    function: "The physical world — weather, fence posts, wear — tests and contradicts what the machine claims."
    restraint_rule: "Grounded in scene, never turned into a speech."
lingering_question: "What happens to a competent person who is right inside a system that cannot afford correctness — and what does it cost to stay right?"
hand_sell_reason: "A techno-thriller about a disgraced analyst who must prove an automated intelligence system is lying in time to stop a war, knowing the institution will destroy her for being right — again."
accepted_reader_costs:
  - "High procedural density in the technical-investigation chapters; the book trusts the reader to follow signal-strength and interval-spacing reasoning."
  - "A deliberately slow-burn first act that earns its escalation through observational fixation rather than early spectacle."
  - "An ending where the immediate crisis resolves but the larger conspiracy survives — the book refuses false closure."
  - "Julie's emotional arc resolves as acceptance of cost, not triumph — there is no return to safety."
