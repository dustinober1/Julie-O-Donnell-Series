schema_version: 1.0.0
items:
  - id: RES-001
    lane: story-world
    claim: "Argus-class automated targeting systems validate strikes through confidence scoring on multi-source telemetry, with human validation as the final authorization gate before kinetic commitment."
    fictionalization:
      status: composite
      reason: "Argus is a fictional system compositing real automated targeting, sensor fusion, and human-in-the-loop validation concepts."
    knowledge_scope:
      known_by: ["Julie (full architecture)", "Elias (code internals)", "Vance (system capabilities)"]
      incorrectly_believed_by: ["Pentagon oversight (assumes system is reliable)"]
      unknown_to: ["general public", "Indian Northern Command"]
    story_use:
      chapters: [1, 2, 5, 19]
      decision_affected: "Establishes the validation choke point Julie once held and the mechanism Payload 88 exploits by forcing a false 100% confidence score."
    notes: "Planned; no sources registered yet. Requires verification of real automated targeting validation flows before drafting."
    source_ids: []
    confidence: low
    verified_on: null
    risk:
      - "Oversimplifying real targeting-system validation flows"
      - "Technical inaccuracy in confidence-scoring mechanics"
    dramatic_uses: [vulnerability, forensic-clue]
    status: planned
  - id: RES-002
    lane: story-world
    claim: "Synthetic telemetry injection can spoof confidence-scoring systems by replaying clean signal signatures that bypass degradation filters, producing alerts indistinguishable from genuine collection."
    fictionalization:
      status: invented
      reason: "Payload 88 is a fictional injection technique; the plausibility is grounded in real replay-attack and data-spoofing concepts."
    knowledge_scope:
      known_by: ["Julie (recognizes the signature)", "Elias (confirms the vector)", "Tariq (designed the injection)"]
      incorrectly_believed_by: ["Vance (believes it is a genuine alert)"]
      unknown_to: ["Indian Northern Command", "general public"]
    story_use:
      chapters: [2, 4, 13, 16, 19]
      decision_affected: "Grounds the plausibility of Payload 88 and the too-clean-feed motif that lets Julie recognize the injection."
    notes: "Planned; no sources registered yet. Requires verification of real telemetry-spoofing plausibility before drafting."
    source_ids: []
    confidence: low
    verified_on: null
    risk:
      - "Implausible injection mechanics"
      - "Overstating how easily confidence scoring can be spoofed"
    dramatic_uses: [vulnerability, forensic-clue, deadline]
    status: planned
