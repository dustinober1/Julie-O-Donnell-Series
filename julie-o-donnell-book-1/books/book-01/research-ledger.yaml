schema_version: 1.0.0
items:
- id: RES-001
  lane: story-world
  claim: Argus-class automated targeting systems validate strikes through confidence scoring on multi-source telemetry, with human validation as the final authorization gate before kinetic commitment.
  fictionalization:
    status: composite
    reason: Argus is a fictional system compositing real automated targeting, sensor fusion, and human-in-the-loop validation concepts.
  knowledge_scope:
    known_by:
    - Julie (full architecture)
    - Elias (code internals)
    - Vance (system capabilities)
    incorrectly_believed_by:
    - Pentagon oversight (assumes system is reliable)
    unknown_to:
    - general public
    - Indian Northern Command
  story_use:
    chapters:
    - 1
    - 2
    - 5
    - 19
    decision_affected: Establishes the validation choke point Julie once held and the mechanism Payload 88 exploits by forcing a false 100% confidence score.
  notes: Ready; verified against registered sources SRC-001 (DoD Directive 3000.09, human judgment over use of force), SRC-002 (CNAS kill-chain principles, authorization as human intent), and SRC-003 (Project Maven, AI confidence cuing of human analysts). The underlying real concepts are well grounded; the specific Argus confidence-scoring mechanics remain a fictional composite, so confidence is medium rather than high.
  source_ids:
  - SRC-001
  - SRC-002
  - SRC-003
  confidence: medium
  verified_on: '2026-07-17'
  risk:
  - Oversimplifying real targeting-system validation flows
  - Technical inaccuracy in confidence-scoring mechanics
  dramatic_uses:
  - vulnerability
  - forensic-clue
  status: ready
- id: RES-002
  lane: story-world
  claim: Synthetic telemetry injection can spoof confidence-scoring systems by replaying clean signal signatures that bypass degradation filters, producing alerts indistinguishable from genuine collection.
  fictionalization:
    status: invented
    reason: Payload 88 is a fictional injection technique; the plausibility is grounded in real replay-attack and data-spoofing concepts.
  knowledge_scope:
    known_by:
    - Julie (recognizes the signature)
    - Elias (confirms the vector)
    - Tariq (designed the injection)
    incorrectly_believed_by:
    - Vance (believes it is a genuine alert)
    unknown_to:
    - Indian Northern Command
    - general public
  story_use:
    chapters:
    - 2
    - 4
    - 13
    - 16
    - 19
    decision_affected: Grounds the plausibility of Payload 88 and the too-clean-feed motif that lets Julie recognize the injection.
  notes: Ready; verified against registered sources SRC-007 (NIST replay-attack definition), SRC-008 (NIST-hosted survey of physics-based CPS anomaly detection for false sensor readings), and SRC-009 (Humayed et al. survey of CPS security covering replay and false-data-injection attacks). Payload 88 remains fictional, but the underlying mechanism — replaying or injecting clean-looking telemetry that must be identified through anomaly signatures rather than obvious corruption — is well grounded. The specific claim that the feed is "too clean" is a thriller-facing extrapolation from real replay/spoofing patterns, so confidence is medium rather than high.
  source_ids:
  - SRC-007
  - SRC-008
  - SRC-009
  confidence: medium
  verified_on: '2025-08-15'
  risk:
  - Implausible injection mechanics
  - Overstating how easily confidence scoring can be spoofed
  dramatic_uses:
  - vulnerability
  - forensic-clue
  - deadline
  status: ready
- id: RES-003
  lane: story-world
  claim: Major defense acquisition and industrial-base programs can face continuation, funding, and workforce pressure when a critical system flaw threatens program certification, schedule, or confidence in the supplier base.
  fictionalization:
    status: composite
    reason: The $6B Apex contract is fictional but composites real defense-procurement renewal pressure and political oversight dynamics.
  knowledge_scope:
    known_by:
    - Vance (full pressure)
    - Sterling (political dimension)
    incorrectly_believed_by:
    - Julie (underestimates the political dimension initially)
    unknown_to:
    - general public
  story_use:
    chapters:
    - 7
    - 8
    - 14
    - 17
    decision_affected: Motivates Vance's suppression and gives the opposition a legible positive case beyond villainy.
  notes: Ready; verified against registered sources SRC-015 (CRS summary of the Nunn-McCurdy critical-breach certification or termination framework) and SRC-016 (DoD Defense Industrial Strategy on industrial-base resilience, workforce readiness, and economic deterrence). Grounds the institutional logic that disclosure of a serious flaw can threaten continuation, executive visibility, and workforce pressure. The exact $6B Friday renewal clock remains thriller compression, so confidence stays low.
  source_ids:
  - SRC-015
  - SRC-016
  confidence: low
  verified_on: '2025-08-15'
  risk:
  - Misrepresenting defense-procurement timelines
  - Overstating political leverage in contract renewal
  dramatic_uses:
  - obstacle
  - moral-choice
  status: ready
- id: RES-004
  lane: story-world
  claim: SCIFs log and archive access events, restrict ingress and egress, and must preserve monitored emergency-exit and life-safety behavior alongside security controls.
  fictionalization:
    status: simplified
    reason: SCIF protocols are simplified for narrative clarity while preserving the core constraints of logged access, restricted egress, emergency-exit monitoring, and life-safety coordination. Julie's fire-alarm exploit is a bounded narrative extrapolation rather than a documentary claim.
  knowledge_scope:
    known_by:
    - Julie (protocol behavior)
    - Vance (detention authority)
    incorrectly_believed_by: []
    unknown_to:
    - general public
  story_use:
    chapters:
    - 7
    - 10
    - 11
    decision_affected: Enables Julie's SCIF detention and her fire-alarm escape mechanic.
  notes: 'Ready; verified against registered sources SRC-010 (UFC 4-010-05: emergency exit doors alarmed 24/7 with local annunciation, delayed-egress recommendation, and emergency-exit monitoring) and SRC-011 (UFC 4-021-02: ACS logs and archives events, monitors door positions including emergency exits, preserves free egress, and must be coordinated with life-safety and fire-alarm interface requirements). Grounds the detention/access-control reality and the fact that an emergency condition can interact with security in a one-time exploitable way. The exact fire-alarm escape remains a simplified thriller extrapolation, so confidence is medium.'
  source_ids:
  - SRC-010
  - SRC-011
  confidence: medium
  verified_on: '2025-08-15'
  risk:
  - Inaccurate SCIF egress and environmental protocol behavior
  - Implausible fire-alarm escape mechanic
  dramatic_uses:
  - procedural-constraint
  - obstacle
  status: ready
- id: RES-005
  lane: human-authenticity
  claim: Former intelligence officers with past operational trauma exhibit hypervigilance that manifests as environmental scanning, physiological stress registration, and reflexive threat assessment — functional in analysis, read as paranoia socially.
  fictionalization:
    status: unchanged
    reason: Grounded in established trauma-response psychology without fictionalization.
  knowledge_scope:
    known_by:
    - Julie (experiences it directly)
    incorrectly_believed_by:
    - other characters (read her hypervigilance as paranoia)
    unknown_to: []
  story_use:
    chapters:
    - 1
    - 2
    - 11
    - 21
    decision_affected: Grounds Julie's POV behavior and the gap between how her skill reads to the reader versus other characters.
  notes: Ready; verified against registered sources SRC-004 (VA National Center for PTSD, DSM-5 Criterion E hypervigilance), SRC-005 (VA/DoD PTSD Clinical Practice Guideline, veteran hyperarousal), and SRC-006 (peer-reviewed study showing combat-threat attentional capture and disengagement difficulty in veterans with PTSD). Non-fictionalized with strong clinical and empirical grounding, so confidence is high.
  source_ids:
  - SRC-004
  - SRC-005
  - SRC-006
  confidence: high
  verified_on: '2026-07-17'
  risk:
  - Pathologizing adaptive vigilance
  - Inaccurate trauma-response depiction
  dramatic_uses:
  - relationship-pressure
  - credibility-detail
  status: ready
- id: RES-006
  lane: human-authenticity
  claim: Defense and defense-adjacent institutions under threat can expose whistleblowers to retaliation, confidentiality failures, delayed handling, and need-to-know breakdowns that turn protected disclosure into personal risk.
  fictionalization:
    status: composite
    reason: Composites observed institutional self-protection patterns across defense and corporate contexts.
  knowledge_scope:
    known_by:
    - Julie (recognizes the pattern)
    - Sterling (orchestrates it)
    incorrectly_believed_by:
    - Elias (trusts process until the frame)
    unknown_to:
    - general public
  story_use:
    chapters:
    - 5
    - 8
    - 10
    - 14
    - 17
    - 18
    decision_affected: Grounds Vance's and Sterling's behavior and the ending where the system consumes Vance to survive.
  notes: 'Ready; verified against registered sources SRC-012 (GAO-17-506: major timeliness and quality failures in DOD civilian and contractor reprisal investigations), SRC-013 (GAO-19-198: confidentiality gaps and excessive access to sensitive whistleblower information without a need to know), and SRC-014 (HHS OIG Jacobs Technologies case: contractor employee terminated after reporting possible security breaches). Grounds the pattern that reporting a problem inside a defense-adjacent institution can isolate the reporter and convert disclosure into administrative and personal exposure. The Sterling/Vance endgame of sacrificing one actor to preserve the broader architecture remains a composite dramatic extension, so confidence is medium rather than high.'
  source_ids:
  - SRC-012
  - SRC-013
  - SRC-014
  confidence: medium
  verified_on: '2025-08-15'
  risk:
  - Caricaturing institutional behavior
  - Overgeneralizing from limited examples
  dramatic_uses:
  - obstacle
  - false-assumption
  - moral-choice
  status: ready
