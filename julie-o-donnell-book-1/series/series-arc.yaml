schema_version: 1.0.0
books:
  - id: book-01
    status: active
    role: establish the series promise
    closes:
      - the immediate spoofing crisis (Payload 88 injection into Argus Enterprise Build 4.6)
      - Arthur Vance's cover-up and career
      - Elias Thorne's treason frame
      - the localized Apex security breach
    carries:
      - Julie's permanent off-grid exile status
      - the Argus Enterprise Build 4.6 architectural vulnerability
      - Senator Sterling's institutional survival
      - Major Tariq's international network and ultimate objective
      - the four-second ghost's unresolved emotional weight
      - Julie's knowledge that every future crisis will be harder because she has less institutional access
  - id: book-02
    status: provisional
    role: escalate the conspiracy and deepen Julie's isolation
    closes: []
    carries: []
  - id: book-03
    status: provisional
    role: bring the global threat to a turning point
    closes: []
    carries: []
long_arcs:
  - id: arc-argus-vulnerability
    description: the systemic flaw in automated targeting that makes every future crisis possible
    books:
      - book-01
      - book-02
      - book-03
    status: open
  - id: arc-tariq-network
    description: Major Tariq's international operation to destabilize regional powers through synthetic telemetry
    books:
      - book-01
      - book-02
      - book-03
    status: open
  - id: arc-julie-exile
    description: Julie's progressive loss of institutional access and growing reliance on off-grid methods
    books:
      - book-01
      - book-02
      - book-03
    status: open
escalation_logic:
  scope: localized drone strike (past) to national nuclear trigger (book 1) to regional coalition (book 2) to global infrastructure (book 3+)
  opposition: corporate site director (book 1) to senator-level power (book 2) to international network (book 3+)
  technical: spoofed telemetry (book 1) to injected production code (book 2) to supply-chain compromise (book 3+)
  isolation: off-grid exile (book 1) to international fugitive (book 2) to existential outsider (book 3+)
  personal_cost: career destruction (past) to permanent exile (book 1) to life-threatening pursuit (book 2+)
