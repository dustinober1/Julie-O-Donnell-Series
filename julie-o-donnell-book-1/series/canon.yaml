  - id: FCT-013
    category: series-fact
    subject: Payload 88
    fact: Payload 88 is a synthetic data injection that generates a 100% confidence alert on a rogue Pakistani strike
    source: author-interview
    status: locked
    introduced_in: book-01
  - id: FCT-014
    category: series-fact
    subject: Julie O'Donnell
    fact: Julie pulls a manual fire alarm to exploit the building's environmental emergency protocols and escape SCIF
      detention
    source: author-interview
    status: locked
    introduced_in: book-01
  - id: FCT-015
    category: series-fact
    subject: Julie O'Donnell
    fact: Julie destroys her RFID badges, ditches her tracked truck, and goes fully off the grid after the SCIF breach
    source: author-interview
    status: locked
    introduced_in: book-01
  - id: FCT-016
    category: series-fact
    subject: Julie O'Donnell
    fact: In book 1, Julie stops the immediate kinetic escalation by exposing and severing the live injection of Payload 88
      before Major Sharma's 05:00 hours dawn deadline
