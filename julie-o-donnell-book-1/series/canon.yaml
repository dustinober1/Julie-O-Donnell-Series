schema_version: 1.0.0
facts:
  - id: FCT-001
    category: series-fact
    subject: Julie O'Donnell
    fact: Julie O'Donnell was a SIGINT Officer and Strike-Validation Analyst at a Forward Operating Base on the Pakistan
      border
    source: author-interview
    status: locked
    introduced_in: book-01
  - id: FCT-002
    category: series-fact
    subject: Julie O'Donnell
    fact: Julie's role was to provide human validation before command turned automated recommendations into kinetic strikes
    source: author-interview
    status: locked
    introduced_in: book-01
  - id: FCT-003
    category: series-fact
    subject: four-second ghost incident
    fact: The four-second ghost incident occurred when Argus Beta flagged a target with high confidence, Julie refused to
      validate it, was overridden by Lt. Col. Hargrove, and a four-second terminal freeze during her hard override
      attempt resulted in a civilian infrastructure strike
    source: author-interview
    status: locked
    introduced_in: book-01
  - id: FCT-004
    category: series-fact
    subject: four-second ghost incident
    fact: The four-second freeze was officially attributed to analyst hesitation, making Julie the scapegoat for the failed
      strike
    source: author-interview
    status: locked
    introduced_in: book-01
  - id: FCT-005
    category: series-fact
    subject: Julie O'Donnell
    fact: Julie lives on a farm in Culpeper, Virginia, having clawed back a life off the grid after her career destruction
    source: author-interview
    status: locked
    introduced_in: book-01
  - id: FCT-006
    category: series-fact
    subject: Marcus Reed
    fact: Marcus Reed is Julie's former senior colleague who arrives at her farm to pull her back into the crisis
    source: voice-sample
    status: locked
    introduced_in: book-01
  - id: FCT-007
    category: series-fact
    subject: Argus Enterprise Build 4.6
    fact: Argus Enterprise Build 4.6 is the current production version of the automated targeting system at Apex Defense
      Systems
    source: author-interview
    status: locked
    introduced_in: book-01
  - id: FCT-008
    category: series-fact
    subject: Apex Defense Systems
    fact: Apex Defense Systems faces a $6 billion Pentagon contract renewal on a Friday morning deadline
    source: author-interview
    status: locked
    introduced_in: book-01
  - id: FCT-009
    category: series-fact
    subject: Arthur Vance
    fact: Arthur Vance is Site Director at Apex Defense Systems and suppresses the data flaw to protect the contract renewal
    source: author-interview
    status: locked
    introduced_in: book-01
  - id: FCT-010
    category: series-fact
    subject: Senator Sterling
    fact: Senator Sterling is a Capitol Hill power broker behind Apex who ensures the corporate architecture survives after
      Vance's fall
    source: author-interview
    status: locked
    introduced_in: book-01
  - id: FCT-011
    category: series-fact
    subject: Elias Thorne
    fact: Elias Thorne is a mid-level Apex analyst framed as a traitor to protect the product image
    source: author-interview
    status: locked
    introduced_in: book-01
  - id: FCT-012
    category: series-fact
    subject: Major Tariq
    fact: Major Tariq is the global mastermind behind the synthetic telemetry injection known as Payload 88
    source: author-interview
    status: locked
