schema_version: 1.0.0
must:
- ground tension in verifiable physical cues, timing, routing, custody, or procedural
  consequence
- keep close-third narration disciplined and defensive so observation stays ahead
  of explanation
- let institutional language carry dramatic pressure when systems or bureaucracy become
  the threat surface
prefer:
- compact paragraphs that tighten as risk accelerates
- concise adversarial dialogue that changes authority, trust, or available options
- concrete environmental detail that tests or contradicts system certainty
- brief fragments at recognition beats or irreversible status changes
avoid:
- tutorial-style technical explanation that stalls momentum
- action-hero swagger or invulnerable competence theater
- speechmaking that turns institutional critique into overt lecturing
- stylized digital spectacle or theatrical hacking performance
monitor:
- procedural density drifting from pressure into opacity
- sentence fragmentation flattening scene modulation
- withholding so much interiority that motive clarity disappears
